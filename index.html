    if (lander.thrusting) {
      const thrustPower = THRUST_POWER * shipMult.thrustMult;
      lander.vx += Math.sin(lander.angle) * thrustPower * dt;
      lander.vy -= Math.cos(lander.angle) * thrustPower * dt;
      lander.fuel -= FUEL_COST_MAIN * dt;
      spawnThrustParticles();
    }

    // ── Exhaust trail — spawn every frame regardless of thrust ──
    if (Math.random() < 0.6) {
      trailParts.push({
        x: lander.x,
        y: lander.y,
        life: 1,
        decay: 0.025 + Math.random() * 0.015,
        size: 1.5 + Math.random() * 2,
      });
    }
    if (lander.fuel < 0) lander.fuel = 0;
    lander.x += lander.vx * dt;
    lander.y += lander.vy * dt;

    // Lost in space — flew too high or off the sides
    if ((lander.y < -100 || lander.x < -60 || lander.x > canvas.width + 60) && !lander.crashed && !lander.landed) {
      lander.crashed = true;
      stopThrust();
      playCrash();
      spawnExplosion(lander.x, Math.max(lander.y, 20));
      screenShake = 18;
      setTimeout(() => { comboCount = 0; comboMultiplier = 1; isGameOver = true; showResult(false, 0, 1, 'LOST IN SPACE'); }, 2200);
    }

    // Collision
    const col = checkCollision();
    if (col.hit) {
      // Normalize angle to -PI..PI range
      const tilt = ((lander.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const normalizedTilt = tilt > Math.PI ? tilt - Math.PI * 2 : tilt;
      const maxTilt = Math.PI / 9; // ~20 degrees
      const tooTilted = Math.abs(normalizedTilt) > maxTilt;

      if (col.onPad && Math.abs(lander.vy) < 20 && Math.abs(lander.vx) < 15 && !tooTilted) {
        // ── Check for PERFECT landing ──────────────────────────
        const padCenterX = col.onPad.x + col.onPad.width / 2;
        const centerOffset = Math.abs(lander.x - padCenterX);
        const isPerfect = centerOffset < col.onPad.width * 0.2
          && Math.abs(lander.vy) < 5
          && Math.abs(lander.vx) < 3
          && Math.abs(normalizedTilt) < Math.PI / 36; // < 5 degrees

        // Successful landing
        lander.landed = true;
        stopThrust();
        isGameOver = false;
        playLand();
        spawnLandingDust(lander.x, lander.y, col.onPad.width);
        if (isPerfect) spawnPerfectBurst(lander.x, lander.y);
        const speedBonus = Math.floor((20 - Math.abs(lander.vy)) * 5);
        const fuelBonus = Math.floor(lander.fuel * 2);
        const padBonus = col.onPad.bonus;
        const perfectBonus = isPerfect ? 250 : 0;
        const baseLandScore = (100 + speedBonus + fuelBonus) * padBonus + perfectBonus;

        // Combo multiplier — only perfect landings chain the combo
        if (isPerfect) {
          comboCount++;
          comboMultiplier = Math.min(comboCount + 1, 8); // cap at 8x
        } else {
          comboCount = 0;
          comboMultiplier = 1;
        }

        levelTimerActive = false;

        // Time bonus — max 500 under 8s, scales down, zero after 30s
        const timeBonus = Math.max(0, Math.round(500 * Math.max(0, 1 - (levelTimer - 8) / 22)));

        const landScore = Math.round(baseLandScore * comboMultiplier) + timeBonus;
        score += landScore;
        checkAchievements({ landed: true, perfect: isPerfect, currentScore: score, currentStreak: comboCount, leavesThisLevel: fuelPickups.filter(p => p.collected).length });
        showResult(true, landScore, col.onPad.bonus, null, isPerfect, timeBonus);
      } else {
        // Crash
        lander.crashed = true;
        stopThrust();
        playCrash();
        spawnExplosion(lander.x, lander.y);
        screenShake = 18;
        levelTimerActive = false;
        checkAchievements({ crashed: true, currentScore: score, currentStreak: comboCount, leavesThisLevel: 0 });
        const reason = tooTilted ? 'TILTED TOO FAR!' : 'TOO FAST OR OFF-PAD';
        // Delay game over overlay so explosion can play out
        setTimeout(() => { comboCount = 0; comboMultiplier = 1; isGameOver = true; showResult(false, 0, 1, reason); }, 2200);
      }
    }

    updateHUD();
  }

  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= p.decay * dt;
    return p.life > 0;
  });
  explosionParts = explosionParts.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.12 * dt;
    p.vx *= 0.98;
    if (p.rot !== undefined) p.rot += p.rotV * dt;
    p.life -= p.decay * dt;
    return p.life > 0;
  });
  landDustParts = landDustParts.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy -= 0.02 * dt; // dust rises slightly
    p.vx *= 0.97;
    p.size += 0.15 * dt; // puffs expand
    p.life -= p.decay * dt;
    return p.life > 0;
  });
  trailParts = trailParts.filter(p => {
    p.life -= p.decay * dt;
    return p.life > 0;
  });
  shockwaves = shockwaves.filter(sw => {
    sw.r += 4.5 * dt;
    return sw.r < sw.maxR;
  });
  if (Math.abs(screenFlash) > 0.001) {
    screenFlash *= Math.pow(0.88, dt);
    if (Math.abs(screenFlash) < 0.01) screenFlash = 0;
  }
  if (screenShake > 0.5) {
    screenShake *= Math.pow(0.82, dt);
    ctx.restore(); // close the shake translate
    if (screenShake < 0.5) screenShake = 0;
  }

  requestAnimationFrame(loop);
}

// ── PILOT RANKS ───────────────────────────────────────────────
const RANK_KEY = 'natty-lander-rank-xp';
const BEST_LEVEL_KEY = 'natty-lander-best-level';

function getBestLevel() {
  try { return parseInt(localStorage.getItem(BEST_LEVEL_KEY) || '0'); }
  catch(e) { return 0; }
}

function saveBestLevel(lvl) {
  try { localStorage.setItem(BEST_LEVEL_KEY, String(lvl)); }
  catch(e) {}
}

const RANKS = [
  { title: 'CADET',      minXP: 0,      color: '#aabbcc', icon: '🪐' },
  { title: 'PILOT',      minXP: 500,    color: '#00ccff', icon: '✈️' },
  { title: 'AVIATOR',    minXP: 2000,   color: '#00ff88', icon: '🚀' },
  { title: 'ACE',        minXP: 5000,   color: '#ffcc00', icon: '⭐' },
  { title: 'VETERAN',    minXP: 12000,  color: '#ff8800', icon: '🔥' },
  { title: 'ELITE',      minXP: 25000,  color: '#ff4400', icon: '💫' },
  { title: 'COMMANDER',  minXP: 50000,  color: '#cc00ff', icon: '🌟' },
  { title: 'LEGEND',     minXP: 100000, color: '#ffd700', icon: '👑' },
];

function getRankXP() {
  try { return parseInt(localStorage.getItem(RANK_KEY) || '0'); }
  catch(e) { return 0; }
}

function saveRankXP(xp) {
  try { localStorage.setItem(RANK_KEY, String(xp)); }
  catch(e) {}
}

function getRankForXP(xp) {
  let rank = RANKS[0];
  for (const r of RANKS) { if (xp >= r.minXP) rank = r; }
  return rank;
}

function getNextRank(xp) {
  for (const r of RANKS) { if (xp < r.minXP) return r; }
  return null; // already at max
}

function addRankXP(pts) {
  const prevXP = getRankXP();
  const newXP = prevXP + pts;
  saveRankXP(newXP);
  const prevRank = getRankForXP(prevXP);
  const newRank  = getRankForXP(newXP);
  return { newXP, prevRank, newRank, rankUp: prevRank.title !== newRank.title };
}

// ── LEADERBOARD ───────────────────────────────────────────────
const LB_KEY = 'natty-lander-scores';
const LB_MAX = 8;

async function loadScores() {
  try {
    const data = localStorage.getItem(LB_KEY);
    return data ? JSON.parse(data) : [];
  } catch(e) { return []; }
}

async function saveScores(scores) {
  try {
    localStorage.setItem(LB_KEY, JSON.stringify(scores));
  } catch(e) {}
}

async function addScore(initials, pts, lvl) {
  const scores = await loadScores();
  scores.push({ name: initials.toUpperCase().slice(0,3), score: pts, level: lvl, date: new Date().toLocaleDateString() });
  scores.sort((a,b) => b.score - a.score);
  const trimmed = scores.slice(0, LB_MAX);
  await saveScores(trimmed);
  return trimmed;
}

async function renderLeaderboard(highlightScore) {
  try {
    const lb = document.getElementById('leaderboard');
    const rows = document.getElementById('lb-rows');
    if (!lb || !rows) return;
    const scores = await loadScores();
    lb.style.display = 'block';
    if (scores.length === 0) {
      rows.innerHTML = '<div style="text-align:center;color:rgba(0,255,136,0.4);font-size:11px;padding:8px;">NO SCORES YET — BE THE FIRST!</div>';
      return;
    }
    rows.innerHTML = scores.map((s, i) => {
      const isNew = highlightScore && s.score === highlightScore && i === scores.findIndex(x => x.score === highlightScore);
      return `<div class="lb-row${isNew ? ' highlight' : ''}">
        <span class="lb-rank">#${i+1}</span>
        <span class="lb-name">${s.name}</span>
        <span class="lb-score">${s.score.toLocaleString()}</span>
        <span class="lb-level">LVL ${s.level}</span>
      </div>`;
    }).join('');
  } catch(e) { /* leaderboard render failed silently */ }
}

function showInitialsEntry(pts, lvl) {
  const entry = document.getElementById('initials-entry');
  entry.style.display = 'flex';
  const input = document.getElementById('initials-input');
  input.value = '';
  setTimeout(() => input.focus(), 100);

  const btn = document.getElementById('save-score-btn');
  const handler = async () => {
    try {
      const name = input.value.trim().toUpperCase().slice(0,3) || 'AAA';
      btn.removeEventListener('click', handler);
      entry.style.display = 'none';
      await addScore(name, pts, lvl);
      await renderLeaderboard(pts);
    } catch(e) {}
  };
  btn.addEventListener('click', handler);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });
}

async function checkHighScore(pts) {
  const scores = await loadScores();
  return scores.length < LB_MAX || pts > (scores[scores.length - 1]?.score || 0);
}

function checkShipUnlocks(newLevel) {
  const unlockedShips = [];
  Object.entries(SHIPS).forEach(([key, ship]) => {
    if (newLevel === ship.unlockedAtLevel) {
      unlockedShips.push({ key, name: ship.name });
    }
  });
  return unlockedShips;
}

function showResult(success, pts, padBonus, reason, isPerfect, timeBonus = 0) {
  const overlay = document.getElementById('overlay');
  const gameMenu = document.getElementById('game-menu');
  const shipSelect = document.getElementById('ship-select');
  const controls = document.getElementById('controls');
  
  // Hide ship select, show game menu, hide controls
  shipSelect.classList.remove('visible');
  gameMenu.style.display = 'flex';
  controls.style.display = 'none';
  
  overlay.classList.remove('hidden');

  // Update level display
  const menuLvl = document.getElementById('menuLevelDisplay');
  if (menuLvl) menuLvl.textContent = `LEVEL ${level}`;

  const title = gameMenu.querySelector('.overlay-title');
  const msg = document.getElementById('result-msg') || document.createElement('div');
  msg.id = 'result-msg';
  msg.className = '';
  
  // Use the title element to display the result
  if (success) {
    title.classList.add('result-title');
    title.textContent = isPerfect ? '⭐ PERFECT LANDING!' : `LEVEL ${level} CLEAR!`;
    title.style.color = isPerfect ? '#ffed4e' : '#00ff88';
    title.style.textShadow = isPerfect ? '0 0 15px #ffed4e, 0 0 30px #ffcc00, 0 0 45px #ffaa00, 0 0 60px rgba(255,200,0,0.5)' : '0 0 20px #00ff88';
    msg.className = 'success-msg';
    let txt = `+${pts} PTS`;
    if (comboMultiplier > 1) txt += ` · ${comboMultiplier}× COMBO!`;
    if (isPerfect) txt += ' · +250 PERFECT BONUS!';
    if (padBonus === 2) txt += ' · DOUBLE PAD!';
    if (timeBonus > 0) txt += ` · ⚡ ${timeBonus} TIME BONUS!`;
    msg.textContent = txt;
    if (!msg.parentNode) gameMenu.insertBefore(msg, gameMenu.querySelector('.overlay-sub'));

    // Award XP and check for rank up
    const xpGained = pts + (isPerfect ? 100 : 0);
    const rankResult = addRankXP(xpGained);
    
    level++;
    highestLevelReached = Math.max(highestLevelReached, level);
    if (highestLevelReached > getBestLevel()) saveBestLevel(highestLevelReached);
    
    // Check for ship unlocks
    const unlockedShips = checkShipUnlocks(level);
    
    let nextInfo = `LEVEL ${level} · GRAVITY ↑ · PADS NARROWER`;
    const sub = gameMenu.querySelector('.overlay-sub');

    if (rankResult.rankUp) {
      sub.innerHTML = `<span style="color:${rankResult.newRank.color};font-size:18px;font-weight:bold;text-shadow:0 0 12px ${rankResult.newRank.color};">${rankResult.newRank.icon} RANK UP: ${rankResult.newRank.title}!</span><br>SCORE: ${score}  |  ${nextInfo}`;
    } else if (unlockedShips.length > 0) {
      const shipNames = unlockedShips.map(s => s.name).join(', ');
      sub.innerHTML = `🚀 <span class="ship-unlock-text" style="color: #ffd700; font-weight: bold; letter-spacing: 1px;">NEW SHIP UNLOCKED: ${shipNames}!</span><br>SCORE: ${score}  |  ${nextInfo}`;
    } else {
      const nextRank = getNextRank(rankResult.newXP);
      const xpInfo = nextRank ? ` · ${nextRank.minXP - rankResult.newXP} XP to ${nextRank.title}` : ' · MAX RANK!';
      sub.textContent = `SCORE: ${score}  |  ${nextInfo}${xpInfo}`;
    }
    
    const btn = document.getElementById('startBtn');
    btn.textContent = `START LEVEL ${level}`;
    const lb = document.getElementById('leaderboard');
    lb.style.display = 'none';
  } else {
    title.textContent = 'GAME OVER';
    title.style.color = '#ff4444';
    title.style.textShadow = '0 0 20px #ff4444';
    msg.className = 'crash-msg';
    msg.textContent = reason || 'TOO FAST OR OFF-PAD';
    if (!msg.parentNode) gameMenu.insertBefore(msg, gameMenu.querySelector('.overlay-sub'));
    
    const sub = gameMenu.querySelector('.overlay-sub');
    sub.textContent = `FINAL SCORE: ${score}  |  LEVEL ${highestLevelReached} REACHED`;
    const btn = document.getElementById('startBtn');
    btn.textContent = 'PLAY AGAIN';
    const finalScore = score;
    const finalLevel = highestLevelReached;
    level = 1;
    // Show leaderboard and prompt initials if score qualifies
    checkHighScore(finalScore).then(isHigh => {
      renderLeaderboard(null).then(() => {
        if (isHigh && finalScore > 0) showInitialsEntry(finalScore, finalLevel);
      }).catch(()=>{});
    }).catch(()=>{});
  }

  gameState = 'over';

  // Update best level display on menu
  const bestLvl = getBestLevel();
  const bestDisp = document.getElementById('bestLevelDisplay');
  const bestVal  = document.getElementById('bestLevelVal');
  if (bestLvl > 0 && bestDisp && bestVal) {
    bestVal.textContent = bestLvl;
    bestDisp.style.display = 'block';
  }
}

  D2:73.4, E2:82.4, F2:87.3, G2:98.0, A2:110.0, B2:123.5,

function getMusicBPM() {
  // Level 1 = 80 BPM, climbs ~5 BPM per level, caps at 168
  const base = Math.min(168, 80 + (level - 1) * 5);
  // +20 BPM panic boost when fuel drops under 20%
  const lowFuelBoost = (gameState === 'playing' && lander && lander.fuel < 20) ? 20 : 0;
  return base + lowFuelBoost;
}

function scheduleNote(freq, type, gain, time, dur, lpfFreq) {
  if (!ac) return;
  const osc = ac.createOscillator();
  const g   = ac.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  if (lpfFreq) {
    const f = ac.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = lpfFreq;
    osc.connect(f); f.connect(g);
  } else {
    osc.connect(g);
  }
  g.connect(musicGain);
  g.gain.setValueAtTime(0.0001, time);
  g.gain.linearRampToValueAtTime(gain, time + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, time + dur * 0.85);
  osc.start(time);
  osc.stop(time + dur);
}

function scheduleHat(time, gain) {
  if (!ac) return;
  const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * 0.06), ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource();
  src.buffer = buf;
  const hpf = ac.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 6000;
  const g = ac.createGain();
  g.gain.setValueAtTime(gain, time);
  g.gain.exponentialRampToValueAtTime(0.0001, time + 0.05);
  src.connect(hpf); hpf.connect(g); g.connect(musicGain);
  src.start(time);
}

function schedulePad(notes, time, dur, gain) {
  if (!ac) return;
  notes.forEach(freq => {
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    osc.connect(g); g.connect(musicGain);
    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(gain, time + 0.3);
    g.gain.setValueAtTime(gain, time + dur - 0.4);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    osc.start(time); osc.stop(time + dur);
  });
}

function musicTick() {
  if (!ac || !musicRunning || !musicGain) return;
  const cfg = getMusicConfig();
  const stepDur = 60 / cfg.bpm / 4; // 16th note duration
  const lookAhead = 0.12;

  while (musicNextTime < ac.currentTime + lookAhead) {
    const step = musicStep % 16;
    const t = musicNextTime;

    // Bass
    if (cfg.bass[step]) scheduleNote(cfg.bass[step], 'sine', cfg.bassGain, t, stepDur * 1.8, 300);

    // Melody
    if (cfg.melody[step]) scheduleNote(cfg.melody[step], 'triangle', cfg.melGain, t, stepDur * 0.7);

    // Pads — one chord per 4 steps
    if (step % 4 === 0) {
      const padIdx = (step / 4) % cfg.pads.length;
      schedulePad(cfg.pads[padIdx], t, stepDur * 4, cfg.padGain);
    }

    // Hi-hat
    if (cfg.hat[step]) scheduleHat(t, cfg.hatGain);

    musicNextTime += stepDur;
    musicStep++;
  }

  musicSchedulerID = setTimeout(musicTick, 30);
}

function startMusic() {
  if (!ac || musicRunning) return;
  if (!musicGain) {
    musicGain = ac.createGain();
    musicGain.gain.value = getMusicConfig().vol;
    musicGain.connect(ac.destination);
  }
  musicRunning = true;
  musicStep = 0;
  musicNextTime = ac.currentTime + 0.1;
  musicTick();
}

function stopMusic() {
  musicRunning = false;
  if (musicSchedulerID) clearTimeout(musicSchedulerID);
}

function updateMusicVolume() {
  if (!musicGain) return;
  musicGain.gain.setTargetAtTime(isMuted ? 0 : getMusicConfig().vol, ac.currentTime, 0.3);
}

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  setTimeout(() => startMusic(), 300);
}

function playTone(freq, type, gainVal, duration, freqEnd) {
  if (!ac || isMuted) return;
  const g = ac.createGain();
  const osc = ac.createOscillator();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + duration);
  g.gain.setValueAtTime(gainVal, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + duration);
  osc.connect(g); g.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime + duration + 0.01);
}

function playNoise(filterType, filterFreq, gainVal, duration) {
  if (!ac || isMuted) return;
  const size = Math.floor(ac.sampleRate * Math.min(duration + 0.1, 1));
  const buf = ac.createBuffer(1, size, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < size; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const filt = ac.createBiquadFilter(); filt.type = filterType; filt.frequency.value = filterFreq;
  const g = ac.createGain();
  g.gain.setValueAtTime(gainVal, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + duration);
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(); src.stop(ac.currentTime + duration + 0.01);
}

function startThrust() {
  if (thrustGainNode || !ac || isMuted) return;

  thrustGainNode = ac.createGain();
  thrustGainNode.gain.setValueAtTime(0.0001, ac.currentTime);
  thrustGainNode.gain.linearRampToValueAtTime(0.14, ac.currentTime + 0.22);
  thrustGainNode.connect(ac.destination);
  thrustNodes = [];

  const t = ac.currentTime;
  const sr = ac.sampleRate;

  function makeNoise(secs) {
    const buf = ac.createBuffer(1, Math.floor(sr * secs), sr);
    const d = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < d.length; i++) {
      last = (last + 0.02 * (Math.random() * 2 - 1)) / 1.02;
      d[i] = last * 18;
    }
    const src = ac.createBufferSource();
    src.buffer = buf; src.loop = true;
    return src;
  }

  // ── 1. Deep sub-bass — smooth sine instead of harsh sawtooth ─
  for (const [freq, detune] of [[40, 0], [44, 5]]) {
    const osc = ac.createOscillator();
    osc.type = 'sine'; osc.frequency.value = freq;
    osc.detune.value = detune;
    const lpf = ac.createBiquadFilter();
    lpf.type = 'lowpass'; lpf.frequency.value = 260; lpf.Q.value = 1.5;
    const g = ac.createGain(); g.gain.value = 0.22;
    osc.connect(lpf); lpf.connect(g); g.connect(thrustGainNode);
    osc.start(t); thrustNodes.push(osc);
  }

  // ── 2. Smooth LFO — gentle combustion pulse ───────────────────
  const lfo1 = ac.createOscillator();
  lfo1.type = 'sine'; lfo1.frequency.value = 4;
  const lfo1g = ac.createGain(); lfo1g.gain.value = 8;
  lfo1.connect(lfo1g);
  lfo1g.connect(thrustNodes[0].frequency);
  lfo1g.connect(thrustNodes[1].frequency);
  lfo1.start(t); thrustNodes.push(lfo1);

  // ── 3. Gentle volume flutter ──────────────────────────────────
  const lfo2 = ac.createOscillator();
  lfo2.type = 'sine'; lfo2.frequency.value = 12;
  const lfo2g = ac.createGain(); lfo2g.gain.value = 0.03;
  lfo2.connect(lfo2g); lfo2g.connect(thrustGainNode.gain);
  lfo2.start(t); thrustNodes.push(lfo2);

  // ── 4. Smooth roar core — lowpass filtered noise ──────────────
  const roarSrc = makeNoise(3.0);
  const roarLPF = ac.createBiquadFilter();
  roarLPF.type = 'lowpass'; roarLPF.frequency.value = 600; roarLPF.Q.value = 1.5;
  const roarG = ac.createGain(); roarG.gain.value = 0.30;
  roarSrc.connect(roarLPF); roarLPF.connect(roarG); roarG.connect(thrustGainNode);
  roarSrc.start(t); thrustNodes.push(roarSrc);

  // ── 5. Mid body tone — triangle for smoothness ────────────────
  const bodyOsc = ac.createOscillator();
  bodyOsc.type = 'triangle'; bodyOsc.frequency.value = 110;
  const bodyLPF = ac.createBiquadFilter();
  bodyLPF.type = 'lowpass'; bodyLPF.frequency.value = 380; bodyLPF.Q.value = 0.8;
  const bodyG = ac.createGain(); bodyG.gain.value = 0.14;
  bodyOsc.connect(bodyLPF); bodyLPF.connect(bodyG); bodyG.connect(thrustGainNode);
  bodyOsc.start(t); thrustNodes.push(bodyOsc);

  // ── 6. Soft high exhaust — gentle hiss ───────────────────────
  const hissSrc = makeNoise(2.0);
  const hp1 = ac.createBiquadFilter();
  hp1.type = 'highpass'; hp1.frequency.value = 2000; hp1.Q.value = 0.5;
  const hissG = ac.createGain(); hissG.gain.value = 0.08;
  hissSrc.connect(hp1); hp1.connect(hissG); hissG.connect(thrustGainNode);
  hissSrc.start(t); thrustNodes.push(hissSrc);
}

function stopThrust() {
  if (!thrustGainNode || !ac) return;
  // Ramp master gain down with a short tail
  thrustGainNode.gain.setValueAtTime(thrustGainNode.gain.value, ac.currentTime);
  thrustGainNode.gain.linearRampToValueAtTime(0.0001, ac.currentTime + 0.22);
  const nodesToStop = thrustNodes.slice();
  const gainToDisconnect = thrustGainNode;
  setTimeout(() => {
    nodesToStop.forEach(n => { try { n.stop(); } catch(e){} });
    try { gainToDisconnect.disconnect(); } catch(e){}
  }, 350);
  thrustNodes = []; thrustGainNode = null;
}

function playRotate() {
  if (!ac || isMuted) return;
  const t = ac.currentTime;
  const osc = ac.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(140, t);
  osc.frequency.exponentialRampToValueAtTime(100, t + 0.12);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.03, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
  const lpf = ac.createBiquadFilter();
  lpf.type = 'lowpass'; lpf.frequency.value = 300; lpf.Q.value = 0.5;
  osc.connect(lpf); lpf.connect(g); g.connect(ac.destination);
  osc.start(t); osc.stop(t + 0.16);
}

function playLand() {
  if (!ac || isMuted) return;
  [523, 659, 784, 1047].forEach((freq, i) => {
    const t = ac.currentTime + i * 0.13;
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.25, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
    osc.connect(g); g.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.5);
  });
}

function playCrash() {
  if (!ac || isMuted) return;
  playTone(100, 'sine', 0.7, 0.6, 18);
  playNoise('lowpass', 500, 0.5, 0.7);
}

function playLowFuelBeep() {
  const now = Date.now();
  if (now - lastBeepTime < 900) return;
  lastBeepTime = now;
  playTone(1100, 'square', 0.07, 0.09);
}

function playLevelIntro(lvl) {
  if (!ac || isMuted) return;
  const t = ac.currentTime;

  // ── 1. Deep cinematic BWOMP ───────────────────────────────────
  const bwompOsc = ac.createOscillator();
  const bwompGain = ac.createGain();
  const bwompLPF = ac.createBiquadFilter();
  bwompOsc.type = 'sawtooth';
  bwompOsc.frequency.setValueAtTime(180, t);
  bwompOsc.frequency.exponentialRampToValueAtTime(38, t + 0.55);
  bwompLPF.type = 'lowpass'; bwompLPF.frequency.value = 400; bwompLPF.Q.value = 2;
  bwompGain.gain.setValueAtTime(0.0001, t);
  bwompGain.gain.linearRampToValueAtTime(0.45, t + 0.04);
  bwompGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
  bwompOsc.connect(bwompLPF); bwompLPF.connect(bwompGain); bwompGain.connect(ac.destination);
  bwompOsc.start(t); bwompOsc.stop(t + 0.75);

  // ── 2. Rising power chord (pitch rises each level) ────────────
  const baseFreq = 80 + (lvl - 1) * 12;
  [[1, 0.18], [1.5, 0.12], [2, 0.08]].forEach(([mult, gain], i) => {
    const o = ac.createOscillator();
    const g = ac.createGain();
    const f = ac.createBiquadFilter();
    o.type = i === 0 ? 'sawtooth' : 'square';
    o.frequency.setValueAtTime(baseFreq * mult * 0.6, t + 0.12);
    o.frequency.exponentialRampToValueAtTime(baseFreq * mult * 1.8, t + 0.55);
    f.type = 'lowpass'; f.frequency.value = 1200;
    g.gain.setValueAtTime(0.0001, t + 0.1);
    g.gain.linearRampToValueAtTime(gain, t + 0.25);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.65);
    o.connect(f); f.connect(g); g.connect(ac.destination);
    o.start(t + 0.1); o.stop(t + 0.7);
  });

  // ── 3. Metallic ping at peak ──────────────────────────────────
  const pingOsc = ac.createOscillator();
  const pingGain = ac.createGain();
  pingOsc.type = 'sine';
  pingOsc.frequency.setValueAtTime(880 + lvl * 40, t + 0.45);
  pingOsc.frequency.exponentialRampToValueAtTime(440 + lvl * 20, t + 0.9);
  pingGain.gain.setValueAtTime(0.0001, t + 0.44);
  pingGain.gain.linearRampToValueAtTime(0.22, t + 0.46);
  pingGain.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);
  pingOsc.connect(pingGain); pingGain.connect(ac.destination);
  pingOsc.start(t + 0.44); pingOsc.stop(t + 1.05);

  // ── 4. Ignition hiss burst ────────────────────────────────────
  const hissLen = Math.floor(ac.sampleRate * 0.18);
  const hissBuf = ac.createBuffer(1, hissLen, ac.sampleRate);
  const hd = hissBuf.getChannelData(0);
  for (let i = 0; i < hissLen; i++) hd[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/hissLen, 1.5);
  const hissSrc = ac.createBufferSource(); hissSrc.buffer = hissBuf;
  const hissHP = ac.createBiquadFilter(); hissHP.type = 'highpass'; hissHP.frequency.value = 1800;
  const hissGain = ac.createGain(); hissGain.gain.value = 0.18;
  hissSrc.connect(hissHP); hissHP.connect(hissGain); hissGain.connect(ac.destination);
  hissSrc.start(t + 0.44);

  // ── 5. Level-count beeps (up to 5) ───────────────────────────
  const beepCount = Math.min(lvl, 5);
  for (let i = 0; i < beepCount; i++) {
    const beepT = t + 0.85 + i * 0.13;
    const bo = ac.createOscillator();
    const bg = ac.createGain();
    bo.type = 'sine';
    bo.frequency.value = 660 + i * 80;
    bg.gain.setValueAtTime(0.0001, beepT);
    bg.gain.linearRampToValueAtTime(0.14, beepT + 0.02);
    bg.gain.exponentialRampToValueAtTime(0.0001, beepT + 0.09);
    bo.connect(bg); bg.connect(ac.destination);
    bo.start(beepT); bo.stop(beepT + 0.12);
  }
}

function updateSounds() {
  if (!ac) return;
  const thrusting = keys.thrust && lander.fuel > 0;
  const rotating = (keys.left || keys.right) && lander.fuel > 0;
  if (thrusting && !wasThrusting) startThrust();
  if (!thrusting && wasThrusting) stopThrust();
  wasThrusting = thrusting;
  if (rotating && !wasRotating) playRotate();
  wasRotating = rotating;
  if (lander.fuel < 15 && lander.fuel > 0) playLowFuelBeep();
}

function drawShipPreview(shipType, previewCanvas) {
  const pctx = previewCanvas.getContext('2d');
  const w = previewCanvas.width;
  const h = previewCanvas.height;

  // ── Background — deep space gradient ─────────────────────────
  const bgGrad = pctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w * 0.8);
  bgGrad.addColorStop(0,   'rgba(10,20,40,1)');
  bgGrad.addColorStop(0.6, 'rgba(5,10,25,1)');
  bgGrad.addColorStop(1,   'rgba(2,4,12,1)');
  pctx.fillStyle = bgGrad;
  pctx.fillRect(0, 0, w, h);

  // Subtle star dots
  pctx.fillStyle = 'rgba(255,255,255,0.6)';
  [[12,10],[88,18],[25,75],[75,30],[60,82],[18,50],[92,60],[45,15],[80,70]].forEach(([sx,sy]) => {
    pctx.beginPath();
    pctx.arc(sx * w / 100, sy * h / 100, 0.7, 0, Math.PI * 2);
    pctx.fill();
  });

  // ── Ship glow backdrop ────────────────────────────────────────
  const colors = getShipColors(shipType);
  // Convert hex to rgba safely
  const hexToRgba = (hex, alpha) => {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  };
  const glowGrad = pctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w * 0.45);
  glowGrad.addColorStop(0, hexToRgba(colors.primary, 0.18));
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  pctx.fillStyle = glowGrad;
  pctx.fillRect(0, 0, w, h);

  // ── Draw ship using main drawShipBody ─────────────────────────
  const savedCtx = ctx;
  try {
    ctx = pctx;
    pctx.save();
    pctx.translate(w / 2, h / 2 + 10);
    pctx.scale(2.2, 2.2);
    const TOP    = -26;
    const NOZZLE =  18;
    drawShipBody(shipType, TOP, NOZZLE);
    pctx.restore();
  } catch(e) {
    console.warn('Ship preview error:', e);
    pctx.restore?.();
  } finally {
    ctx = savedCtx;
  }

  // ── Subtle floor reflection ───────────────────────────────────
  pctx.save();
  pctx.globalAlpha = 0.08;
  pctx.scale(1, -0.3);
  pctx.translate(0, -(h + h * 0.85));
  pctx.drawImage(previewCanvas, 0, 0);
  pctx.restore();
}

function renderStatRows() {
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = '';
  const used = statPointsUsed();
  document.getElementById('budgetDisplay').textContent = `(${used}/${TOTAL_STAT_POINTS} PTS)`;
  document.getElementById('budgetDisplay').style.color = used === TOTAL_STAT_POINTS ? '#ffed4e' : '#ff4444';

  STAT_DEFS.forEach(def => {
    const val = customShipConfig.stats[def.key] || 3;
    const used = statPointsUsed();

    const row = document.createElement('div');
    row.className = 'stat-row';

    const label = document.createElement('div');
    label.className = 'stat-label';
    label.textContent = def.label;

    const minusBtn = document.createElement('button');
    minusBtn.className = 'stat-btn';
    minusBtn.textContent = '−';
    minusBtn.disabled = val <= 1;
    minusBtn.addEventListener('click', () => {
      if (customShipConfig.stats[def.key] > 1) {
        customShipConfig.stats[def.key]--;
        renderStatRows();
        refreshCustomPreview();
      }
    });

    const barsDiv = document.createElement('div');
    barsDiv.className = 'stat-bars';
    for (let i = 1; i <= 5; i++) {
      const bar = document.createElement('div');
      bar.className = 'stat-bar' + (i <= val ? ' filled' : '');
      barsDiv.appendChild(bar);
    }

    const plusBtn = document.createElement('button');
    plusBtn.className = 'stat-btn';
    plusBtn.textContent = '+';
    plusBtn.disabled = val >= 5 || used >= TOTAL_STAT_POINTS;
    plusBtn.addEventListener('click', () => {
      if (customShipConfig.stats[def.key] < 5 && statPointsUsed() < TOTAL_STAT_POINTS) {
        customShipConfig.stats[def.key]++;
        renderStatRows();
        refreshCustomPreview();
      }
    });

    row.appendChild(label);
    row.appendChild(minusBtn);
    row.appendChild(barsDiv);
    row.appendChild(plusBtn);
    grid.appendChild(row);
  });
}

function refreshCustomPreview() {
  const previewCanvas = document.getElementById('customPreviewCanvas');
  if (previewCanvas) drawShipPreview('custom', previewCanvas);

  { id: 'no_leaf_clear', icon: '⚡', name: 'PURE RUN',       desc: 'Clear a level without collecting any leaves'},
  { id: 'low_fuel_land', icon: '😰', name: 'FUMES ONLY',     desc: 'Land with less than 10% fuel remaining'},
];

let achUnlocked = {};
let achStats    = { lands: 0, perfects: 0, leaves: 0, crashes: 0, maxScore: 0, maxStreak: 0 };
let achQueue    = []; // notifications pending display
let achToast    = null; // current toast animation state

function loadAchievements() {
  try {
    const u = localStorage.getItem(ACH_KEY);
    if (u) achUnlocked = JSON.parse(u);
    const s = localStorage.getItem(ACH_STATS_KEY);
    if (s) achStats = { ...achStats, ...JSON.parse(s) };
  } catch(e) {}
}

function saveAchievements() {
  try {
    localStorage.setItem(ACH_KEY, JSON.stringify(achUnlocked));
    localStorage.setItem(ACH_STATS_KEY, JSON.stringify(achStats));
  } catch(e) {}
}

function unlockAchievement(id) {
  if (achUnlocked[id]) return;
  achUnlocked[id] = Date.now();
  saveAchievements();
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  if (ach) achQueue.push(ach);
}

function checkAchievements({ landed, perfect, leafCollected, crashed, currentScore, currentStreak, leavesThisLevel }) {
  if (landed) {
    achStats.lands++;
    if (perfect) achStats.perfects++;
    achStats.maxStreak = Math.max(achStats.maxStreak, currentStreak);
    unlockAchievement('first_land');
    if (perfect) unlockAchievement('first_perfect');
    if (currentStreak >= 3) unlockAchievement('streak_3');
    if (currentStreak >= 5) unlockAchievement('streak_5');
    if (lander.fuel < 10) unlockAchievement('low_fuel_land');
    if (leavesThisLevel === 0) unlockAchievement('no_leaf_clear');
  }
  if (leafCollected) {
    achStats.leaves++;
    unlockAchievement('first_leaf');
    if (achStats.leaves >= 5)  unlockAchievement('leaves_5');
    if (achStats.leaves >= 20) unlockAchievement('leaves_20');
  }
  if (crashed) {
    achStats.crashes++;
    if (achStats.crashes >= 10) unlockAchievement('crashes_10');
  }
  if (currentScore >= 5000)  unlockAchievement('score_5k');
  if (currentScore >= 15000) unlockAchievement('score_15k');
  if (level >= 5)  unlockAchievement('level_5');
  if (level >= 10) unlockAchievement('level_10');
  if (level >= 16) unlockAchievement('level_16');
  if (selectedShip === 'custom') unlockAchievement('custom_pilot');
  achStats.maxScore = Math.max(achStats.maxScore, currentScore);
  saveAchievements();
}

// ── Toast notification ────────────────────────────────────────
function drawAchievementToast() {
  if (!achToast && achQueue.length > 0) {
    achToast = { ach: achQueue.shift(), timer: 0 };
  }
  if (!achToast) return;

  achToast.timer += 0.025;
  const t = achToast.timer;
  const SHOW = 2.5;

  if (t > SHOW) { achToast = null; return; }

  const W = canvas.width;
  const slideIn  = Math.min(1, t / 0.3);
  const slideOut = t > SHOW - 0.4 ? 1 - (t - (SHOW - 0.4)) / 0.4 : 1;
  const alpha    = slideIn * slideOut;
  const tx2      = W / 2;
  const ty       = 60 + (1 - slideIn) * -40;

  const toastW = Math.min(280, W * 0.82);
  const toastH = 52;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Backdrop
  ctx.fillStyle = 'rgba(0,18,0,0.92)';
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.roundRect(tx2 - toastW / 2, ty - toastH / 2, toastW, toastH, 8);
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;

  // Icon
  ctx.font = '22px serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(achToast.ach.icon, tx2 - toastW / 2 + 12, ty);

  // "ACHIEVEMENT UNLOCKED" label
  ctx.font = `bold 8px 'Share Tech Mono', monospace`;
  ctx.fillStyle = 'rgba(0,255,136,0.6)';
  ctx.textAlign = 'left';
  ctx.fillText('ACHIEVEMENT UNLOCKED', tx2 - toastW / 2 + 44, ty - 10);

  // Achievement name
  ctx.font = `bold 13px 'Orbitron', monospace`;
  ctx.fillStyle = '#00ff88';
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 8;
  ctx.fillText(achToast.ach.name, tx2 - toastW / 2 + 44, ty + 7);
  ctx.shadowBlur = 0;

  ctx.restore();
}

// ── Badge wall screen ─────────────────────────────────────────
function showBadgeWall() {
  document.getElementById('game-menu').style.display = 'none';
  const wall = document.getElementById('badge-wall');
  wall.style.display = 'flex';

  // Scroll overlay to top so badges start from the beginning
  const overlay = document.getElementById('overlay');
  overlay.scrollTop = 0;

  const grid = document.getElementById('badge-grid');
  grid.innerHTML = '';

  const earned = ACHIEVEMENTS.filter(a => achUnlocked[a.id]).length;
  const total  = ACHIEVEMENTS.length;

  wall.querySelector('.overlay-title').innerHTML =
    `🏅 BADGES <span style="font-size:11px;letter-spacing:1px;color:rgba(0,255,136,0.6);">${earned}/${total}</span>`;

  ACHIEVEMENTS.forEach(ach => {
    const isEarned  = !!achUnlocked[ach.id];
    const earnedTs  = achUnlocked[ach.id];
    const dateStr   = isEarned ? new Date(earnedTs).toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '';

    const card = document.createElement('div');
    card.className = 'badge-card' + (isEarned ? ' earned' : '');
    card.innerHTML = `
      <div class="badge-icon">${isEarned ? ach.icon : '🔒'}</div>
      <div class="badge-name">${ach.name}</div>
      <div class="badge-desc">${isEarned ? ach.desc : '???'}</div>
      ${isEarned ? `<div style="font-family:'Share Tech Mono',monospace;font-size:7px;color:rgba(0,255,136,0.4);margin-top:2px;">${dateStr}</div>` : ''}
    `;
    grid.appendChild(card);
  });
}

function hideBadgeWall() {
  document.getElementById('badge-wall').style.display = 'none';
  document.getElementById('game-menu').style.display = 'flex';
  // Scroll back to top for the main menu
  document.getElementById('overlay').scrollTop = 0;
}

function renderShipSelect() {
  const shipGrid = document.getElementById('shipGrid');
  shipGrid.innerHTML = '';
  
  Object.entries(SHIPS).forEach(([key, ship]) => {
    const isUnlocked = level >= ship.unlockedAtLevel;
    const isSelected = key === selectedShip;
    const isCustom = key === 'custom';
    
    const card = document.createElement('div');
    card.className = `ship-card ${isSelected ? 'selected' : ''} ${!isUnlocked ? 'locked' : ''}`;
    
    if (isCustom) {
      card.innerHTML = `
        <canvas class="ship-preview" width="180" height="200"></canvas>
        <div style="flex:1;">
          <div class="ship-name" style="${isSelected ? '' : 'color:#00ff88;'}">${ship.name}</div>
          <div class="ship-stats">
            <div>Thrust: <span style="color:#00ff88;">${(ship.thrustMult*100).toFixed(0)}%</span></div>
            <div>Fuel: <span style="color:#00ff88;">${(ship.fuelMult*100).toFixed(0)}%</span></div>
            <div>Control: <span style="color:#00ff88;">${(ship.controlMult*100).toFixed(0)}%</span></div>
          </div>
          <div style="margin-top:8px;">
            <button class="start-btn" style="font-size:10px;padding:6px 14px;letter-spacing:1px;" id="openCustomizerBtn">✏️ CUSTOMIZE</button>
          </div>
        </div>
      `;
      const canvas = card.querySelector('.ship-preview');
      drawShipPreview('custom', canvas);
      card.querySelector('#openCustomizerBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        openCustomEditor();
      });
      card.addEventListener('click', () => {
        selectedShip = 'custom';
        currentShipStats = SHIPS.custom;
        saveSelectedShip('custom');
        hideShipSelect();
      });
    } else {
      card.innerHTML = `
        <canvas class="ship-preview" width="180" height="200"></canvas>
        <div style="flex: 1;">
          <div class="ship-name">${ship.name}</div>
          <div class="ship-stats">
            <div>Thrust: <span style="color: #00ff88;">${(ship.thrustMult * 100).toFixed(0)}%</span></div>
            <div>Fuel: <span style="color: #00ff88;">${(ship.fuelMult * 100).toFixed(0)}%</span></div>
            <div>Control: <span style="color: #00ff88;">${(ship.controlMult * 100).toFixed(0)}%</span></div>
          </div>
        </div>
        ${!isUnlocked ? `<div class="ship-lock">🔒</div><div class="ship-unlock-text">Lvl ${ship.unlockedAtLevel}</div>` : ''}
      `;
      const canvas = card.querySelector('.ship-preview');
      drawShipPreview(key, canvas);
      if (isUnlocked) {
        card.addEventListener('click', () => {
          selectedShip = key;
          currentShipStats = SHIPS[key];
          saveSelectedShip(key);
          hideShipSelect();
        });
      }
    }
    
    shipGrid.appendChild(card);
  });
}

function showShipSelect() {
  document.getElementById('ship-select').classList.add('visible');
  document.getElementById('game-menu').style.display = 'none';
  renderShipSelect();
}

function hideShipSelect() {
  document.getElementById('ship-select').classList.remove('visible');
  document.getElementById('game-menu').style.display = 'flex';
}

document.getElementById('startBtn').addEventListener('click', handleStart);
document.getElementById('startBtn').addEventListener('touchend', (e) => { e.preventDefault(); handleStart(); });
document.getElementById('shipSelectBtn').addEventListener('click', showShipSelect);
document.getElementById('badgesBtn').addEventListener('click', showBadgeWall);
document.getElementById('badgeBackBtn').addEventListener('click', hideBadgeWall);

// Mute button
document.getElementById('muteBtn').addEventListener('click', () => {
  isMuted = !isMuted;
  const muteBtn = document.getElementById('muteBtn');
  if (isMuted) {
    muteBtn.textContent = '🔇';
    muteBtn.classList.add('muted');
    stopThrust();
  } else {
    muteBtn.textContent = '🔊';
    muteBtn.classList.remove('muted');
  }
  updateMusicVolume();
});

// Show leaderboard on initial load
renderLeaderboard(null).catch(()=>{});
initDemoShip();

// ── BACKGROUND STARS ──────────────────────────────────────────
function createStars() {
  // Create static twinkling stars
  const starCount = 40;
  for (let i = 0; i < starCount; i++) {
    const star = document.createElement('div');
    star.className = 'star twinkle';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 80 + '%';
    star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
    star.style.opacity = Math.random() * 0.7 + 0.3;
    document.body.insertBefore(star, document.querySelector('canvas'));
  }
}

function createShootingStars() {
  const shootingStarCount = 3;
  for (let i = 0; i < shootingStarCount; i++) {
    setTimeout(() => {
      const star = document.createElement('div');
      star.className = 'shooting-star';
      const startY = Math.random() * 60; // Appear in upper 60% of screen
      star.style.setProperty('--start-y', startY + '%');
      star.style.setProperty('--offset', (Math.random() * 100 - 50) + 'px');
      star.style.setProperty('--duration', (3 + Math.random() * 2) + 's');
      star.style.setProperty('--delay', (Math.random() * 2) + 's');
      document.body.insertBefore(star, document.querySelector('canvas'));
      
      // Remove after animation completes
      setTimeout(() => star.remove(), (5 + Math.random() * 2) * 1000);
    }, i * 4000 + Math.random() * 2000);
  }
  
  // Keep creating new shooting stars
  setInterval(() => {
    const star = document.createElement('div');
    star.className = 'shooting-star';
    const startY = Math.random() * 60;
    star.style.setProperty('--start-y', startY + '%');
    star.style.setProperty('--offset', (Math.random() * 100 - 50) + 'px');
    star.style.setProperty('--duration', (3 + Math.random() * 2) + 's');
    star.style.setProperty('--delay', '0s');
    document.body.insertBefore(star, document.querySelector('canvas'));
    
    setTimeout(() => star.remove(), (5 + Math.random() * 2) * 1000);
  }, 6000 + Math.random() * 4000);
}

createStars();
createShootingStars();
// ── END BACKGROUND STARS ──────────────────────────────────────────

// ── HIDE SPEEDS ON TITLE SCREEN ───────────────────────────────────
const hideSpeedOnMenu = () => {
  const overlay = document.getElementById('overlay');
  const vspd = document.getElementById('vspdVal')?.closest('.hud-item');
  const hspd = document.getElementById('hspdVal')?.closest('.hud-item');
  if (!vspd || !hspd) return;
  if (overlay.classList.contains('hidden')) {
    vspd.style.display = '';
    hspd.style.display = '';
  } else {
    vspd.style.display = 'none';
    hspd.style.display = 'none';
  }
};

// Hide speeds initially
hideSpeedOnMenu();

// Watch for overlay visibility changes
const observer = new MutationObserver(() => hideSpeedOnMenu());
observer.observe(document.getElementById('overlay'), { attributes: true, attributeFilter: ['class'] });

requestAnimationFrame(loop);

// Show best level on initial load if previously set
(function() {
  loadCustomShip();
  loadAchievements();
  const savedShip = loadSelectedShip();
  if (SHIPS[savedShip] && level >= SHIPS[savedShip].unlockedAtLevel) {
    selectedShip = savedShip;
    currentShipStats = SHIPS[savedShip];
  }
  const bestLvl = getBestLevel();
  if (bestLvl > 0) {
    const bestDisp = document.getElementById('bestLevelDisplay');
    const bestVal  = document.getElementById('bestLevelVal');
    if (bestDisp && bestVal) {
      bestVal.textContent = bestLvl;
      bestDisp.style.display = 'block';
    }
  }
})();
</script>
