    // The innermost core has a faint barrel-shaped boundary
    const barrelH = coreH * 0.75;
    const barrelW = 3.8 * pulse;
    ctx.beginPath();
    ctx.moveTo(-barrelW * 0.6, NOZZLE + 1);
    ctx.bezierCurveTo(-barrelW, NOZZLE + barrelH*0.3, -barrelW, NOZZLE + barrelH*0.7, -barrelW*0.4, NOZZLE + barrelH);
    ctx.bezierCurveTo( barrelW*0.4, NOZZLE + barrelH,  barrelW, NOZZLE + barrelH*0.7,  barrelW, NOZZLE + barrelH*0.3);
    ctx.bezierCurveTo( barrelW * 0.6, NOZZLE + 1, -barrelW*0.6, NOZZLE + 1, -barrelW*0.6, NOZZLE + 1);
    const barrelAlpha = 0.18 + f4 * 0.12;
    ctx.strokeStyle = `rgba(180,225,255,${barrelAlpha})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  // ── LANDING LEGS ────────────────────────────────────────────
  // Left leg strut
  ctx.strokeStyle = '#7a8fa8';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-9, NOZZLE - 2); ctx.lineTo(-20, NOZZLE + 12);
  ctx.stroke();
  // Right leg strut
  ctx.beginPath();
  ctx.moveTo(9, NOZZLE - 2); ctx.lineTo(20, NOZZLE + 12);
  ctx.stroke();
  // Left brace
  ctx.strokeStyle = '#5a6f88';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-5, NOZZLE + 4); ctx.lineTo(-20, NOZZLE + 12);
  ctx.stroke();
  // Right brace
  ctx.beginPath();
  ctx.moveTo(5, NOZZLE + 4); ctx.lineTo(20, NOZZLE + 12);
  ctx.stroke();
  // Left footpad
  ctx.strokeStyle = '#7a8fa8';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-24, NOZZLE + 12); ctx.lineTo(-16, NOZZLE + 12);
  ctx.stroke();
  // Right footpad
  ctx.beginPath();
  ctx.moveTo(16, NOZZLE + 12); ctx.lineTo(24, NOZZLE + 12);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // ── ENGINE BELL ─────────────────────────────────────────────
  const bellGrad = ctx.createLinearGradient(-8, NOZZLE - 6, 8, NOZZLE);
  bellGrad.addColorStop(0, '#4a5a6a');
  bellGrad.addColorStop(0.5, '#8a9db0');
  bellGrad.addColorStop(1, '#3a4a5a');
  ctx.fillStyle = bellGrad;
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-5, NOZZLE - 7);
  ctx.lineTo(-8, NOZZLE);
  ctx.lineTo(8, NOZZLE);
  ctx.lineTo(5, NOZZLE - 7);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Nozzle ring
  ctx.beginPath();
  ctx.moveTo(-8, NOZZLE); ctx.lineTo(8, NOZZLE);
  ctx.strokeStyle = '#aabbcc';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── MAIN BODY ───────────────────────────────────────────────
  // Body shadow/base
  const bodyGrad = ctx.createLinearGradient(-14, TOP, 14, NOZZLE - 6);
  bodyGrad.addColorStop(0,   '#d0dae8');
  bodyGrad.addColorStop(0.3, '#e8eef5');
  bodyGrad.addColorStop(0.7, '#b8c8d8');
  bodyGrad.addColorStop(1,   '#8898a8');
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = '#6a7a8a';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, TOP);              // nose tip
  ctx.lineTo(10, TOP + 10);        // upper right
  ctx.lineTo(13, TOP + 24);        // mid right
  ctx.lineTo(9, NOZZLE - 6);       // lower right shoulder
  ctx.lineTo(5, NOZZLE - 7);       // engine right
  ctx.lineTo(-5, NOZZLE - 7);      // engine left
  ctx.lineTo(-9, NOZZLE - 6);      // lower left shoulder
  ctx.lineTo(-13, TOP + 24);       // mid left
  ctx.lineTo(-10, TOP + 10);       // upper left
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Body panel lines
  ctx.strokeStyle = 'rgba(100,130,160,0.5)';
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(-11, TOP + 15); ctx.lineTo(11, TOP + 15);
  ctx.moveTo(-12, TOP + 22); ctx.lineTo(12, TOP + 22);
  ctx.stroke();

  // Left side panel shading
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.moveTo(-10, TOP + 10);
  ctx.lineTo(-13, TOP + 24);
  ctx.lineTo(-9, NOZZLE - 6);
  ctx.lineTo(-6, TOP + 10);
  ctx.closePath();
  ctx.fill();

  // Right highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.moveTo(2, TOP + 1);
  ctx.lineTo(9, TOP + 10);
  ctx.lineTo(7, TOP + 22);
  ctx.lineTo(2, TOP + 22);
  ctx.closePath();
  ctx.fill();

  // ── NOSE CAP ────────────────────────────────────────────────
  const noseGrad = ctx.createRadialGradient(-2, TOP + 3, 1, 0, TOP + 6, 8);
  noseGrad.addColorStop(0, '#f0f4f8');
  noseGrad.addColorStop(1, '#8898a8');
  ctx.fillStyle = noseGrad;
  ctx.strokeStyle = '#5a6a7a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, TOP);
  ctx.lineTo(7, TOP + 10);
  ctx.lineTo(-7, TOP + 10);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // ── COCKPIT WINDOW ──────────────────────────────────────────
  // Outer frame
  ctx.fillStyle = '#2a3a4a';
  ctx.strokeStyle = '#4a6a8a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(0, TOP + 14, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // Glass
  const winGrad = ctx.createRadialGradient(-1.5, TOP + 12, 0.5, 0, TOP + 14, 5.5);
  winGrad.addColorStop(0,   'rgba(180,230,255,0.95)');
  winGrad.addColorStop(0.5, 'rgba(80,160,220,0.8)');
  winGrad.addColorStop(1,   'rgba(20,60,120,0.9)');
  ctx.fillStyle = winGrad;
  ctx.beginPath();
  ctx.ellipse(0, TOP + 14, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Glare
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(-1.5, TOP + 12, 2, 1.2, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // ── SIDE ANTENNA ────────────────────────────────────────────
  ctx.strokeStyle = '#aabbcc';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(10, TOP + 10); ctx.lineTo(16, TOP + 4);
  ctx.stroke();
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(16, TOP + 4, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // ── RCS THRUSTERS (small side nozzles) ──────────────────────
  ctx.fillStyle = '#4a5a6a';
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 0.8;
  // Left RCS
  ctx.beginPath();
  ctx.rect(-15, TOP + 19, -3, 4);
  ctx.fill(); ctx.stroke();
  // Right RCS
  ctx.beginPath();
  ctx.rect(15, TOP + 19, 3, 4);
  ctx.fill(); ctx.stroke();

  // RCS puffs when rotating
  if (lander.leftThrust && lander.fuel > 0) {
    ctx.fillStyle = `rgba(180,220,255,${0.3 + flicker * 0.3})`;
    ctx.beginPath();
    ctx.arc(-20, TOP + 21, 3 + flicker * 2, 0, Math.PI * 2);
    ctx.fill();
  }
  if (lander.rightThrust && lander.fuel > 0) {
    ctx.fillStyle = `rgba(180,220,255,${0.3 + flicker * 0.3})`;
    ctx.beginPath();
    ctx.arc(20, TOP + 21, 3 + flicker * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── HULL MARKINGS ────────────────────────────────────────────
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 4px Arial';
  ctx.strokeStyle = '#1a4d1a';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.strokeText("NATTY'S", 0, TOP + 23);
  ctx.fillStyle = '#6efa9a';
  ctx.fillText("NATTY'S", 0, TOP + 23);
  ctx.restore();

  ctx.restore();
}

function drawParticles() {
  // ── Screen flash ─────────────────────────────────────────────
  if (Math.abs(screenFlash) > 0.01) {
    const fi = Math.abs(screenFlash);
    if (screenFlash > 0) {
      // Crash — orange/white flash
      ctx.fillStyle = `rgba(255,180,60,${fi * 0.55})`;
    } else if (fi > 0.6) {
      // Perfect landing — gold flash
      ctx.fillStyle = `rgba(255,215,0,${(fi - 0.6) * 0.6})`;
    } else {
      // Normal landing — soft green flash
      ctx.fillStyle = `rgba(0,255,120,${fi * 0.28})`;
    }
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ── Shockwave rings ──────────────────────────────────────────
  shockwaves.forEach(sw => {
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${sw.color},${sw.alpha * (1 - sw.r / sw.maxR)})`;
    ctx.lineWidth = 2.5 * (1 - sw.r / sw.maxR) + 0.5;
    ctx.stroke();
  });

  // ── Floating score text ───────────────────────────────────────
  floatingTexts.forEach(ft => {
    ctx.save();
    ctx.globalAlpha = ft.alpha;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `bold ${ft.size}px Orbitron, monospace`;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(ft.text, ft.x + 1.5, ft.y + 1.5);
    // Main text
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y);
    // Glow
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 8;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  });

  // ── Ship exhaust trail (comet tail) ──────────────────────────
  trailParts.forEach(p => {
    const a = p.life * 0.35;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,255,136,${a})`;
    ctx.fill();
  });

  // ── Thrust exhaust particles ──────────────────────────────────
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace(')', `,${p.life})`).replace('hsl', 'hsla');
    ctx.fill();
  });

  // ── Explosion particles ───────────────────────────────────────
  explosionParts.forEach(p => {
    const a = Math.min(p.life, 1);
    if (p.type === 'smoke') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (1.5 - p.life * 0.5), 0, Math.PI * 2);
      ctx.fillStyle = p.color.replace('hsl', 'hsla').replace(')', `,${a * 0.35})`);
      ctx.fill();
    } else if (p.type === 'spark') {
      // Sparks as short lines
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 2.5, p.y - p.vy * 2.5);
      ctx.strokeStyle = p.color.replace('hsl','hsla').replace(')',`,${a})`);
      ctx.lineWidth = p.size;
      ctx.stroke();
    } else if (p.type === 'debris') {
      // Debris as small rectangles
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot || 0);
      ctx.fillStyle = p.color.replace('hsl','hsla').replace(')',`,${a})`);
      ctx.fillRect(-p.size, -p.size * 0.5, p.size * 2, p.size);
      ctx.restore();
    } else {
      // Fire
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
      ctx.fillStyle = p.color.replace('hsl','hsla').replace(')',`,${a})`);
      ctx.fill();
    }
  });

  // ── Landing dust ─────────────────────────────────────────────
  landDustParts.forEach(p => {
    if (p.pebble) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.gold
        ? `rgba(255,215,0,${p.alpha * p.life})`
        : `rgba(200,140,60,${p.alpha * p.life})`;
      ctx.fill();
    } else {
      // Soft dust puff
      const rg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * (1.4 - p.life * 0.3));
      rg.addColorStop(0,   `rgba(220,170,90,${p.alpha * p.life * 0.7})`);
      rg.addColorStop(0.5, `rgba(190,130,60,${p.alpha * p.life * 0.35})`);
      rg.addColorStop(1,   'rgba(160,100,40,0)');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (1.4 - p.life * 0.3), 0, Math.PI * 2);
      ctx.fillStyle = rg;
      ctx.fill();
    }
  });
}

// Game loop
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Screen shake
  if (screenShake > 0.5) {
    const sx = (Math.random() - 0.5) * screenShake;
    const sy = (Math.random() - 0.5) * screenShake;
    ctx.save();
    ctx.translate(sx, sy);
  }

  // Background — deep desert night sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.7);
  skyGrad.addColorStop(0,   '#08040e');
  skyGrad.addColorStop(0.6, '#100818');
  skyGrad.addColorStop(1,   '#200a04');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawStars();
  drawTerrain();
  drawParticles();
  if (gameState === 'menu') {
    drawRocketInterior();
    drawKavaShell();
  }
  drawLander();

  if (gameState === 'playing' && !lander.landed && !lander.crashed) {
    updateSounds();
    // Gravity & wind
    const gravity = levelGravity();
    lander.vy += gravity * dt;

    lander.thrusting = keys.thrust && lander.fuel > 0;
    lander.leftThrust = keys.left && lander.fuel > 0;
    lander.rightThrust = keys.right && lander.fuel > 0;

    if (keys.left) {
      lander.angle -= ROTATE_SPEED * dt;
      lander.fuel -= FUEL_COST_SIDE * dt * 0.5;
    }
    if (keys.right) {
      lander.angle += ROTATE_SPEED * dt;
      lander.fuel -= FUEL_COST_SIDE * dt * 0.5;
    }

    if (lander.thrusting) {
      lander.vx += Math.sin(lander.angle) * THRUST_POWER * dt;
      lander.vy -= Math.cos(lander.angle) * THRUST_POWER * dt;
      lander.fuel -= FUEL_COST_MAIN * dt;
      spawnThrustParticles();
    }

    // ── Exhaust trail — spawn every frame regardless of thrust ──
    if (Math.random() < 0.6) {
      trailParts.push({
        x: lander.x,
        y: lander.y,
        life: 1,
        decay: 0.025 + Math.random() * 0.015,
        size: 1.5 + Math.random() * 2,
      });
    }
    if (lander.fuel < 0) lander.fuel = 0;
    lander.x += lander.vx * dt;
    lander.y += lander.vy * dt;

    // ── Off-screen = Lost In Space ────────────────────────────
    const margin = 40;
    if (lander.x < -margin || lander.x > canvas.width + margin || lander.y < -margin) {
      lander.crashed = true;
      stopThrust();
      screenFlash = 0.6;
      showResult(false, 0, 1, 'LOST IN SPACE 🚀');
    }

    // Collision
    const col = checkCollision();
    if (col.hit) {
      // Normalize angle to -PI..PI range
      const tilt = ((lander.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const normalizedTilt = tilt > Math.PI ? tilt - Math.PI * 2 : tilt;
      const maxTilt = Math.PI / 9; // ~20 degrees
      const tooTilted = Math.abs(normalizedTilt) > maxTilt;

      if (col.onPad && Math.abs(lander.vy) < 20 && Math.abs(lander.vx) < 15 && !tooTilted) {
        // ── Check for PERFECT landing ──────────────────────────
        const padCenterX = col.onPad.x + col.onPad.width / 2;
        const centerOffset = Math.abs(lander.x - padCenterX);
        const isPerfect = centerOffset < col.onPad.width * 0.2
          && Math.abs(lander.vy) < 5
          && Math.abs(lander.vx) < 3
          && Math.abs(normalizedTilt) < Math.PI / 36; // < 5 degrees

        // Successful landing
        lander.landed = true;
        stopThrust();
        playLand();
        playLevelClear(isPerfect);
        spawnLandingDust(lander.x, lander.y, col.onPad.width);
        if (isPerfect) spawnPerfectBurst(lander.x, lander.y);
        const speedBonus = Math.floor((20 - Math.abs(lander.vy)) * 5);
        const fuelBonus = Math.floor(lander.fuel * 2);
        const padBonus = col.onPad.bonus;
        const perfectBonus = isPerfect ? 250 : 0;
        const landScore = (100 + speedBonus + fuelBonus) * padBonus + perfectBonus;
        score += landScore;

        // Floating score texts
        spawnFloatingText(lander.x, lander.y - 30, `+${landScore}`, isPerfect ? '#ffd700' : '#00ff88', isPerfect ? 18 : 15);
        if (isPerfect) spawnFloatingText(lander.x, lander.y - 55, '⭐ PERFECT!', '#ffd700', 13);
        if (padBonus === 2) spawnFloatingText(lander.x + 30, lander.y - 42, '×2 BONUS', '#ffaa00', 11);
        if (speedBonus > 60) spawnFloatingText(lander.x - 28, lander.y - 42, 'SMOOTH!', '#44ffcc', 10);
        showResult(true, landScore, col.onPad.bonus, null, isPerfect);
      } else {
        // Crash
        lander.crashed = true;
        stopThrust();
        playCrash();
        spawnExplosion(lander.x, lander.y);
        screenShake = 18; // kick the shake
        const reason = tooTilted ? 'TILTED TOO FAR!' : 'TOO FAST OR OFF-PAD';
        // Delay game over overlay so explosion can play out
        setTimeout(() => showResult(false, 0, 1, reason), 2200);
      }
    }

    updateHUD();
  }

  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= p.decay * dt;
    return p.life > 0;
  });
  explosionParts = explosionParts.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.12 * dt;
    p.vx *= 0.98;
    if (p.rot !== undefined) p.rot += p.rotV * dt;
    p.life -= p.decay * dt;
    return p.life > 0;
  });
  landDustParts = landDustParts.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy -= 0.02 * dt; // dust rises slightly
    p.vx *= 0.97;
    p.size += 0.15 * dt; // puffs expand
    p.life -= p.decay * dt;
    return p.life > 0;
  });
  trailParts = trailParts.filter(p => {
    p.life -= p.decay * dt;
    return p.life > 0;
  });
  floatingTexts = floatingTexts.filter(ft => {
    ft.x  += ft.vx * dt;
    ft.y  += ft.vy * dt;
    ft.vy *= Math.pow(0.97, dt); // slow down over time
    ft.life  -= ft.decay * dt;
    ft.alpha  = ft.life;
    return ft.life > 0;
  });
  shockwaves = shockwaves.filter(sw => {
    sw.r += 4.5 * dt;
    return sw.r < sw.maxR;
  });
  if (Math.abs(screenFlash) > 0.001) {
    screenFlash *= Math.pow(0.88, dt);
    if (Math.abs(screenFlash) < 0.01) screenFlash = 0;
  }
  if (screenShake > 0.5) {
    screenShake *= Math.pow(0.82, dt);
    ctx.restore(); // close the shake translate
    if (screenShake < 0.5) screenShake = 0;
  }

  // ── Level number flash ────────────────────────────────────────
  if (levelFlash && levelFlash.alpha > 0.01) {
    const lf = levelFlash;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const fontSize = Math.floor(canvas.width * 0.18 * lf.scale);
    ctx.save();
    ctx.globalAlpha = Math.min(1, lf.alpha);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `bold ${fontSize}px Orbitron, monospace`;
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 40 * lf.alpha;
    ctx.fillStyle = `rgba(0,255,136,${lf.alpha * 0.15})`;
    ctx.fillText(lf.text, cx, cy);
    ctx.shadowBlur = 20 * lf.alpha;
    ctx.fillStyle = `rgba(0,255,136,${lf.alpha})`;
    ctx.fillText(lf.text, cx, cy);
    if (lf.scale > 1.4) {
      ctx.fillStyle = `rgba(255,255,255,${(lf.scale - 1.4) * lf.alpha * 1.5})`;
      ctx.fillText(lf.text, cx, cy);
    }
    ctx.restore();
    lf.scale = Math.max(1.0, lf.scale - 0.08 * dt);
    lf.alpha -= lf.decay * dt;
    if (lf.alpha <= 0.01) levelFlash = null;
  }

  requestAnimationFrame(loop);
}

// ── LEADERBOARD ───────────────────────────────────────────────
const LB_KEY = 'natty-lander-scores';
const LB_MAX = 8;

function loadScores() {
  try { const d = localStorage.getItem(LB_KEY); return d ? JSON.parse(d) : []; } catch(e) { return []; }
}
function saveScores(scores) {
  try { localStorage.setItem(LB_KEY, JSON.stringify(scores)); } catch(e) {}
}
function addScore(initials, pts, lvl) {
  const scores = loadScores();
  scores.push({ name: initials, score: pts, level: lvl });
  scores.sort((a, b) => b.score - a.score);
  saveScores(scores.slice(0, LB_MAX));
}
function renderLeaderboard(highlightScore) {
  try {
    const lb = document.getElementById('leaderboard');
    const rows = document.getElementById('lb-rows');
    if (!lb || !rows) return;
    const scores = loadScores();
    lb.style.display = 'block';
    if (scores.length === 0) {
      rows.innerHTML = '<div style="text-align:center;color:rgba(0,255,136,0.4);font-size:11px;padding:8px;">NO SCORES YET — BE THE FIRST!</div>';
      return;
    }
    rows.innerHTML = scores.map((s, i) => {
      const isNew = highlightScore && s.score === highlightScore && i === scores.findIndex(x => x.score === highlightScore);
      return '<div class="lb-row' + (isNew ? ' highlight' : '') + '">'
        + '<span class="lb-rank">#' + (i+1) + '</span>'
        + '<span class="lb-name">' + s.name + '</span>'
        + '<span class="lb-score">' + s.score.toLocaleString() + '</span>'
        + '<span class="lb-level">LVL ' + s.level + '</span>'
        + '</div>';
    }).join('');
  } catch(e) {}
}
function checkHighScore(pts) {
  try {
    const scores = loadScores();
    return scores.length < LB_MAX || pts > (scores[scores.length-1]?.score || 0);
  } catch(e) { return false; }
}
function showInitialsEntry(pts, lvl) {
  const entry = document.getElementById('initials-entry');
  const input = document.getElementById('initials-input');
  const btn   = document.getElementById('save-score-btn');
  if (!entry || !input || !btn) return;
  entry.style.display = 'flex';
  input.value = '';
  setTimeout(() => input.focus(), 100);
  const handler = () => {
    try {
      const name = input.value.trim().toUpperCase().slice(0,3) || 'AAA';
      btn.removeEventListener('click', handler);
      entry.style.display = 'none';
      addScore(name, pts, lvl);
      renderLeaderboard(pts);
    } catch(e) {}
  };
  btn.addEventListener('click', handler);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });
}

// ── END LEADERBOARD ───────────────────────────────────────────

function showResult(success, pts, padBonus, reason, isPerfect) {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');

  const title = overlay.querySelector('.overlay-title');
  const msg = document.getElementById('result-msg') || document.createElement('div');
  msg.id = 'result-msg';
  if (!msg.parentNode) overlay.insertBefore(msg, overlay.querySelector('.overlay-sub'));

  const sub = overlay.querySelector('.overlay-sub');
  const btn = document.getElementById('startBtn');
  const lb = document.getElementById('leaderboard');

  if (success) {
    title.textContent = isPerfect ? '⭐ PERFECT LANDING!' : `LEVEL ${level} CLEAR!`;
    title.style.color = isPerfect ? '#ffd700' : '#00ff88';
    title.style.textShadow = isPerfect ? '0 0 24px #ffd700, 0 0 48px #ffaa00' : '0 0 20px #00ff88';
    msg.className = 'success-msg';
    let txt = `+${pts} PTS`;
    if (isPerfect) txt += ' · +250 PERFECT BONUS!';
    if (padBonus === 2) txt += ' · DOUBLE PAD!';
    msg.textContent = txt;
    level++;
    let nextInfo = `LEVEL ${level} · GRAVITY ↑ · PADS NARROWER`;
    sub.textContent = `SCORE: ${score}  |  ${nextInfo}`;
    btn.textContent = `START LEVEL ${level}`;
    lb.style.display = 'none';
  } else {
    const isLost = reason && reason.includes('LOST IN SPACE');
    title.textContent = isLost ? '🚀 LOST IN SPACE' : 'GAME OVER';
    title.style.color = isLost ? '#88aaff' : '#ff4444';
    title.style.textShadow = isLost ? '0 0 20px #4466ff, 0 0 40px rgba(100,140,255,0.4)' : '0 0 20px #ff4444';
    msg.className = 'crash-msg';
    msg.textContent = isLost ? 'You drifted too far from the landing zone...' : (reason || 'TOO FAST OR OFF-PAD');
    sub.textContent = `FINAL SCORE: ${score}  |  LEVEL ${level} REACHED`;
    btn.textContent = 'PLAY AGAIN';
    const finalScore = score;
    const finalLevel = level;
    level = 1;
    // Show leaderboard and prompt initials if score qualifies
    const isHighScore = checkHighScore(finalScore);
    renderLeaderboard(isHighScore ? finalScore : null);
    if (isHighScore && finalScore > 0) showInitialsEntry(finalScore, finalLevel);

    // Daily mode — save and show submission
    if (isDailyMode) {
      isDailyMode = false;
      saveDailyAttempt(finalScore, finalLevel);
      dailyPendingScore = { score: finalScore, level: finalLevel };
      const dlb = document.getElementById('daily-leaderboard');
      const dne = document.getElementById('daily-name-entry');
      if (dlb) dlb.style.display = 'block';
      if (dne) dne.style.display = 'flex';
      const dBtn = document.getElementById('dailyBtn');
      const dStatus = document.getElementById('daily-status');
      if (dBtn) { dBtn.disabled = true; dBtn.textContent = '⭐ DAILY PLAYED'; }
      if (dStatus) dStatus.textContent = 'YOUR SCORE TODAY: ' + finalScore.toLocaleString() + ' · LVL ' + finalLevel;
      renderDailyLeaderboard(null);
    }
  }

  gameState = 'over';
}

  if (freshStart) { level = 1; score = 0; }
  document.getElementById('overlay').classList.add('hidden');
  const lb = document.getElementById('leaderboard');
  if (lb) lb.style.display = 'none';

  explosionParts = [];

// ── SOUND ENGINE ──────────────────────────────────────────────
let ac = null; // AudioContext — created on first user tap
let thrustNodes = []; // all running thrust nodes
let thrustGainNode = null;
let wasThrusting = false, wasRotating = false, lastBeepTime = 0;

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, type, gainVal, duration, freqEnd) {
  if (!ac) return;
  const g = ac.createGain();
  const osc = ac.createOscillator();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + duration);
  g.gain.setValueAtTime(gainVal, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + duration);
  osc.connect(g); g.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime + duration + 0.01);
}

function playNoise(filterType, filterFreq, gainVal, duration) {
  if (!ac) return;
  const size = Math.floor(ac.sampleRate * Math.min(duration + 0.1, 1));
  const buf = ac.createBuffer(1, size, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < size; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const filt = ac.createBiquadFilter(); filt.type = filterType; filt.frequency.value = filterFreq;
  const g = ac.createGain();
  g.gain.setValueAtTime(gainVal, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + duration);
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(); src.stop(ac.currentTime + duration + 0.01);
}

function startThrust() {
  if (thrustGainNode || !ac) return;

  thrustGainNode = ac.createGain();
  thrustGainNode.gain.setValueAtTime(0.0001, ac.currentTime);
  thrustGainNode.gain.linearRampToValueAtTime(0.38, ac.currentTime + 0.35);
  thrustGainNode.connect(ac.destination);
  thrustNodes = [];

  const t = ac.currentTime;
  const sr = ac.sampleRate;

  function makeSmoothNoise(secs) {
    const buf = ac.createBuffer(1, Math.floor(sr * secs), sr);
    const d = buf.getChannelData(0);
    // Very smooth brownian noise — gentle random walk
    let last = 0;
    for (let i = 0; i < d.length; i++) {
      last = (last + 0.008 * (Math.random() * 2 - 1)) / 1.008;
      d[i] = last * 25;
    }
    const src = ac.createBufferSource();
    src.buffer = buf; src.loop = true;
    return src;
  }

  // ── 1. Warm low-frequency hum (sine, not sawtooth) ────────────
  // Softer than sawtooth — more like a turbine than an explosion
  for (const [freq, detune, gain] of [[55, 0, 0.18], [58, 5, 0.12], [110, 0, 0.06]]) {
    const osc = ac.createOscillator();
    osc.type = 'sine'; osc.frequency.value = freq;
    osc.detune.value = detune;
    const lpf = ac.createBiquadFilter();
    lpf.type = 'lowpass'; lpf.frequency.value = 280; lpf.Q.value = 1.2;
    const g = ac.createGain(); g.gain.value = gain;
    osc.connect(lpf); lpf.connect(g); g.connect(thrustGainNode);
    osc.start(t); thrustNodes.push(osc);
  }

  // ── 2. Gentle LFO — slow breath at 3 Hz ──────────────────────
  // Very slow modulation, like a steady engine rhythm
  const lfo = ac.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 3;
  const lfog = ac.createGain(); lfog.gain.value = 6;
  lfo.connect(lfog);
  lfog.connect(thrustNodes[0].frequency);
  lfog.connect(thrustNodes[1].frequency);
  lfo.start(t); thrustNodes.push(lfo);

  // ── 3. Smooth broadband whoosh — filtered brown noise ─────────
  const roarSrc = makeSmoothNoise(4.0);
  const roarLPF = ac.createBiquadFilter();
  roarLPF.type = 'lowpass'; roarLPF.frequency.value = 600; roarLPF.Q.value = 1.2;
  const roarHP = ac.createBiquadFilter();
  roarHP.type = 'highpass'; roarHP.frequency.value = 80; roarHP.Q.value = 0.5;
  const roarG = ac.createGain(); roarG.gain.value = 0.4;
  roarSrc.connect(roarHP); roarHP.connect(roarLPF); roarLPF.connect(roarG);
  roarG.connect(thrustGainNode);
  roarSrc.start(t); thrustNodes.push(roarSrc);

  // ── 4. Soft mid hiss — gentle highpass noise ──────────────────
  const hissSrc = makeSmoothNoise(3.0);
  const hissHP = ac.createBiquadFilter();
  hissHP.type = 'highpass'; hissHP.frequency.value = 1200; hissHP.Q.value = 0.4;
  const hissLP = ac.createBiquadFilter();
  hissLP.type = 'lowpass'; hissLP.frequency.value = 3500; hissLP.Q.value = 0.5;
  const hissG = ac.createGain(); hissG.gain.value = 0.07;
  hissSrc.connect(hissHP); hissHP.connect(hissLP); hissLP.connect(hissG);
  hissG.connect(thrustGainNode);
  hissSrc.start(t); thrustNodes.push(hissSrc);

  // ── 5. Warm body tone — triangle wave at 82 Hz ────────────────
  // Triangle is much smoother than square — like a warm drone
  const bodyOsc = ac.createOscillator();
  bodyOsc.type = 'triangle'; bodyOsc.frequency.value = 82;
  const bodyLPF = ac.createBiquadFilter();
  bodyLPF.type = 'lowpass'; bodyLPF.frequency.value = 350; bodyLPF.Q.value = 0.8;
  const bodyG = ac.createGain(); bodyG.gain.value = 0.10;
  bodyOsc.connect(bodyLPF); bodyLPF.connect(bodyG); bodyG.connect(thrustGainNode);
  bodyOsc.start(t); thrustNodes.push(bodyOsc);

  // ── 6. Soft ignition puff (very short, gentle) ────────────────
  const igLen = Math.floor(sr * 0.25);
  const igBuf = ac.createBuffer(1, igLen, sr);
  const igd = igBuf.getChannelData(0);
  for (let i = 0; i < igLen; i++) {
    const env = Math.pow(1 - i / igLen, 2.5);
    const tone = Math.sin(2 * Math.PI * 60 * i / sr) * 0.4;
    igd[i] = ((Math.random() * 2 - 1) * 0.3 + tone) * env;
  }
  const igSrc = ac.createBufferSource(); igSrc.buffer = igBuf;
  const igLPF = ac.createBiquadFilter(); igLPF.type = 'lowpass'; igLPF.frequency.value = 400;
  const igG = ac.createGain(); igG.gain.value = 0.45;
  igSrc.connect(igLPF); igLPF.connect(igG); igG.connect(ac.destination);
  igSrc.start(t); thrustNodes.push(igSrc);
}

function stopThrust() {
  if (!thrustGainNode || !ac) return;
  // Ramp master gain down with a short tail
  thrustGainNode.gain.setValueAtTime(thrustGainNode.gain.value, ac.currentTime);
  thrustGainNode.gain.linearRampToValueAtTime(0.0001, ac.currentTime + 0.4);
  const nodesToStop = thrustNodes.slice();
  const gainToDisconnect = thrustGainNode;
  setTimeout(() => {
    nodesToStop.forEach(n => { try { n.stop(); } catch(e){} });
    try { gainToDisconnect.disconnect(); } catch(e){}
  }, 350);
  thrustNodes = []; thrustGainNode = null;
}

function playRotate() {
  playNoise('highpass', 1200, 0.06, 0.08);
}

function playLand() {
  if (!ac) return;
  // Satisfying thud + dust hiss
  const t = ac.currentTime;
  // Low thud
  const thudOsc = ac.createOscillator();
  const thudG = ac.createGain();
  thudOsc.type = 'sine'; thudOsc.frequency.setValueAtTime(90, t);
  thudOsc.frequency.exponentialRampToValueAtTime(25, t + 0.18);
  thudG.gain.setValueAtTime(0.5, t);
  thudG.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  thudOsc.connect(thudG); thudG.connect(ac.destination);
  thudOsc.start(t); thudOsc.stop(t + 0.25);
  // Dust hiss
  playNoise('bandpass', 800, 0.06, 0.25);
}

function playLevelClear(isPerfect) {
  if (!ac) return;
  const t = ac.currentTime;

  // ── Bass hit ──────────────────────────────────────────────────
  const bassOsc = ac.createOscillator();
  const bassG = ac.createGain();
  bassOsc.type = 'sine'; bassOsc.frequency.setValueAtTime(110, t);
  bassOsc.frequency.exponentialRampToValueAtTime(55, t + 0.3);
  bassG.gain.setValueAtTime(0.0001, t);
  bassG.gain.linearRampToValueAtTime(0.35, t + 0.02);
  bassG.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
  bassOsc.connect(bassG); bassG.connect(ac.destination);
  bassOsc.start(t); bassOsc.stop(t + 0.4);

  // ── Melody notes ──────────────────────────────────────────────
  // Cheerful ascending figure: C E G C (or gold fanfare if perfect)
  const notes = isPerfect
    ? [523, 659, 784, 1047, 1319] // C E G C E — triumphant
    : [523, 659, 784, 1047];       // C E G C — clean clear
  const timings  = isPerfect ? [0, 0.13, 0.26, 0.4, 0.55] : [0.05, 0.18, 0.31, 0.46];
  const durations= isPerfect ? [0.18, 0.18, 0.18, 0.22, 0.45] : [0.18, 0.18, 0.18, 0.38];

  notes.forEach((freq, i) => {
    const nt = t + timings[i];
    const dur = durations[i];
    // Main tone
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, nt);
    g.gain.linearRampToValueAtTime(0.22, nt + 0.02);
    g.gain.setValueAtTime(0.22, nt + dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.0001, nt + dur);
    osc.connect(g); g.connect(ac.destination);
    osc.start(nt); osc.stop(nt + dur + 0.05);

    // Harmony (one fifth up) — softer
    const harm = ac.createOscillator();
    const hg = ac.createGain();
    harm.type = 'sine'; harm.frequency.value = freq * 1.5;
    hg.gain.setValueAtTime(0.0001, nt);
    hg.gain.linearRampToValueAtTime(0.07, nt + 0.02);
    hg.gain.exponentialRampToValueAtTime(0.0001, nt + dur);
    harm.connect(hg); hg.connect(ac.destination);
    harm.start(nt); harm.stop(nt + dur + 0.05);
  });

  // ── Shimmer (high sparkle on last note) ───────────────────────
  const shimmerT = t + timings[timings.length - 1] + 0.05;
  [2093, 2637, 3136].forEach((freq, i) => {
    const st = shimmerT + i * 0.06;
    const so = ac.createOscillator();
    const sg = ac.createGain();
    so.type = 'sine'; so.frequency.value = freq;
    sg.gain.setValueAtTime(0.0001, st);
    sg.gain.linearRampToValueAtTime(isPerfect ? 0.1 : 0.06, st + 0.01);
    sg.gain.exponentialRampToValueAtTime(0.0001, st + 0.35);
    so.connect(sg); sg.connect(ac.destination);
    so.start(st); so.stop(st + 0.4);
  });

  // ── Perfect bonus — extra fanfare chord ───────────────────────
  if (isPerfect) {
    const ft = t + 0.7;
    [523, 659, 784, 1047].forEach((freq, i) => {
      const fo = ac.createOscillator();
      const fg = ac.createGain();
      fo.type = 'triangle'; fo.frequency.value = freq;
      fg.gain.setValueAtTime(0.0001, ft);
      fg.gain.linearRampToValueAtTime(0.15, ft + 0.03);
      fg.gain.setValueAtTime(0.15, ft + 0.25);
      fg.gain.exponentialRampToValueAtTime(0.0001, ft + 0.55);
      fo.connect(fg); fg.connect(ac.destination);
      fo.start(ft); fo.stop(ft + 0.6);
    });
  }
}

function playCrash() {
  if (!ac) return;
  playTone(100, 'sine', 0.7, 0.6, 18);
  playNoise('lowpass', 500, 0.5, 0.7);
}

function playLowFuelBeep() {
  const now = Date.now();
  if (now - lastBeepTime < 900) return;
  lastBeepTime = now;
  playTone(1100, 'square', 0.07, 0.09);
}

function playLevelIntro(lvl) {
  if (!ac) return;
  const t = ac.currentTime;
  const sr = ac.sampleRate;

  // ── 1. Sub-bass SLAM (the "hit" on the visual slam) ──────────
  const slamOsc = ac.createOscillator();
  const slamG = ac.createGain();
  const slamLPF = ac.createBiquadFilter();
  slamOsc.type = 'sine';
  slamOsc.frequency.setValueAtTime(120, t);
  slamOsc.frequency.exponentialRampToValueAtTime(28, t + 0.4);
  slamLPF.type = 'lowpass'; slamLPF.frequency.value = 300; slamLPF.Q.value = 1.5;
  slamG.gain.setValueAtTime(0.0001, t);
  slamG.gain.linearRampToValueAtTime(0.7, t + 0.01);
  slamG.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
  slamOsc.connect(slamLPF); slamLPF.connect(slamG); slamG.connect(ac.destination);
  slamOsc.start(t); slamOsc.stop(t + 0.5);

  // ── 2. Impact noise burst ─────────────────────────────────────
  const impLen = Math.floor(sr * 0.08);
  const impBuf = ac.createBuffer(1, impLen, sr);
  const impD = impBuf.getChannelData(0);
  for (let i = 0; i < impLen; i++) impD[i] = (Math.random()*2-1) * Math.pow(1 - i/impLen, 1.2);
  const impSrc = ac.createBufferSource(); impSrc.buffer = impBuf;
  const impLP = ac.createBiquadFilter(); impLP.type = 'lowpass'; impLP.frequency.value = 600;
  const impG = ac.createGain(); impG.gain.value = 0.5;
  impSrc.connect(impLP); impLP.connect(impG); impG.connect(ac.destination);
  impSrc.start(t);

  // ── 3. Reverse swell (builds before the slam) ────────────────
  // A short whoosh leading into the hit
  const whooshLen = Math.floor(sr * 0.3);
  const whooshBuf = ac.createBuffer(1, whooshLen, sr);
  const whooshD = whooshBuf.getChannelData(0);
  for (let i = 0; i < whooshLen; i++) whooshD[i] = (Math.random()*2-1) * (i/whooshLen);
  const whooshSrc = ac.createBufferSource(); whooshSrc.buffer = whooshBuf;
  const whooshHP = ac.createBiquadFilter(); whooshHP.type = 'bandpass'; whooshHP.frequency.value = 800; whooshHP.Q.value = 0.8;
  const whooshG = ac.createGain();
  whooshG.gain.setValueAtTime(0, t);
  whooshG.gain.linearRampToValueAtTime(0.22, t + 0.28);
  whooshG.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
  whooshSrc.connect(whooshHP); whooshHP.connect(whooshG); whooshG.connect(ac.destination);
  whooshSrc.start(t);

  // ── 4. Cinematic chord stab (pitch increases each level) ──────
  const baseNote = 130 + (lvl - 1) * 15;
  const chordNotes = [baseNote, baseNote * 1.25, baseNote * 1.5, baseNote * 2];
  chordNotes.forEach((freq, i) => {
    const o = ac.createOscillator();
    const g = ac.createGain();
    const f = ac.createBiquadFilter();
    o.type = i < 2 ? 'sawtooth' : 'square';
    o.frequency.value = freq;
    f.type = 'lowpass'; f.frequency.value = 1800 - i*200; f.Q.value = 0.8;
    g.gain.setValueAtTime(0.0001, t + 0.02);
    g.gain.linearRampToValueAtTime(0.12 - i*0.02, t + 0.06);
    g.gain.setValueAtTime(0.12 - i*0.02, t + 0.18);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
    o.connect(f); f.connect(g); g.connect(ac.destination);
    o.start(t + 0.02); o.stop(t + 0.6);
  });

  // ── 5. Rising high-pitched sweep (sci-fi power-up) ────────────
  const sweepOsc = ac.createOscillator();
  const sweepG = ac.createGain();
  sweepOsc.type = 'sine';
  sweepOsc.frequency.setValueAtTime(400, t + 0.1);
  sweepOsc.frequency.exponentialRampToValueAtTime(2400 + lvl * 200, t + 0.65);
  sweepG.gain.setValueAtTime(0.0001, t + 0.1);
  sweepG.gain.linearRampToValueAtTime(0.12, t + 0.2);
  sweepG.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
  sweepOsc.connect(sweepG); sweepG.connect(ac.destination);
  sweepOsc.start(t + 0.1); sweepOsc.stop(t + 0.75);

  // ── 6. Bright metallic ring (lingers after the slam) ─────────
  const ringFreq = 880 + lvl * 55;
  const ringOsc = ac.createOscillator();
  const ringG = ac.createGain();
  ringOsc.type = 'sine';
  ringOsc.frequency.setValueAtTime(ringFreq, t + 0.05);
  ringG.gain.setValueAtTime(0.0001, t + 0.04);
  ringG.gain.linearRampToValueAtTime(0.18, t + 0.06);
  ringG.gain.exponentialRampToValueAtTime(0.0001, t + 1.2);
  ringOsc.connect(ringG); ringG.connect(ac.destination);
  ringOsc.start(t + 0.04); ringOsc.stop(t + 1.3);

  // Second harmonic ring
  const ring2Osc = ac.createOscillator();
  const ring2G = ac.createGain();
  ring2Osc.type = 'sine'; ring2Osc.frequency.value = ringFreq * 2.5;
  ring2G.gain.setValueAtTime(0.0001, t + 0.05);
  ring2G.gain.linearRampToValueAtTime(0.07, t + 0.07);
  ring2G.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
  ring2Osc.connect(ring2G); ring2G.connect(ac.destination);
  ring2Osc.start(t + 0.05); ring2Osc.stop(t + 0.85);

  // ── 7. Level-count ascending beeps ───────────────────────────
  const beepCount = Math.min(lvl, 5);
  for (let i = 0; i < beepCount; i++) {
    const bt = t + 0.75 + i * 0.11;
    const bo = ac.createOscillator();
    const bg = ac.createGain();
    bo.type = 'sine'; bo.frequency.value = 880 + i * 110;
    bg.gain.setValueAtTime(0.0001, bt);
    bg.gain.linearRampToValueAtTime(0.16, bt + 0.015);
    bg.gain.exponentialRampToValueAtTime(0.0001, bt + 0.08);
    bo.connect(bg); bg.connect(ac.destination);
    bo.start(bt); bo.stop(bt + 0.1);
  }
}

function updateSounds() {
  if (!ac) return;
  const thrusting = keys.thrust && lander.fuel > 0;
  const rotating = (keys.left || keys.right) && lander.fuel > 0;
  if (thrusting && !wasThrusting) startThrust();
  if (!thrusting && wasThrusting) stopThrust();
  wasThrusting = thrusting;
  if (rotating && !wasRotating) playRotate();
  wasRotating = rotating;
  if (lander.fuel < 15 && lander.fuel > 0) playLowFuelBeep();
}
// ── END SOUND ENGINE ──────────────────────────────────────────

function handleStart() {
  initAudio();
  startGame(gameState === 'menu');
}

document.getElementById('startBtn').addEventListener('click', handleStart);
document.getElementById('startBtn').addEventListener('touchend', (e) => { e.preventDefault(); handleStart(); });

// Show leaderboard on initial load — hidden until game over
initDailyUI();
initDemoShip();
requestAnimationFrame(loop);
</script>
