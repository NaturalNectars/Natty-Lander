    shadow.addColorStop(0,   'rgba(0,0,0,0)');
    shadow.addColorStop(0.5, 'rgba(0,0,0,0.15)');
    shadow.addColorStop(1,   'rgba(0,0,0,0.65)');
    ctx.fillStyle = shadow;
    ctx.save();
    ctx.beginPath();
    ctx.arc(px, py, p.r, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillRect(px - p.r, py - p.r, p.r * 2, p.r * 2);
    ctx.restore();

    // ── Ring (extreme tier large planet) ────────────────────
    if (p.pal.ring && p.r > 40) {
      ctx.save();
      ctx.translate(px, py);
      ctx.scale(1, 0.28);
      const ringGrad = ctx.createRadialGradient(0, 0, p.r * 1.15, 0, 0, p.r * 2.1);
      ringGrad.addColorStop(0,   'rgba(160,120,200,0.55)');
      ringGrad.addColorStop(0.4, 'rgba(140,100,180,0.35)');
      ringGrad.addColorStop(0.7, 'rgba(120,90,160,0.18)');
      ringGrad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.strokeStyle = ringGrad;
      ctx.lineWidth = p.r * 0.55;
      ctx.beginPath();
      ctx.arc(0, 0, p.r * 1.65, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // ── Rim highlight ────────────────────────────────────────
    const rim = ctx.createRadialGradient(px - p.r * 0.6, py - p.r * 0.6, 0, px, py, p.r);
    rim.addColorStop(0.7, 'rgba(255,255,255,0)');
    rim.addColorStop(0.88, 'rgba(255,255,255,0.08)');
    rim.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = rim;
    ctx.save();
    ctx.beginPath();
    ctx.arc(px, py, p.r, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillRect(px - p.r, py - p.r, p.r * 2, p.r * 2);
    ctx.restore();

    ctx.restore();
  });
}

// Draw
function drawStars() {
  const W = canvas.width, H = canvas.height;

  // Update parallax from lander movement during gameplay only
  if (gameState === 'playing' && lander && lander.x !== undefined) {
    const dx = lander.vx || 0;
    parallaxX[0] = (parallaxX[0] - dx * 0.012 + W * 4) % W;
    parallaxX[1] = (parallaxX[1] - dx * 0.030 + W * 4) % W;
    parallaxX[2] = (parallaxX[2] - dx * 0.065 + W * 4) % W;
  }

  starLayers.forEach((layer, li) => {
    const px = parallaxX[li];
    layer.forEach(s => {
      s.twinkle += 0.012 + li * 0.008;
      const alpha = s.baseAlpha + Math.sin(s.twinkle) * (s.baseAlpha * 0.4);
      const sx = ((s.x * W + px) % W + W) % W;
      const sy = s.y * H;

      if (s.glow) {
        const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, s.r * 3);
        grd.addColorStop(0, `rgba(255,255,255,${alpha})`);
        grd.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.beginPath();
        ctx.arc(sx, sy, s.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
  });
}

function drawFloatingTexts() {
  floatingTexts = floatingTexts.filter(t => t.life > 0);
  floatingTexts.forEach(t => {
    ctx.save();
    ctx.globalAlpha = Math.min(1, t.life * 2);
    ctx.font = 'bold 14px "Share Tech Mono", monospace';
    ctx.fillStyle = t.color || '#00ff88';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = t.color || '#00ff88';
    ctx.shadowBlur = 8;
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
    t.y += t.vy || -1;
    t.life -= 0.022;
  });
}

function drawFuelPickups(time) {
  fuelPickups.forEach(p => {
    if (p.collected && p.collectAnim <= 0) return;
    const bobY      = p.y + Math.sin(time * p.bobSpeed + p.bobPhase) * 7;
    const baseAlpha = p.collected ? Math.max(0, p.collectAnim) : 1;
    const ty        = p.collected ? bobY - (1 - p.collectAnim) * 30 : bobY;

    ctx.save();
    ctx.translate(p.x, ty);
    ctx.globalAlpha = baseAlpha;

    // ── DRAWN LEAF ────────────────────────────────────────
    const s = 11; // leaf half-size
    ctx.save();
    ctx.rotate(-0.4);

    // Leaf body
    const leafGrad = ctx.createRadialGradient(-2, -3, 1, 0, 0, s);
    leafGrad.addColorStop(0,   '#88ff66');
    leafGrad.addColorStop(0.5, '#33cc44');
    leafGrad.addColorStop(1,   '#1a8822');
    ctx.fillStyle = leafGrad;
    ctx.strokeStyle = '#0d5511';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.bezierCurveTo( s * 1.1, -s * 0.5,  s * 1.1,  s * 0.5,  0,  s * 0.3);
    ctx.bezierCurveTo(-s * 1.1,  s * 0.5, -s * 1.1, -s * 0.5,  0, -s);
    ctx.fill();
    ctx.stroke();

    // Centre vein
    ctx.strokeStyle = 'rgba(10,60,10,0.5)';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.85);
    ctx.quadraticCurveTo(2, 0, 0, s * 0.25);
    ctx.stroke();

    // Side veins
    ctx.strokeStyle = 'rgba(10,60,10,0.3)';
    ctx.lineWidth = 0.5;
    [[-0.35, -0.4], [-0.2, 0], [-0.3, 0.3]].forEach(([tx2, ty2]) => {
      ctx.beginPath();
      ctx.moveTo(tx2 * 2, ty2 * s);
      ctx.quadraticCurveTo(tx2 * s * 0.9 + 1, ty2 * s + 2, tx2 * s * 0.85, ty2 * s + 1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-tx2 * 2, ty2 * s);
      ctx.quadraticCurveTo(-tx2 * s * 0.9 - 1, ty2 * s + 2, -tx2 * s * 0.85, ty2 * s + 1);
      ctx.stroke();
    });

    // Stem
    ctx.strokeStyle = '#1a5511';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, s * 0.3);
    ctx.quadraticCurveTo(3, s * 0.65, 2, s * 0.9);
    ctx.stroke();

    ctx.restore();

    // ── SPARKLES ─────────────────────────────────────────
    for (let i = 0; i < 6; i++) {
      const angle = time * 1.4 + i * (Math.PI * 2 / 6);
      ctx.globalAlpha = baseAlpha * (0.35 + 0.45 * Math.abs(Math.sin(time * 4 + i)));
      ctx.fillStyle   = i % 2 === 0 ? '#44ff88' : '#aaffcc';
      ctx.beginPath();
      ctx.arc(Math.cos(angle) * 20, Math.sin(angle) * 20, i % 3 === 0 ? 2 : 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  });
}

function updateFuelPickups() {
  fuelPickups.forEach(p => {
    if (p.collected) {
      p.collectAnim -= 0.04;
      return;
    }
    const bobY = p.y + Math.sin(gameTime * p.bobSpeed + p.bobPhase) * 7;
    const dx = lander.x - p.x;
    const dy = lander.y - bobY;
    if (Math.sqrt(dx*dx + dy*dy) < 24) {
      p.collected = true;
      p.collectAnim = 1;
      lander.fuel = Math.min(100, lander.fuel + 30);
      checkAchievements({ leafCollected: true, currentScore: score, currentStreak: comboCount, leavesThisLevel: 0 });
      // Flash +FUEL text
      floatingTexts.push({
        x: p.x, y: p.y,
        text: '+FUEL 🌿',
        life: 1,
        color: '#00ff88',
        vy: -1.2,
      });
    }
  });
}

function drawTerrain() {
  if (!terrain.length) return;
  const H = canvas.height;
  const W = canvas.width;

  // Build terrain path points
  const pts = [];
  pts.push({ x: terrain[0].x1, y: terrain[0].y1 });
  for (let i = 0; i < terrain.length - 3; i++) {
    pts.push({ x: terrain[i].x2, y: terrain[i].y2 });
  }

  // ── DEEP BASE FILL ────────────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  const deepGrad = ctx.createLinearGradient(0, H * 0.45, 0, H);
  const colors = getTerrainColors();
  deepGrad.addColorStop(0,   colors.deepBase[0]);
  deepGrad.addColorStop(0.4, colors.deepBase[1]);
  deepGrad.addColorStop(1,   colors.deepBase[2]);
  ctx.fillStyle = deepGrad;
  ctx.fill();

  // ── PER-FACE SLOPE SHADING ────────────────────────────────────
  for (let i = 0; i < pts.length - 1; i++) {
    const x1 = pts[i].x, y1 = pts[i].y;
    const x2 = pts[i+1].x, y2 = pts[i+1].y;
    const rising = y2 < y1;
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.lineTo(x2, H);  ctx.lineTo(x1, H);
    ctx.closePath();
    const lg = ctx.createLinearGradient(x1, y1, x2, y2);
    if (rising) {
      lg.addColorStop(0, colors.sunlit[0]);
      lg.addColorStop(1, colors.sunlit[1]);
    } else {
      lg.addColorStop(0, colors.shadow[0]);
      lg.addColorStop(1, colors.shadow[1]);
    }
    ctx.fillStyle = lg;
    ctx.fill();
  }

  // ── SEEDED ROCK DETAIL (clipped to terrain body) ──────────────
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.clip();

  try {
  rockDetails.forEach(seg => {
    const R = Math.floor(210 * (seg.rTint || 1));
    const G = Math.floor(130 * (seg.gTint || 0.7));

    // ── Dark crevice shadow at face base ─────────────────────
    if (seg.crevice) {
      const cg = ctx.createLinearGradient(seg.x1, seg.y1, (seg.x1+seg.x2)/2, seg.y1 + seg.crevice.depth);
      cg.addColorStop(0,   `rgba(10,3,0,${seg.crevice.alpha})`);
      cg.addColorStop(1,   'rgba(5,1,0,0)');
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1); ctx.lineTo(seg.x2, seg.y2);
      ctx.lineTo(seg.x2, seg.y2 + seg.crevice.depth);
      ctx.lineTo(seg.x1, seg.y1 + seg.crevice.depth);
      ctx.closePath();
      ctx.fillStyle = cg; ctx.fill();
    }

    // ── Strata bands (multi-color, varied width) ─────────────
    seg.strata.forEach(s => {
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2);
      const sc = s.warm
        ? `rgba(${R},${G},45,${s.alpha})`
        : `rgba(${Math.floor(R*0.6)},${Math.floor(G*0.5)},30,${s.alpha * 0.8})`;
      ctx.strokeStyle = sc;
      ctx.lineWidth = s.width || (0.6 + s.alpha * 3);
      ctx.stroke();
      // Thin highlight above warm strata
      if (s.warm && s.alpha > 0.06) {
        ctx.beginPath();
        ctx.moveTo(s.x1, s.y1 - 1); ctx.lineTo(s.x2, s.y2 - 1);
        ctx.strokeStyle = `rgba(255,200,100,${s.alpha * 0.4})`;
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }
    });

    // ── Erosion channels ──────────────────────────────────────
    seg.channels && seg.channels.forEach(ch => {
      ctx.beginPath();
      ctx.moveTo(ch.ox, ch.oy);
      ctx.quadraticCurveTo(ch.cx, ch.cy, ch.ex, ch.ey);
      ctx.strokeStyle = `rgba(15,5,0,${ch.alpha * 1.6})`;
      ctx.lineWidth = ch.width + 0.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ch.ox, ch.oy);
      ctx.quadraticCurveTo(ch.cx, ch.cy, ch.ex, ch.ey);
      ctx.strokeStyle = `rgba(${R},${G},30,${ch.alpha * 0.5})`;
      ctx.lineWidth = ch.width * 0.4;
      ctx.stroke();
    });

    // ── Surface pits / erosion holes ──────────────────────────
    seg.pits && seg.pits.forEach(p => {
      if (p.rx < 0.5 || p.ry < 0.5) return;
      const pg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, Math.max(p.rx, p.ry));
      pg.addColorStop(0,   `rgba(8,2,0,${p.alpha * 1.5})`);
      pg.addColorStop(0.5, `rgba(20,6,0,${p.alpha * 0.8})`);
      pg.addColorStop(1,   'rgba(30,10,0,0)');
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.rx, p.ry, 0, 0, Math.PI * 2);
      ctx.fillStyle = pg; ctx.fill();
      // Rim highlight (sun catches upper edge)
      ctx.beginPath();
      ctx.ellipse(p.x, p.y - p.ry*0.3, p.rx*0.8, p.ry*0.3, 0, Math.PI, Math.PI*2);
      ctx.strokeStyle = `rgba(220,160,70,${p.alpha * 0.5})`;
      ctx.lineWidth = 0.5; ctx.stroke();
    });

    // ── Crack lines with branching ────────────────────────────
    const drawCrack = (jags, alpha, bright) => {
      if (jags.length < 2) return;
      ctx.beginPath();
      ctx.moveTo(jags[0].x, jags[0].y);
      for (let j = 1; j < jags.length; j++) ctx.lineTo(jags[j].x, jags[j].y);
      if (bright) {
        ctx.strokeStyle = `rgba(230,175,90,${alpha})`;
        ctx.lineWidth = 0.7;
      } else {
        ctx.strokeStyle = `rgba(18,4,1,${alpha * 2.0})`;
        ctx.lineWidth = 1.3;
      }
      ctx.stroke();
      // Offset lit edge on shadow cracks
      if (!bright) {
        ctx.beginPath();
        for (let j = 0; j < jags.length; j++) {
          if (j === 0) ctx.moveTo(jags[j].x + 0.9, jags[j].y);
          else ctx.lineTo(jags[j].x + 0.9, jags[j].y);
        }
        ctx.strokeStyle = `rgba(${R},${G},30,${alpha * 0.55})`;
        ctx.lineWidth = 0.45; ctx.stroke();
      }
    };
    seg.cracks.forEach(crack => {
      drawCrack(crack.jags, crack.alpha, crack.bright);
      crack.branches && crack.branches.forEach(b => drawCrack(b.jags, b.alpha, b.bright));
    });

    // ── Boulder outcrops ──────────────────────────────────────
    seg.boulders.forEach(b => {
      if (b.rx < 0.5 || b.ry < 0.5) return;
      const br = b.rTint ? Math.floor(210 * b.rTint) : R;
      const bg2 = Math.floor(130 * (b.gTint || 0.7));
      const bg = ctx.createRadialGradient(b.x - b.rx*0.3, b.y - b.ry*0.4, 0, b.x, b.y, b.rx);
      bg.addColorStop(0,   `rgba(${br},${bg2},70,${b.alpha})`);
      bg.addColorStop(0.55,`rgba(${Math.floor(br*0.65)},${Math.floor(bg2*0.5)},25,${b.alpha*0.85})`);
      bg.addColorStop(1,   `rgba(40,14,3,${b.alpha * 0.35})`);
      ctx.beginPath();
      ctx.ellipse(b.x, b.y, b.rx, b.ry, b.tilt || 0, 0, Math.PI * 2);
      ctx.fillStyle = bg; ctx.fill();
      // Sun highlight
      ctx.beginPath();
      ctx.ellipse(b.x - b.rx*0.28, b.y - b.ry*0.32, b.rx*0.42, b.ry*0.28, -0.3, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,215,145,${b.alpha * 0.5})`; ctx.fill();
      // Shadow underside
      ctx.beginPath();
      ctx.ellipse(b.x + b.rx*0.1, b.y + b.ry*0.4, b.rx*0.7, b.ry*0.25, 0, 0, Math.PI*2);
      ctx.fillStyle = `rgba(10,3,0,${b.alpha * 0.4})`; ctx.fill();
    });

    // ── Pebble clusters ───────────────────────────────────────
    seg.pebbles && seg.pebbles.forEach(p => {
      if (p.r < 0.5) return;
      const pg = ctx.createRadialGradient(p.x - p.r*0.3, p.y - p.r*0.3, 0, p.x, p.y, p.r);
      pg.addColorStop(0,   `rgba(${R},${G},55,${p.alpha})`);
      pg.addColorStop(1,   `rgba(60,20,5,${p.alpha * 0.3})`);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = pg; ctx.fill();
    });
  });
  } catch(e) { /* rock detail render error — skip gracefully */ }

  // ── WIND-BLOWN DUST on peaks + sub-peak pitting ──────────────
  for (let i = 1; i < pts.length - 1; i++) {
    const prev = pts[i-1], curr = pts[i], next = pts[i+1];
    const isPeak = curr.y < prev.y && curr.y < next.y;
    if (isPeak && curr.y < H * 0.65) {
      const hw = Math.min(30, (Math.abs(curr.x - prev.x) + Math.abs(next.x - curr.x)) * 0.52);
      const sh = 5 + (H * 0.65 - curr.y) * 0.07;
      // Main dust glow
      const dg = ctx.createRadialGradient(curr.x + hw*0.25, curr.y, 0, curr.x, curr.y + sh, hw);
      dg.addColorStop(0,   'rgba(220,172,82,0.3)');
      dg.addColorStop(0.4, 'rgba(190,122,46,0.14)');
      dg.addColorStop(1,   'rgba(150,80,20,0)');
      ctx.beginPath();
      ctx.moveTo(curr.x - hw*0.72, curr.y + sh*0.58);
      ctx.lineTo(curr.x, curr.y - 2);
      ctx.lineTo(curr.x + hw*0.95, curr.y + sh*0.48);
      ctx.quadraticCurveTo(curr.x + hw*0.35, curr.y + sh*1.15, curr.x - hw*0.72, curr.y + sh*0.58);
      ctx.fillStyle = dg; ctx.fill();
      // Fine dust streaks blown right
      for (let d = 0; d < 4; d++) {
        const dy = curr.y + (Math.random()-0.3)*sh*0.5;
        const dx0 = curr.x + (Math.random()-0.5)*hw*0.4;
        ctx.beginPath();
        ctx.moveTo(dx0, dy);
        ctx.lineTo(dx0 + hw*(0.3 + Math.random()*0.5), dy + (Math.random()-0.5)*3);
        ctx.strokeStyle = `rgba(230,185,100,${0.06 + Math.random()*0.1})`;
        ctx.lineWidth = 0.4 + Math.random()*0.6;
        ctx.stroke();
      }
    }
  }

  ctx.restore();

  // ── RIDGE LINES ───────────────────────────────────────────────
  const tier = getTerrainTier();
  const ridgeColor = tier === 'early'  ? 'rgba(100,180,150,0.85)'
                   : tier === 'mid'    ? 'rgba(200,130,55,0.9)'
                   : tier === 'late'   ? 'rgba(200,70,30,0.85)'
                   : 'rgba(160,30,30,0.85)';
  const ridgeSpec  = tier === 'early'  ? 'rgba(180,240,200,0.3)'
                   : tier === 'mid'    ? 'rgba(255,210,120,0.28)'
                   : tier === 'late'   ? 'rgba(255,140,80,0.28)'
                   : 'rgba(220,60,60,0.25)';

  // ── CLIFF FACES on steep drops ───────────────────────────────
  for (let i = 0; i < pts.length - 1; i++) {
    const x1 = pts[i].x, y1 = pts[i].y;
    const x2 = pts[i+1].x, y2 = pts[i+1].y;
    const drop = y2 - y1; // positive = falling right
    if (drop > 18) {
      // Dark cliff shadow
      const cg = ctx.createLinearGradient(x1, y1, x2, y2);
      cg.addColorStop(0, 'rgba(0,0,0,0.35)');
      cg.addColorStop(1, 'rgba(0,0,0,0.0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x2, y2 + 4); ctx.lineTo(x1, y1 + 4);
      ctx.closePath(); ctx.fill();
      // Horizontal cliff strata lines
      const stepsC = Math.floor(drop / 5);
      for (let s = 1; s < stepsC; s++) {
        const t   = s / stepsC;
        const lx1 = x1 + (x2 - x1) * t;
        const ly  = y1 + drop * t;
        const len = 4 + seededRand(i * 50 + s * 3) * 8;
        ctx.beginPath();
        ctx.moveTo(lx1, ly);
        ctx.lineTo(lx1 + len, ly + seededRand(i * 30 + s) * 2 - 1);
        ctx.strokeStyle = `rgba(0,0,0,${0.15 + seededRand(i * 20 + s) * 0.15})`;
        ctx.lineWidth = 0.6 + seededRand(i * 10 + s) * 0.8;
        ctx.stroke();
      }
    }
  }

  // ── ROCKY CRAGS at peaks ──────────────────────────────────────
  for (let i = 1; i < pts.length - 1; i++) {
    const prev = pts[i-1], curr = pts[i], next = pts[i+1];
    const isPeak = curr.y < prev.y && curr.y < next.y && curr.y < H * 0.72;
    if (!isPeak) continue;
    const peakH = H * 0.72 - curr.y;
    const numCrags = 2 + Math.floor(seededRand(i * 77) * 3);
    for (let c = 0; c < numCrags; c++) {
      const spread = 16 + seededRand(i * 11 + c) * 22;
      const cx2    = curr.x + (seededRand(i * 13 + c) - 0.5) * spread;
      const cragH  = 4 + seededRand(i * 17 + c) * Math.min(14, peakH * 0.4);
      const cragW  = 2 + seededRand(i * 19 + c) * 5;
      // Crag silhouette — jagged spike
      ctx.beginPath();
      ctx.moveTo(cx2 - cragW, curr.y + 2);
      ctx.lineTo(cx2 + seededRand(i * 23 + c) * 3 - 1, curr.y - cragH);
      ctx.lineTo(cx2 + cragW, curr.y + 2);
      ctx.closePath();
      const cgGrad = ctx.createLinearGradient(cx2, curr.y - cragH, cx2, curr.y + 2);
      cgGrad.addColorStop(0, ridgeSpec);
      cgGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
      ctx.fillStyle = cgGrad;
      ctx.fill();
      // Crag lit edge
      ctx.strokeStyle = ridgeSpec;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(cx2 - cragW * 0.6, curr.y + 1);
      ctx.lineTo(cx2, curr.y - cragH);
      ctx.stroke();
    }
  }

  // ── SHADOW UNDERLINE ──────────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y + 1.5);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y + 1.5);
  ctx.strokeStyle = 'rgba(10,2,0,0.65)';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // ── JAGGED MAIN RIDGE ─────────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 0; i < pts.length - 1; i++) {
    const x1 = pts[i].x, y1 = pts[i].y;
    const x2 = pts[i+1].x, y2 = pts[i+1].y;
    const segLen = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
    const steps  = Math.max(2, Math.floor(segLen / 7));
    for (let s = 1; s <= steps; s++) {
      const t   = s / steps;
      const nx  = x1 + (x2 - x1) * t;
      const ny  = y1 + (y2 - y1) * t;
      const jag = (seededRand(i * 200 + s * 13 + level) - 0.5) * 5;
      ctx.lineTo(nx, ny + jag);
    }
  }
  ctx.strokeStyle = ridgeColor;
  ctx.lineWidth = 1.4;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // ── BRIGHT SPECULAR TOP EDGE ──────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 0; i < pts.length - 1; i++) {
    const x1 = pts[i].x, y1 = pts[i].y;
    const x2 = pts[i+1].x, y2 = pts[i+1].y;
    const segLen = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
    const steps  = Math.max(2, Math.floor(segLen / 7));
    for (let s = 1; s <= steps; s++) {
      const t   = s / steps;
      const nx  = x1 + (x2 - x1) * t;
      const ny  = y1 + (y2 - y1) * t;
      const jag = (seededRand(i * 200 + s * 13 + level) - 0.5) * 5;
      ctx.lineTo(nx, ny + jag);
    }
  }
  ctx.strokeStyle = ridgeSpec;
  ctx.lineWidth = 0.7;
  ctx.stroke();

  // ── PEAK ENHANCEMENTS ─────────────────────────────────────────
  for (let i = 1; i < pts.length - 1; i++) {
    const prev = pts[i-1], curr = pts[i], next = pts[i+1];
    const isPeak = curr.y < prev.y && curr.y < next.y;
    if (!isPeak || curr.y > H * 0.7) continue;

    const peakHeight = H * 0.55 - curr.y;

    // ── Peak shadow triangle — dark face on right ───────────────
    ctx.beginPath();
    ctx.moveTo(curr.x, curr.y);
    ctx.lineTo(next.x, next.y);
    ctx.lineTo(next.x, next.y + 30);
    ctx.closePath();
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fill();

    // ── Atmospheric base haze ───────────────────────────────────
    const hazeW = Math.abs(next.x - prev.x) * 1.2;
    const hazeGrad = ctx.createRadialGradient(curr.x, curr.y + 40, 0, curr.x, curr.y + 40, hazeW * 0.6);
    const hazeColor = tier === 'early'  ? 'rgba(40,120,180,'
                    : tier === 'mid'    ? 'rgba(120,80,40,'
                    : tier === 'late'   ? 'rgba(140,40,20,'
                    : 'rgba(100,15,15,';
    hazeGrad.addColorStop(0, hazeColor + '0.12)');
    hazeGrad.addColorStop(1, hazeColor + '0)');
    ctx.fillStyle = hazeGrad;
    ctx.fillRect(curr.x - hazeW * 0.6, curr.y, hazeW * 1.2, 60);

    // ── Snow / ice caps on early levels only ────────────────────
    if (tier === 'early' && peakHeight > 10) {
      const snowW = 8 + peakHeight * 0.15;
      const snowH = 4 + peakHeight * 0.1;

      // Snow base
      ctx.beginPath();
      ctx.moveTo(curr.x, curr.y - 1);
      ctx.lineTo(curr.x - snowW, curr.y + snowH);
      ctx.lineTo(curr.x + snowW * 0.8, curr.y + snowH * 0.8);
      ctx.closePath();
      const snowGrad = ctx.createLinearGradient(curr.x - snowW, curr.y, curr.x + snowW, curr.y + snowH);
      snowGrad.addColorStop(0, 'rgba(220,240,255,0.85)');
      snowGrad.addColorStop(0.5, 'rgba(200,225,255,0.9)');
      snowGrad.addColorStop(1, 'rgba(160,200,240,0.5)');
      ctx.fillStyle = snowGrad;
      ctx.fill();

      // Snow sparkle highlight
      ctx.beginPath();
      ctx.moveTo(curr.x, curr.y - 1);
      ctx.lineTo(curr.x - snowW * 0.4, curr.y + snowH * 0.4);
      ctx.lineTo(curr.x + snowW * 0.3, curr.y + snowH * 0.3);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fill();
    }

    // ── Lava glow on late/extreme peaks ─────────────────────────
    if ((tier === 'late' || tier === 'extreme') && peakHeight > 5) {
      const lavaGrad = ctx.createRadialGradient(curr.x, curr.y, 0, curr.x, curr.y, 20);
      lavaGrad.addColorStop(0, tier === 'extreme' ? 'rgba(255,50,0,0.25)' : 'rgba(255,100,20,0.2)');
      lavaGrad.addColorStop(1, 'rgba(255,50,0,0)');
      ctx.fillStyle = lavaGrad;
      ctx.beginPath();
      ctx.arc(curr.x, curr.y, 20, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── BACKGROUND MOUNTAIN SILHOUETTE ────────────────────────────
  ctx.save();
  ctx.globalAlpha = 0.18;
  const bgMtnColor = tier === 'early'  ? '#0a2a3a'
                   : tier === 'mid'    ? '#2a1808'
                   : tier === 'late'   ? '#2a0808'
                   : '#180505';
  ctx.fillStyle = bgMtnColor;
  ctx.beginPath();
  ctx.moveTo(0, H);
  const bgPts = pts.map((p, i) => ({
    x: p.x + Math.sin(i * 2.3) * 18,
    y: p.y + 35 + Math.cos(i * 1.7) * 15
  }));
  ctx.moveTo(bgPts[0].x, bgPts[0].y);
  for (let i = 1; i < bgPts.length; i++) ctx.lineTo(bgPts[i].x, bgPts[i].y);
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fill();
  ctx.restore();

  // ── LANDING PADS ─────────────────────────────────────────────
  pads.forEach(pad => {
    const c       = getPadColors(pad.bonus === 2);
    const isBonus = pad.bonus === 2;
    const cx      = pad.x + pad.width / 2;
    const py      = pad.y;
    const pw      = pad.width;
    const ph      = 16;
    const pt      = py - ph;

    const t1 = gameTime * 4.5;
    const t2 = gameTime * 5.0;
    const t3 = gameTime * 1.6;
    const pulse  = 0.5 + 0.5 * Math.sin(t1);
    const pulse2 = 0.5 + 0.5 * Math.sin(t1 + Math.PI);
    const slow   = 0.5 + 0.5 * Math.sin(t3);

    ctx.save();

    // ── GROUND LIGHT SPILL ───────────────────────────────
    const spill = ctx.createRadialGradient(cx, py + 2, 0, cx, py + 2, pw * 0.9);
    spill.addColorStop(0,   c.rgba + '0.15)');
    spill.addColorStop(1,   c.rgba + '0)');
    ctx.fillStyle = spill;
    ctx.beginPath();
    ctx.ellipse(cx, py + 5, pw * 0.9, 11, 0, 0, Math.PI * 2);
    ctx.fill();

    // ── STRUCTURAL LEG SYSTEM ────────────────────────────
    const legPositions = [0.10, 0.32, 0.68, 0.90];
    legPositions.forEach((t, li) => {
      const lx      = pad.x + pw * t;
      const isOuter = li === 0 || li === 3;
      const spread  = isOuter ? (li === 0 ? -11 : 11) : (li === 1 ? -2 : 2);
      const legLen  = isOuter ? 15 : 12;

      // Main leg pipe
      ctx.strokeStyle = c.rgba + (isOuter ? '0.8)' : '0.6)');
      ctx.lineWidth   = isOuter ? 2.5 : 1.8;
      ctx.beginPath();
      ctx.moveTo(lx, pt + ph - 1);
      ctx.lineTo(lx + spread, py + legLen);
      ctx.stroke();

      // Inner hydraulic highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth   = 0.8;
      ctx.beginPath();
      ctx.moveTo(lx + spread * 0.2, pt + ph + 1);
      ctx.lineTo(lx + spread * 0.65, py + legLen - 3);
      ctx.stroke();

      // Hydraulic collar ring
      if (isOuter) {
        ctx.strokeStyle = c.rgba + '0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(lx + spread * 0.45 - 2, py + legLen * 0.55);
        ctx.lineTo(lx + spread * 0.45 + 2, py + legLen * 0.55);
        ctx.stroke();
      }

      // Foot assembly
      const fx = lx + spread, fy = py + legLen;
      ctx.strokeStyle = c.rgba + '0.7)';
      ctx.lineWidth   = isOuter ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.moveTo(fx - (isOuter ? 8 : 5), fy);
      ctx.lineTo(fx + (isOuter ? 8 : 5), fy);
      ctx.stroke();
      ctx.fillStyle = c.rgba + '0.6)';
      [-1, 1].forEach(s => {
        ctx.beginPath();
        ctx.arc(fx + s * (isOuter ? 8 : 5), fy, 1.5, 0, Math.PI * 2);
        ctx.fill();
      });
    });

    // Cross-bracing
    [[0,1],[2,3]].forEach(([a,b]) => {
      const ax = pad.x + pw * legPositions[a];
      const bx = pad.x + pw * legPositions[b];
      ctx.strokeStyle = c.rgba + '0.22)';
      ctx.lineWidth   = 0.9;
      [[ax, bx], [bx, ax]].forEach(([x1, x2]) => {
        ctx.beginPath();
        ctx.moveTo(x1, pt + ph); ctx.lineTo(x2, py + 13); ctx.stroke();
      });
    });

    // ── I-BEAM UNDERFRAME ────────────────────────────────
    // Flange top
    ctx.fillStyle = c.rgba + '0.55)';
    ctx.fillRect(pad.x + pw * 0.05, pt + ph - 2, pw * 0.9, 3);
    // Web (vertical centre rib)
    ctx.fillStyle = c.rgba + '0.35)';
    ctx.fillRect(pad.x + pw * 0.05, pt + ph - 2, pw * 0.9, 1);
    // Secondary ribs at 25% and 75%
    [0.25, 0.5, 0.75].forEach(rp => {
      ctx.fillStyle = c.rgba + '0.25)';
      ctx.fillRect(pad.x + pw * rp - 1, pt + ph - 2, 2, 8);
    });

    // ── PLATE BODY — OUTER SHELL ─────────────────────────
    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.roundRect(pad.x + 3, pt + 4, pw - 3, ph, [0,0,3,3]);
    ctx.fill();

    // Main plate — dark metal base
    const plateBase = ctx.createLinearGradient(pad.x, pt, pad.x, pt + ph);
    plateBase.addColorStop(0,    'rgba(40,44,48,0.98)');
    plateBase.addColorStop(0.08, 'rgba(55,60,65,0.98)');
    plateBase.addColorStop(0.5,  'rgba(48,52,56,0.98)');
    plateBase.addColorStop(0.92, 'rgba(35,38,42,0.98)');
    plateBase.addColorStop(1,    'rgba(22,24,26,0.98)');
    ctx.fillStyle = plateBase;
    ctx.beginPath();
    ctx.roundRect(pad.x, pt, pw, ph, [4,4,2,2]);
    ctx.fill();

    // ── RAISED OUTER BORDER FRAME ────────────────────────
    const borderW = 4;
    // Top border strip (lighter — catches light)
    const topBorder = ctx.createLinearGradient(pad.x, pt, pad.x, pt + borderW);
    topBorder.addColorStop(0, c.rgba + '0.7)');
    topBorder.addColorStop(1, c.rgba + '0.2)');
    ctx.fillStyle = topBorder;
    ctx.fillRect(pad.x + borderW, pt, pw - borderW*2, borderW);

    // Bottom border strip (darker)
    ctx.fillStyle = c.rgba + '0.3)';
    ctx.fillRect(pad.x + borderW, pt + ph - borderW, pw - borderW*2, borderW);

    // Left / right border strips
    [pad.x, pad.x + pw - borderW].forEach(bx => {
      const sideGrad = ctx.createLinearGradient(bx, pt, bx + borderW, pt);
      sideGrad.addColorStop(0, c.rgba + '0.55)');
      sideGrad.addColorStop(1, c.rgba + '0.15)');
      ctx.fillStyle = sideGrad;
      ctx.fillRect(bx, pt, borderW, ph);
    });

    // Inner recess shadow (gives depth to the frame)
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(pad.x + borderW, pt + borderW, pw - borderW*2, ph - borderW*2, 2);
    ctx.stroke();

    // ── INNER RECESSED PANEL ─────────────────────────────
    const innerX = pad.x + borderW + 1;
    const innerY = pt + borderW + 1;
    const innerW = pw - (borderW + 1) * 2;
    const innerH = ph - (borderW + 1) * 2;

    // Recessed panel fill (slightly darker than surround)
    ctx.fillStyle = 'rgba(30,33,36,0.95)';
    ctx.beginPath();
    ctx.roundRect(innerX, innerY, innerW, innerH, 1);
    ctx.fill();

    // ── GRATING TEXTURE (centre zone) ───────────────────
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(innerX, innerY, innerW, innerH, 1);
    ctx.clip();
    // Horizontal grating lines
    ctx.strokeStyle = c.rgba + '0.10)';
    ctx.lineWidth = 0.7;
    for (let gy = innerY + 1.5; gy < innerY + innerH; gy += 2.5) {
      ctx.beginPath(); ctx.moveTo(innerX, gy); ctx.lineTo(innerX + innerW, gy); ctx.stroke();
    }
    // Vertical grating lines
    for (let gx = innerX + 1.5; gx < innerX + innerW; gx += 4) {
      ctx.beginPath(); ctx.moveTo(gx, innerY); ctx.lineTo(gx, innerY + innerH); ctx.stroke();
    }
    ctx.restore();

    // ── WARNING STRIPE BORDER (outer rim) ───────────────
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(pad.x, pt, pw, ph, [4,4,2,2]);
    ctx.clip();
    const stripeColor = isBonus ? c.rgba + '0.22)' : 'rgba(255,200,0,0.12)';
    ctx.fillStyle = stripeColor;
    for (let sx = pad.x - ph; sx < pad.x + pw + ph; sx += 8) {
      ctx.beginPath();
      ctx.moveTo(sx,      pt);
      ctx.lineTo(sx + ph, pt);
      ctx.lineTo(sx + ph - borderW*1.5, pt + ph);
      ctx.lineTo(sx - borderW*1.5, pt + ph);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // ── CORNER BOLT MOUNTS ───────────────────────────────
    const boltPositions = [
      [pad.x + 5,      pt + 3.5],
      [pad.x + pw - 5, pt + 3.5],
      [pad.x + 5,      pt + ph - 3.5],
      [pad.x + pw - 5, pt + ph - 3.5],
    ];
    boltPositions.forEach(([bx, by]) => {
      // Bolt recess (dark circle)
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.beginPath(); ctx.arc(bx, by, 2.8, 0, Math.PI * 2); ctx.fill();
      // Bolt head
      ctx.fillStyle = c.rgba + '0.55)';
      ctx.beginPath(); ctx.arc(bx, by, 2, 0, Math.PI * 2); ctx.fill();
      // Bolt highlight
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath(); ctx.arc(bx - 0.6, by - 0.6, 0.9, 0, Math.PI * 2); ctx.fill();
    });

    // Also secondary bolts along edges for bigger pads
    if (pw > 60) {
      [cx].forEach(bx => {
        [pt + 3.5, pt + ph - 3.5].forEach(by => {
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.beginPath(); ctx.arc(bx, by, 2.2, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = c.rgba + '0.45)';
          ctx.beginPath(); ctx.arc(bx, by, 1.5, 0, Math.PI * 2); ctx.fill();
        });
      });
    }

    // ── TOP BEVEL HIGHLIGHT ───────────────────────────────
    const bevel = ctx.createLinearGradient(pad.x, pt, pad.x + pw, pt + 1.5);
    bevel.addColorStop(0,   'rgba(255,255,255,0.18)');
    bevel.addColorStop(0.5, 'rgba(255,255,255,0.30)');
    bevel.addColorStop(1,   'rgba(255,255,255,0.12)');
    ctx.fillStyle = bevel;
    ctx.fillRect(pad.x + 4, pt, pw - 8, 1.5);

    // Front face plate thickness (visible below the pad)
    const faceGrad = ctx.createLinearGradient(pad.x, py - 2, pad.x, py + 2);
    faceGrad.addColorStop(0, c.rgba + '0.5)');
    faceGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = faceGrad;
    ctx.fillRect(pad.x + 2, py - 2, pw - 4, 3);

    // ── LANDING TARGET ────────────────────────────────────
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(innerX, innerY, innerW, innerH, 1);
    ctx.clip();

    if (isBonus) {
      [0.42, 0.27, 0.13].forEach((rp, ri) => {
        ctx.strokeStyle = c.rgba + `${0.2 + ri * 0.16})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(cx, innerY + innerH/2, innerW * rp, innerH * 0.38, 0, 0, Math.PI * 2);
        ctx.stroke();
      });
      ctx.fillStyle = c.rgba + '0.8)';
      ctx.beginPath(); ctx.arc(cx, innerY + innerH/2, 2, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = c.rgba + '0.3)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(cx - innerW*0.25, innerY + innerH/2); ctx.lineTo(cx + innerW*0.25, innerY + innerH/2);
      ctx.moveTo(cx, innerY + 1); ctx.lineTo(cx, innerY + innerH - 1);
      ctx.stroke();
      [innerX + innerW*0.08, innerX + innerW*0.92].forEach((ax, ai) => {
        const dir = ai === 0 ? 1 : -1;
        ctx.strokeStyle = c.rgba + '0.6)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ax, innerY + 1); ctx.lineTo(ax + dir*5, innerY + innerH/2); ctx.lineTo(ax, innerY + innerH - 1);
        ctx.stroke();
      });
    } else {
      const hs = Math.min(innerW * 0.16, 9);
      ctx.strokeStyle = c.rgba + '0.55)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(cx - hs, innerY + 1); ctx.lineTo(cx - hs, innerY + innerH - 1);
      ctx.moveTo(cx + hs, innerY + 1); ctx.lineTo(cx + hs, innerY + innerH - 1);
      ctx.moveTo(cx - hs, innerY + innerH/2); ctx.lineTo(cx + hs, innerY + innerH/2);
      ctx.stroke();
      [[innerX + innerW*0.06, innerY+1, 1,1],[innerX + innerW*0.94, innerY+1,-1,1],
       [innerX + innerW*0.06, innerY+innerH-1,1,-1],[innerX + innerW*0.94, innerY+innerH-1,-1,-1]].forEach(([bx,by,dx,dy]) => {
        ctx.strokeStyle = c.rgba + '0.45)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(bx+dx*3,by); ctx.lineTo(bx,by); ctx.lineTo(bx,by+dy*3);
        ctx.stroke();
      });
    }
    ctx.restore();

    // ── EDGE LIGHT STRIP ──────────────────────────────────
    const lightCount = Math.max(5, Math.floor(pw / 10));
    for (let li = 0; li < lightCount; li++) {
      const lx     = pad.x + (pw / (lightCount - 1)) * li;
      // Chase pattern for bonus, pulse for standard
      const phase  = isBonus
        ? (t2 - li * 0.45) % (Math.PI * 2)
        : t2 + li * 0.65;
      const lp     = 0.35 + 0.65 * Math.abs(Math.sin(phase));
      const lColor = isBonus && li % 3 === 0 ? 'rgba(255,255,255,' : c.rgba;
      ctx.globalAlpha = lp;
      ctx.fillStyle   = lColor + '1)';
      ctx.shadowColor = lColor + '1)';
      ctx.shadowBlur  = 5 * lp;
      ctx.beginPath();
      ctx.arc(lx, pt, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;

    // ── CORNER PYLONS ────────────────────────────────────
    const pylonH  = 22;
    const pylonW  = 3;

    [pad.x - 2, pad.x + pw - 1].forEach((px2, pi) => {
      // Pylon shaft gradient
      const pGrad = ctx.createLinearGradient(px2, pt - pylonH, px2, pt);
      pGrad.addColorStop(0, c.rgba + '0.9)');
      pGrad.addColorStop(0.4, c.rgba + '0.6)');
      pGrad.addColorStop(1, c.rgba + '0.85)');
      ctx.fillStyle = pGrad;
      ctx.fillRect(px2, pt - pylonH, pylonW, pylonH);

      // Pylon detail bands
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      [0.3, 0.6].forEach(bp => {
        ctx.fillRect(px2, pt - pylonH * bp, pylonW, 1.5);
      });

      // Equipment box mid-pylon
      ctx.fillStyle = c.rgba + '0.45)';
      ctx.strokeStyle = c.rgba + '0.65)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.roundRect(px2 - 2, pt - pylonH * 0.62, pylonW + 4, 5, 1);
      ctx.fill(); ctx.stroke();
      // Box indicator light
      const eLit = Math.sin(t2 * 0.7 + pi * 2.1) > 0;
      ctx.fillStyle = eLit ? c.main : c.rgba + '0.3)';
      ctx.beginPath();
      ctx.arc(px2 + pylonW/2, pt - pylonH * 0.62 + 2.5, 1, 0, Math.PI * 2);
      ctx.fill();

      // Beacon bulb on top
      const bPulse = pi === 0 ? pulse : pulse2;
      ctx.globalAlpha = 0.25 + bPulse * 0.75;
      ctx.fillStyle   = c.main;
      ctx.shadowColor = c.main;
      ctx.shadowBlur  = 12 * bPulse;
      ctx.beginPath();
      ctx.arc(px2 + pylonW/2, pt - pylonH, 3.5, 0, Math.PI * 2);
      ctx.fill();
      // Beacon halo
      const bHalo = ctx.createRadialGradient(px2+pylonW/2, pt-pylonH, 0, px2+pylonW/2, pt-pylonH, 12);
      bHalo.addColorStop(0, c.rgba + `${bPulse*0.45})`);
      bHalo.addColorStop(1, c.rgba + '0)');
      ctx.fillStyle = bHalo;
      ctx.beginPath();
      ctx.arc(px2+pylonW/2, pt-pylonH, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.shadowBlur  = 0;
    });

    // ── DISPLAY PANEL (floats above pylons) ───────────────
    const dpW    = isBonus ? 52 : 38;
    const dpH    = 16;
    const dpX    = cx - dpW / 2;
    const dpY    = pt - pylonH - dpH - 5;
    const mountH = 5;

    // Mounting rod
    ctx.strokeStyle = c.rgba + '0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, pt - pylonH);
    ctx.lineTo(cx, dpY + dpH);
    ctx.stroke();

    // Panel shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.roundRect(dpX + 2, dpY + 2, dpW, dpH, 3);
    ctx.fill();

    // Panel body
    ctx.fillStyle = 'rgba(0,0,0,0.88)';
    ctx.strokeStyle = c.main;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = c.main;
    ctx.shadowBlur  = slow * 12;
    ctx.beginPath();
    ctx.roundRect(dpX, dpY, dpW, dpH, 3);
    ctx.fill(); ctx.stroke();

    // Panel inner glow
    const panelGlow = ctx.createLinearGradient(dpX, dpY, dpX + dpW, dpY + dpH);
    panelGlow.addColorStop(0,   c.rgba + '0.06)');
    panelGlow.addColorStop(0.5, c.rgba + '0.18)');
    panelGlow.addColorStop(1,   c.rgba + '0.06)');
    ctx.fillStyle = panelGlow;
    ctx.beginPath();
    ctx.roundRect(dpX+1, dpY+1, dpW-2, dpH-2, 2);
    ctx.fill();

    // Panel side accent lines
    ctx.fillStyle = c.rgba + '0.7)';
    ctx.fillRect(dpX + 3, dpY + 2, 1.5, dpH - 4);
    ctx.fillRect(dpX + dpW - 4.5, dpY + 2, 1.5, dpH - 4);

    // Panel text
    ctx.shadowBlur  = slow * 7;
    ctx.font        = `bold ${isBonus ? 10 : 9}px 'Orbitron', monospace`;
    ctx.fillStyle   = isBonus ? '#ffffff' : c.main;
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(isBonus ? '×2 BONUS' : '×1', cx, dpY + dpH / 2);
    ctx.shadowBlur  = 0;

    ctx.restore();
  });
}

// ── SHIP DESIGNS ────────────────────────────────────────────────
function getShipColors(shipType) {
  if (shipType === 'custom') {
    const pal = COLOR_PALETTES[customShipConfig.paletteIndex || 0];
    return { primary: pal.primary, secondary: pal.secondary, accent: pal.accent, stripe: pal.stripe };
  }
  const ships = {
    starter: {
      primary: '#d0dae8',
      secondary: '#8898a8',
      accent: '#aabbcc',
      stripe: '#6a7a8a'
    },
    speedster: {
      primary: '#ff6b4a',
      secondary: '#cc4422',
      accent: '#ffaa88',
      stripe: '#ff3311'
    },
    workhorse: {
      primary: '#ffd700',
      secondary: '#cc9900',
      accent: '#ffed4e',
      stripe: '#b8860b'
    },
    precision: {
      primary: '#00ddff',
      secondary: '#0099bb',
      accent: '#66eeff',
      stripe: '#0066aa'
    },
    legend: {
      primary: '#cc44ff',
      secondary: '#9900dd',
      accent: '#ff66ff',
      stripe: '#7700cc'
    }
  };
  return ships[shipType] || ships.starter;
}

function drawShipBody(shipType, TOP, NOZZLE) {
  const colors = getShipColors(shipType);
  const MID = (TOP + NOZZLE) / 2;

  // ── LANDING LEGS ─────────────────────────────────────────────
  ctx.strokeStyle = colors.stripe;
  ctx.lineWidth = 1.5;
  // Left leg — angled outward with foot pad
  ctx.beginPath();
  ctx.moveTo(-8, NOZZLE - 8);
  ctx.lineTo(-20, NOZZLE + 4);
  ctx.lineTo(-24, NOZZLE + 4);
  ctx.strokeStyle = colors.secondary;
  ctx.stroke();
  ctx.beginPath(); // foot pad
  ctx.moveTo(-22, NOZZLE + 3);
  ctx.lineTo(-26, NOZZLE + 3);
  ctx.lineWidth = 3;
  ctx.strokeStyle = colors.primary;
  ctx.stroke();
  // Right leg
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(8, NOZZLE - 8);
  ctx.lineTo(20, NOZZLE + 4);
  ctx.lineTo(24, NOZZLE + 4);
  ctx.strokeStyle = colors.secondary;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(22, NOZZLE + 3);
  ctx.lineTo(26, NOZZLE + 3);
  ctx.lineWidth = 3;
  ctx.strokeStyle = colors.primary;
  ctx.stroke();
  // Diagonal struts
  ctx.lineWidth = 0.8;
  ctx.strokeStyle = colors.stripe;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(-13, NOZZLE - 4); ctx.lineTo(-20, NOZZLE + 4);
  ctx.moveTo(13, NOZZLE - 4);  ctx.lineTo(20, NOZZLE + 4);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // ── FINS ─────────────────────────────────────────────────────
  const finStyle = (shipType === 'custom') ? (customShipConfig.fin || 'swept') : 'swept';

  const drawFin = (side) => {
    const s = side === 'left' ? -1 : 1;
    const finGrad = ctx.createLinearGradient(s*22, TOP + 14, s*10, NOZZLE - 4);
    finGrad.addColorStop(0, colors.secondary);
    finGrad.addColorStop(1, colors.accent);
    ctx.fillStyle = finGrad;
    ctx.strokeStyle = colors.stripe;
    ctx.lineWidth = 1;

    if (finStyle === 'straight') {
      // Tall upright fin — narrow and vertical
      ctx.beginPath();
      ctx.moveTo(s*10, TOP + 10);
      ctx.lineTo(s*20, NOZZLE - 4);
      ctx.lineTo(s*10, NOZZLE - 4);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.moveTo(s*11, TOP + 15); ctx.lineTo(s*18, NOZZLE - 8);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (finStyle === 'wide') {
      // Broad swept wing — extends far outward
      ctx.beginPath();
      ctx.moveTo(s*10, MID - 4);
      ctx.lineTo(s*32, NOZZLE - 1);
      ctx.lineTo(s*10, NOZZLE - 4);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.moveTo(s*11, MID + 2); ctx.lineTo(s*27, NOZZLE - 5);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else {
      // Swept delta (default)
      ctx.beginPath();
      ctx.moveTo(s*10, TOP + 18);
      ctx.lineTo(s*24, NOZZLE - 2);
      ctx.lineTo(s*10, NOZZLE - 4);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.moveTo(s*11, TOP + 22); ctx.lineTo(s*21, NOZZLE - 6);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  };

  drawFin('left');
  drawFin('right');

  // ── MAIN FUSELAGE ────────────────────────────────────────────
  const bodyGrad = ctx.createLinearGradient(-14, TOP, 14, NOZZLE);
  bodyGrad.addColorStop(0,   colors.accent);
  bodyGrad.addColorStop(0.15, colors.primary);
  bodyGrad.addColorStop(0.5,  colors.accent);
  bodyGrad.addColorStop(0.85, colors.primary);
  bodyGrad.addColorStop(1,   colors.secondary);
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = colors.stripe;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, TOP);           // nose tip
  ctx.lineTo(9, TOP + 6);       // shoulder right
  ctx.lineTo(12, TOP + 16);     // upper body right
  ctx.lineTo(13, MID);          // mid right
  ctx.lineTo(11, NOZZLE - 10);  // lower body right
  ctx.lineTo(7, NOZZLE - 4);    // engine collar right
  ctx.lineTo(-7, NOZZLE - 4);   // engine collar left
  ctx.lineTo(-11, NOZZLE - 10); // lower body left
  ctx.lineTo(-13, MID);         // mid left
  ctx.lineTo(-12, TOP + 16);    // upper body left
  ctx.lineTo(-9, TOP + 6);      // shoulder left
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // ── SIDE PANEL DETAIL ────────────────────────────────────────
  // Left accent panel
  ctx.fillStyle = colors.secondary;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(-12, TOP + 16);
  ctx.lineTo(-13, MID);
  ctx.lineTo(-10, MID + 4);
  ctx.lineTo(-9, TOP + 18);
  ctx.closePath();
  ctx.fill();
  // Right accent panel
  ctx.beginPath();
  ctx.moveTo(12, TOP + 16);
  ctx.lineTo(13, MID);
  ctx.lineTo(10, MID + 4);
  ctx.lineTo(9, TOP + 18);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // ── ENGINE COLLAR ────────────────────────────────────────────
  const collarGrad = ctx.createLinearGradient(-10, NOZZLE - 6, 10, NOZZLE);
  collarGrad.addColorStop(0, colors.secondary);
  collarGrad.addColorStop(0.5, 'rgba(20,20,20,0.8)');
  collarGrad.addColorStop(1, colors.secondary);
  ctx.fillStyle = collarGrad;
  ctx.strokeStyle = colors.stripe;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-7, NOZZLE - 4);
  ctx.lineTo(-9, NOZZLE);
  ctx.lineTo(9, NOZZLE);
  ctx.lineTo(7, NOZZLE - 4);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Engine nozzle bell
  ctx.fillStyle = 'rgba(15,15,15,0.9)';
  ctx.strokeStyle = colors.accent;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(-6, NOZZLE);
  ctx.lineTo(-8, NOZZLE + 5);
  ctx.lineTo(8, NOZZLE + 5);
  ctx.lineTo(6, NOZZLE);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // ── HORIZONTAL PANEL LINES ───────────────────────────────────
  ctx.strokeStyle = colors.stripe;
  ctx.globalAlpha = 0.3;
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(-9, TOP + 12);    ctx.lineTo(9, TOP + 12);
  ctx.moveTo(-12, TOP + 22);   ctx.lineTo(12, TOP + 22);
  ctx.moveTo(-13, MID - 4);    ctx.lineTo(13, MID - 4);
  ctx.moveTo(-12, MID + 6);    ctx.lineTo(12, MID + 6);
  ctx.moveTo(-11, NOZZLE - 14);ctx.lineTo(11, NOZZLE - 14);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // ── NOSE CONE ────────────────────────────────────────────────
  const noseStyle = (shipType === 'custom') ? (customShipConfig.nose || 'sharp') : 'sharp';
  const noseGrad = ctx.createLinearGradient(-6, TOP, 6, TOP + 10);
  noseGrad.addColorStop(0, 'rgba(255,255,255,0.6)');
  noseGrad.addColorStop(0.4, colors.primary);
  noseGrad.addColorStop(1, colors.accent);
  ctx.fillStyle = noseGrad;
  ctx.strokeStyle = colors.stripe;
  ctx.lineWidth = 1;

  if (noseStyle === 'rounded') {
    // Smooth bezier dome
    ctx.beginPath();
    ctx.moveTo(-9, TOP + 6);
    ctx.quadraticCurveTo(-10, TOP - 1, 0, TOP - 7);
    ctx.quadraticCurveTo(10, TOP - 1, 9, TOP + 6);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Rounded highlight
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.beginPath();
    ctx.ellipse(-1.5, TOP, 1.5, 3, -0.2, 0, Math.PI * 2);
    ctx.fill();
  } else if (noseStyle === 'blunt') {
    // Flat-topped industrial cap
    ctx.beginPath();
    ctx.moveTo(-6, TOP + 1);
    ctx.lineTo(6, TOP + 1);
    ctx.lineTo(9, TOP + 6);
    ctx.lineTo(-9, TOP + 6);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Flat highlight bar
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.roundRect(-4, TOP + 1, 5, 2, 1);
    ctx.fill();
  } else {
    // Sharp (default)
    ctx.beginPath();
    ctx.moveTo(0, TOP - 10);
    ctx.lineTo(9, TOP + 6);
    ctx.lineTo(-9, TOP + 6);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Sharp tip highlight
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.ellipse(-1, TOP - 4, 1.2, 2.5, -0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── COCKPIT VISOR ────────────────────────────────────────────
  // Visor sits lower for blunt nose since the nose doesn't extend as far
  const visorY = noseStyle === 'blunt' ? TOP + 7 : TOP + 9;
  // Visor frame
  ctx.fillStyle = colors.stripe;
  ctx.beginPath();
  ctx.ellipse(0, visorY, 5.5, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Visor glass
  const visorGrad = ctx.createRadialGradient(-1, visorY - 2, 0, 0, visorY, 5);
  visorGrad.addColorStop(0, 'rgba(180,240,255,0.9)');
  visorGrad.addColorStop(0.4, 'rgba(80,180,255,0.7)');
  visorGrad.addColorStop(1, 'rgba(0,60,150,0.5)');
  ctx.fillStyle = visorGrad;
  ctx.beginPath();
  ctx.ellipse(0, visorY, 4.5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  // Visor reflection
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(-1.5, visorY - 1.5, 1.5, 1, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // ── NAVIGATION LIGHTS ────────────────────────────────────────
  // Left nav light (red)
  ctx.fillStyle = `rgba(255,50,50,0.9)`;
  ctx.beginPath();
  ctx.arc(-13, MID, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = `rgba(255,100,100,0.3)`;
  ctx.beginPath();
  ctx.arc(-13, MID, 3.5, 0, Math.PI * 2);
  ctx.fill();
  // Right nav light (green)
  ctx.fillStyle = `rgba(50,255,100,0.9)`;
  ctx.beginPath();
  ctx.arc(13, MID, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = `rgba(100,255,150,0.3)`;
  ctx.beginPath();
  ctx.arc(13, MID, 3.5, 0, Math.PI * 2);
  ctx.fill();

  // ── FUSELAGE SHINE ───────────────────────────────────────────
  const shineGrad = ctx.createLinearGradient(-14, TOP, -4, NOZZLE);
  shineGrad.addColorStop(0, 'rgba(255,255,255,0.18)');
  shineGrad.addColorStop(0.5, 'rgba(255,255,255,0.06)');
  shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shineGrad;
  ctx.beginPath();
  ctx.moveTo(-9, TOP + 6);
  ctx.lineTo(-3, TOP + 6);
  ctx.lineTo(-4, NOZZLE - 10);
  ctx.lineTo(-11, NOZZLE - 10);
  ctx.closePath();
  ctx.fill();

  // ── RCS THRUSTER PORTS ───────────────────────────────────────
  // Small attitude control jets on each side
  const rcsY = MID - 4;
  [-13, 13].forEach((x, i) => {
    ctx.fillStyle = 'rgba(20,20,20,0.9)';
    ctx.beginPath();
    ctx.rect(x < 0 ? x - 3 : x, rcsY - 2, 3, 4);
    ctx.fill();
    ctx.strokeStyle = colors.stripe;
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x < 0 ? x - 3 : x, rcsY - 2, 3, 4);
    // RCS nozzle opening
    ctx.fillStyle = 'rgba(80,60,40,0.8)';
    ctx.beginPath();
    ctx.arc(x < 0 ? x - 1.5 : x + 1.5, rcsY + 1, 1, 0, Math.PI * 2);
    ctx.fill();
  });

  // ── HAZARD STRIPES ON LEGS ───────────────────────────────────
  ctx.save();
  ctx.globalAlpha = 0.7;
  // Left leg stripes
  for (let i = 0; i < 3; i++) {
    const t = (i + 1) / 4;
    const lx1 = -8 + (-20 + 8) * t;
    const ly1 = (NOZZLE - 8) + (NOZZLE + 4 - (NOZZLE - 8)) * t;
    ctx.strokeStyle = i % 2 === 0 ? '#ffcc00' : 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(lx1 - 1.5, ly1 - 2); ctx.lineTo(lx1 + 1.5, ly1 + 2);
    ctx.stroke();
  }
  // Right leg stripes
  for (let i = 0; i < 3; i++) {
    const t = (i + 1) / 4;
    const rx1 = 8 + (20 - 8) * t;
    const ry1 = (NOZZLE - 8) + (NOZZLE + 4 - (NOZZLE - 8)) * t;
    ctx.strokeStyle = i % 2 === 0 ? '#ffcc00' : 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(rx1 - 1.5, ry1 - 2); ctx.lineTo(rx1 + 1.5, ry1 + 2);
    ctx.stroke();
  }
  ctx.restore();

  // ── COCKPIT AMBIENT GLOW ─────────────────────────────────────
  const cockpitGlow = ctx.createRadialGradient(0, TOP + 9, 0, 0, TOP + 9, 12);
  cockpitGlow.addColorStop(0, 'rgba(100,200,255,0.15)');
  cockpitGlow.addColorStop(1, 'rgba(100,200,255,0)');
  ctx.fillStyle = cockpitGlow;
  ctx.beginPath();
  ctx.arc(0, TOP + 9, 12, 0, Math.PI * 2);
  ctx.fill();

  // ── ANTENNA / SENSOR MAST ────────────────────────────────────
  ctx.strokeStyle = colors.stripe;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(0, TOP - 10);
  ctx.lineTo(0, TOP - 16);
  ctx.stroke();
  // Antenna tip light
  ctx.fillStyle = 'rgba(255,50,50,0.9)';
  ctx.beginPath();
  ctx.arc(0, TOP - 16, 1.2, 0, Math.PI * 2);
  ctx.fill();
  // Antenna crossbar
  ctx.strokeStyle = colors.stripe;
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(-3, TOP - 13); ctx.lineTo(3, TOP - 13);
  ctx.stroke();

  // ── HULL RIVETS ──────────────────────────────────────────────
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = colors.stripe;
  [
    [-11, TOP + 12], [11, TOP + 12],
    [-12, TOP + 22], [12, TOP + 22],
    [-12, MID - 4],  [12, MID - 4],
    [-11, MID + 6],  [11, MID + 6],
  ].forEach(([rx, ry]) => {
    ctx.beginPath();
    ctx.arc(rx, ry, 1, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // ── ENGINE BELL INNER RING ────────────────────────────────────
  const bellGrad = ctx.createLinearGradient(-6, NOZZLE, 6, NOZZLE + 5);
  bellGrad.addColorStop(0, colors.secondary);
  bellGrad.addColorStop(0.5, 'rgba(40,40,40,0.9)');
  bellGrad.addColorStop(1, colors.secondary);
  ctx.fillStyle = bellGrad;
  ctx.beginPath();
  ctx.moveTo(-4, NOZZLE + 1);
  ctx.lineTo(-5, NOZZLE + 4);
  ctx.lineTo(5, NOZZLE + 4);
  ctx.lineTo(4, NOZZLE + 1);
  ctx.closePath();
  ctx.fill();
  // Engine heat shield rim
  ctx.strokeStyle = colors.accent;
  ctx.lineWidth = 0.8;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(-8, NOZZLE + 5); ctx.lineTo(8, NOZZLE + 5);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // ── FIN TIP LIGHTS ────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,200,50,0.9)';
  ctx.beginPath(); ctx.arc(-22, NOZZLE - 4, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(22, NOZZLE - 4, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,200,50,0.25)';
  ctx.beginPath(); ctx.arc(-22, NOZZLE - 4, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(22, NOZZLE - 4, 3, 0, Math.PI * 2); ctx.fill();
}

function drawLander() {
  if (gameState === 'menu') return;
  if (lander.crashed) return;
  ctx.save();
  ctx.translate(lander.x, lander.y);
  ctx.rotate(lander.angle);
  ctx.scale(0.8, 0.8);

  const TOP    = -26;
  const NOZZLE =  18;
  const flicker = Math.random();

  // ── THRUSTER FLAME ──────────────────────────────────────────
  if (lander.thrusting && lander.fuel > 0) {
    const f1 = Math.random(), f2 = Math.random(), f3 = Math.random();
    const f4 = Math.random(), f5 = Math.random(), f6 = Math.random();
    const flameH  = 22 + f1 * 24;
    const wobble  = (f2 - 0.5) * 4;
    const wobble2 = (f3 - 0.5) * 2;
    const pulse   = 0.8 + f5 * 0.4;

    // ── 1. Far-field bloom (ship underside lit orange) ────────
    const bloom = ctx.createRadialGradient(0, NOZZLE + flameH * 0.3, 0, 0, NOZZLE + flameH * 0.3, flameH * 1.1);
    bloom.addColorStop(0,   'rgba(255,120,20,0.13)');
    bloom.addColorStop(0.4, 'rgba(255,60,5,0.06)');
    bloom.addColorStop(1,   'rgba(180,20,0,0)');
    ctx.beginPath();
    ctx.ellipse(wobble * 0.3, NOZZLE + flameH * 0.3, flameH * 1.1, flameH * 0.7, 0, 0, Math.PI * 2);
    ctx.fillStyle = bloom;
    ctx.fill();

    // ── 2. Wide ambient nozzle glow ───────────────────────────
    const ambGlow = ctx.createRadialGradient(0, NOZZLE + 3, 0, 0, NOZZLE + 8, 26);
    ambGlow.addColorStop(0,   `rgba(255,180,50,${0.22 * pulse})`);
    ambGlow.addColorStop(0.45,'rgba(255,90,15,0.1)');
    ambGlow.addColorStop(1,   'rgba(200,40,0,0)');
    ctx.beginPath();
    ctx.ellipse(0, NOZZLE + 8, 26, 16, 0, 0, Math.PI * 2);
    ctx.fillStyle = ambGlow;
    ctx.fill();

    // ── 3. Outer plasma envelope ──────────────────────────────
    ctx.beginPath();
    ctx.moveTo(-10, NOZZLE);
    ctx.bezierCurveTo(-15, NOZZLE + flameH*0.22, -7+wobble, NOZZLE + flameH*0.72, wobble*0.5, NOZZLE + flameH);
    ctx.bezierCurveTo( 7+wobble, NOZZLE + flameH*0.72,  15, NOZZLE + flameH*0.22, 10, NOZZLE);
    ctx.closePath();
    const og = ctx.createLinearGradient(0, NOZZLE, wobble*0.4, NOZZLE + flameH);
    og.addColorStop(0,    `rgba(255,235,170,${0.72 * pulse})`);
    og.addColorStop(0.12, 'rgba(255,145,22,0.62)');
    og.addColorStop(0.45, 'rgba(255,52,6,0.42)');
    og.addColorStop(0.75, 'rgba(160,16,0,0.18)');
    og.addColorStop(1,    'rgba(50,0,0,0)');
    ctx.fillStyle = og; ctx.fill();

    // ── 4. Secondary plume (offset wobble) ────────────────────
    const fHS = flameH * 0.86;
    ctx.beginPath();
    ctx.moveTo(-8, NOZZLE);
    ctx.bezierCurveTo(-12, NOZZLE+fHS*0.28, -3+wobble2, NOZZLE+fHS*0.76, wobble2*0.3, NOZZLE+fHS);
    ctx.bezierCurveTo( 4+wobble2, NOZZLE+fHS*0.76,  12, NOZZLE+fHS*0.28, 8, NOZZLE);
    ctx.closePath();
    const sg = ctx.createLinearGradient(0, NOZZLE, 0, NOZZLE+fHS);
    sg.addColorStop(0,    'rgba(255,248,195,0.78)');
    sg.addColorStop(0.18, 'rgba(255,175,38,0.72)');
    sg.addColorStop(0.55, 'rgba(255,68,10,0.52)');
    sg.addColorStop(0.85, 'rgba(180,22,0,0.2)');
    sg.addColorStop(1,    'rgba(70,0,0,0)');
    ctx.fillStyle = sg; ctx.fill();

    // ── 5. Mid bright plume ───────────────────────────────────
    const fH2 = flameH * 0.62;
    ctx.beginPath();
    ctx.moveTo(-5.5, NOZZLE);
    ctx.bezierCurveTo(-8, NOZZLE+fH2*0.3, -2.5+wobble*0.45, NOZZLE+fH2*0.8, wobble*0.18, NOZZLE+fH2);
    ctx.bezierCurveTo(3.5+wobble*0.45, NOZZLE+fH2*0.8, 8, NOZZLE+fH2*0.3, 5.5, NOZZLE);
    ctx.closePath();
    const mg = ctx.createLinearGradient(0, NOZZLE, 0, NOZZLE+fH2);
    mg.addColorStop(0,    'rgba(255,255,235,1)');
    mg.addColorStop(0.14, 'rgba(255,205,55,0.98)');
    mg.addColorStop(0.5,  'rgba(255,92,14,0.82)');
    mg.addColorStop(0.82, 'rgba(220,36,0,0.36)');
    mg.addColorStop(1,    'rgba(110,8,0,0)');
    ctx.fillStyle = mg; ctx.fill();

    // ── 6. Recirculation zone (toroidal vortex at nozzle lip) ─
    // Hot gas curls back up along the nozzle bell edges
    for (let side = -1; side <= 1; side += 2) {
      ctx.beginPath();
      ctx.moveTo(side * 8, NOZZLE - 2);
      ctx.bezierCurveTo(
        side * 13, NOZZLE + 4,
        side * 10, NOZZLE + 10,
        side * 6,  NOZZLE + 7
      );
      ctx.bezierCurveTo(
        side * 4, NOZZLE + 5,
        side * 6, NOZZLE + 2,
        side * 8, NOZZLE - 2
      );
      ctx.closePath();
      const rg = ctx.createRadialGradient(side*9, NOZZLE+4, 0, side*9, NOZZLE+4, 7);
      rg.addColorStop(0,   `rgba(255,200,80,${0.28 * pulse})`);
      rg.addColorStop(0.5, `rgba(255,120,20,0.12)`);
      rg.addColorStop(1,   'rgba(200,50,0,0)');
      ctx.fillStyle = rg; ctx.fill();
    }

    // ── 7. Mach diamonds (5 shock cells, alternating) ─────────
    for (let d = 0; d < 5; d++) {
      const dFrac  = (d + 0.5) / 5;
      const dy     = NOZZLE + flameH * 0.06 + flameH * 0.58 * dFrac;
      const dw     = (4.2 - dFrac * 2.2) * (0.82 + f1 * 0.36) * pulse;
      const dh     = flameH * 0.11 * (1 - dFrac * 0.45);
      const bright = d % 2 === 0;
      const dAlpha = (0.75 - dFrac * 0.38) * (0.65 + f2 * 0.35);
      ctx.beginPath();
      ctx.moveTo(0,   dy - dh*0.5);
      ctx.lineTo(dw,  dy);
      ctx.lineTo(0,   dy + dh*0.5);
      ctx.lineTo(-dw, dy);
      ctx.closePath();
      if (bright) {
        const dg = ctx.createRadialGradient(0, dy, 0, 0, dy, Math.max(0.1, dw));
        dg.addColorStop(0,   `rgba(230,248,255,${dAlpha})`);
        dg.addColorStop(0.45,`rgba(190,230,255,${dAlpha*0.55})`);
        dg.addColorStop(1,   'rgba(120,190,255,0)');
        ctx.fillStyle = dg;
      } else {
        ctx.fillStyle = `rgba(60,8,0,${dAlpha * 0.45})`;
      }
      ctx.fill();
    }

    // ── 8. Inner white-blue hot core ──────────────────────────
    const coreH = flameH * 0.4;
    ctx.beginPath();
    ctx.moveTo(-3, NOZZLE);
    ctx.bezierCurveTo(-4.5, NOZZLE+coreH*0.33, -2, NOZZLE+coreH*0.8, 0, NOZZLE+coreH);
    ctx.bezierCurveTo( 2,   NOZZLE+coreH*0.8,   4.5, NOZZLE+coreH*0.33, 3, NOZZLE);
    ctx.closePath();
    const cg = ctx.createLinearGradient(0, NOZZLE, 0, NOZZLE+coreH);
    cg.addColorStop(0,    'rgba(255,255,255,1)');
    cg.addColorStop(0.08, 'rgba(215,242,255,1)');
    cg.addColorStop(0.32, 'rgba(255,248,135,1)');
    cg.addColorStop(0.62, 'rgba(255,142,26,0.88)');
    cg.addColorStop(0.88, 'rgba(255,62,6,0.42)');
    cg.addColorStop(1,    'rgba(200,20,0,0)');
    ctx.fillStyle = cg; ctx.fill();

    // ── 9. Combustion instability bright pulse ring ───────────
    if (f6 > 0.45) {
      const pRing = ctx.createRadialGradient(wobble2*0.4, NOZZLE + flameH*0.18, 0,
                                              wobble2*0.4, NOZZLE + flameH*0.18, 7*pulse);
      pRing.addColorStop(0,   `rgba(255,255,220,${(f6-0.45)*0.9})`);
      pRing.addColorStop(0.5, `rgba(255,180,40,${(f6-0.45)*0.5})`);
      pRing.addColorStop(1,   'rgba(255,80,0,0)');
      ctx.beginPath();
      ctx.ellipse(wobble2*0.4, NOZZLE + flameH*0.18, 7*pulse, 5*pulse, 0, 0, Math.PI*2);
      ctx.fillStyle = pRing; ctx.fill();
    }

    // ── 10. Throat bright flash ───────────────────────────────
    const throatGlow = ctx.createRadialGradient(0, NOZZLE+1, 0, 0, NOZZLE+1, 6);
    throatGlow.addColorStop(0,   `rgba(255,255,255,${0.75 + f4*0.25})`);
    throatGlow.addColorStop(0.35,`rgba(210,245,255,${0.45 + f4*0.2})`);
    throatGlow.addColorStop(1,   'rgba(255,190,50,0)');
    ctx.beginPath();
    ctx.ellipse(0, NOZZLE+1, 6, 3.5, 0, 0, Math.PI*2);
    ctx.fillStyle = throatGlow; ctx.fill();

    // ── 11. Nozzle rim glow ───────────────────────────────────
    const nozzleGlow = ctx.createRadialGradient(0, NOZZLE, 0, 0, NOZZLE, 15);
    nozzleGlow.addColorStop(0,   `rgba(255,232,165,${0.58 * pulse})`);
    nozzleGlow.addColorStop(0.4, 'rgba(255,125,22,0.24)');
    nozzleGlow.addColorStop(1,   'rgba(255,60,0,0)');
    ctx.beginPath();
    ctx.ellipse(0, NOZZLE, 15, 7, 0, 0, Math.PI*2);
    ctx.fillStyle = nozzleGlow; ctx.fill();

    // ── 12. Plasma tendrils (curling filaments at plume edge) ──
    for (let t = 0; t < 8; t++) {
      const tSide = t % 2 === 0 ? 1 : -1;
      const tY0   = NOZZLE + flameH * (0.12 + (t/8) * 0.7);
      const tX0   = tSide * (4 + Math.random() * 4);
      const tLen  = 6 + Math.random() * 14;
      const tCurl = tSide * (2 + Math.random() * 6);
      ctx.beginPath();
      ctx.moveTo(tX0, tY0);
      ctx.bezierCurveTo(
        tX0 + tCurl * 0.4, tY0 + tLen * 0.3,
        tX0 + tCurl,       tY0 + tLen * 0.7,
        tX0 + tCurl * 0.6 + (Math.random()-0.5)*3, tY0 + tLen
      );
      const tAlpha = 0.07 + Math.random() * 0.13;
      const tR = 255, tG = Math.floor(100 + Math.random()*120), tB = Math.floor(Math.random()*40);
      ctx.strokeStyle = `rgba(${tR},${tG},${tB},${tAlpha})`;
      ctx.lineWidth = 0.4 + Math.random() * 1.0;
      ctx.stroke();
    }

    // ── 13. Turbulence edge wisps ─────────────────────────────
    for (let w = 0; w < 8; w++) {
      const wSide  = w % 2 === 0 ? 1 : -1;
      const wT     = 0.1 + (w/8) * 0.82;
      const wx     = wSide * (3.5 + Math.random() * 5.5);
      const wy     = NOZZLE + flameH * wT;
      const wLen   = 5 + Math.random() * 12;
      const wAngle = Math.PI * 0.5 + wSide * (0.25 + Math.random() * 0.6);
      ctx.beginPath();
      ctx.moveTo(wx, wy);
      ctx.quadraticCurveTo(
        wx + Math.cos(wAngle)*wLen*0.5 + (Math.random()-0.5)*3,
        wy + Math.sin(wAngle)*wLen*0.5,
        wx + Math.cos(wAngle)*wLen,
        wy + Math.sin(wAngle)*wLen
      );
      ctx.strokeStyle = `rgba(255,${135+Math.random()*90},${18+Math.random()*45},${0.05+Math.random()*0.12})`;
      ctx.lineWidth = 0.5 + Math.random() * 1.3;
      ctx.stroke();
    }

    // ── 14. Heat shimmer streaks ──────────────────────────────
    for (let s = 0; s < 10; s++) {
      const sx = (Math.random()-0.5) * 10;
      const sy = NOZZLE + 2 + Math.random() * flameH * 0.7;
      const sl = 5 + Math.random() * 14;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + (Math.random()-0.5)*3, sy + sl);
      ctx.strokeStyle = `rgba(255,${198+Math.random()*57},${75+Math.random()*85},${0.04+Math.random()*0.11})`;
      ctx.lineWidth = 0.35 + Math.random() * 0.85;
      ctx.stroke();
    }

    // ── 15. Nozzle bell interior glow ────────────────────────
    // The inside of the bell is super-heated; paint a warm cone
    ctx.beginPath();
    ctx.moveTo(-7, NOZZLE - 6);
    ctx.lineTo(7,  NOZZLE - 6);
    ctx.lineTo(10, NOZZLE);
    ctx.lineTo(-10, NOZZLE);
    ctx.closePath();
    const bellG = ctx.createLinearGradient(0, NOZZLE - 6, 0, NOZZLE);
    bellG.addColorStop(0,   `rgba(255,240,180,${0.08 + f1*0.06})`);
    bellG.addColorStop(0.6, `rgba(255,160,40,${0.18 + f2*0.1})`);
    bellG.addColorStop(1,   `rgba(255,255,255,${0.35 + f4*0.25})`);
    ctx.fillStyle = bellG; ctx.fill();

    // ── 16. Expansion fan lines at nozzle lip ─────────────────
    // Supersonic gas fans outward in straight rays from the nozzle corners
    for (let side = -1; side <= 1; side += 2) {
      const fanX = side * 9.5;
      const numRays = 5;
      for (let r = 0; r < numRays; r++) {
        const angleFrac = r / (numRays - 1);
        const rayAngle  = side > 0
          ? Math.PI * (0.52 + angleFrac * 0.28)   // right: 94°–144°
          : Math.PI * (0.2  + angleFrac * 0.28);   // left:  36°– 86°
        const rayLen = (8 + r * 5) * (0.7 + f3 * 0.6);
        const alpha  = (0.18 - r * 0.03) * pulse;
        ctx.beginPath();
        ctx.moveTo(fanX, NOZZLE);
        ctx.lineTo(
          fanX + Math.cos(rayAngle) * rayLen,
          NOZZLE + Math.sin(rayAngle) * rayLen
        );
        ctx.strokeStyle = `rgba(255,210,120,${Math.max(0, alpha)})`;
        ctx.lineWidth = 0.6 + (numRays - r) * 0.15;
        ctx.stroke();
      }
    }

    // ── 17. Plume skirt / flare (over-expanded bell flare) ────
    // Gas pressure expands outward just below the nozzle exit
    const skirtW = 16 + f1 * 6;
    const skirtH = 8  + f2 * 5;
    ctx.beginPath();
    ctx.moveTo(-10, NOZZLE);
    ctx.bezierCurveTo(-skirtW, NOZZLE + skirtH*0.5, -skirtW*0.7, NOZZLE + skirtH, -4, NOZZLE + skirtH*1.4);
    ctx.bezierCurveTo( 4, NOZZLE + skirtH*1.4,  skirtW*0.7, NOZZLE + skirtH,  skirtW, NOZZLE + skirtH*0.5);
    ctx.lineTo(10, NOZZLE);
    ctx.closePath();
    const skirtG = ctx.createRadialGradient(0, NOZZLE + skirtH*0.5, 0, 0, NOZZLE + skirtH*0.5, skirtW);
    skirtG.addColorStop(0,   `rgba(255,180,60,${0.22 * pulse})`);
    skirtG.addColorStop(0.5, `rgba(255,100,15,0.1)`);
    skirtG.addColorStop(1,   'rgba(200,40,0,0)');
    ctx.fillStyle = skirtG; ctx.fill();

    // ── 18. Oblique shock lines in mid-plume ──────────────────
    // Crossing V-shaped shock structures
    for (let o = 0; o < 4; o++) {
      const oY    = NOZZLE + flameH * (0.15 + o * 0.17);
      const oW    = (5.5 - o * 0.9) * pulse;
      const oAlpha= (0.1 - o * 0.018) * (0.6 + f1 * 0.4);
      if (oAlpha <= 0) continue;
      // Left arm
      ctx.beginPath();
      ctx.moveTo(0, oY);
      ctx.lineTo(-oW, oY + flameH * 0.06);
      ctx.strokeStyle = `rgba(200,235,255,${oAlpha})`;
      ctx.lineWidth = 0.7;
      ctx.stroke();
      // Right arm
      ctx.beginPath();
      ctx.moveTo(0, oY);
      ctx.lineTo( oW, oY + flameH * 0.06);
      ctx.strokeStyle = `rgba(200,235,255,${oAlpha})`;
      ctx.lineWidth = 0.7;
      ctx.stroke();
    }

    // ── 19. Dense plasma tendrils with glowing tips ───────────
    for (let t = 0; t < 14; t++) {
      const tSide  = t % 2 === 0 ? 1 : -1;
      const tY0    = NOZZLE + flameH * (0.08 + (t / 14) * 0.82);
      const tX0    = tSide * (3.5 + Math.random() * 5.5);
      const tLen   = 7 + Math.random() * 18;
      const tCurl  = tSide * (2.5 + Math.random() * 7);
      const tAlpha = 0.06 + Math.random() * 0.15;
      const tG     = Math.floor(90 + Math.random() * 130);
      const tB     = Math.floor(Math.random() * 35);
      // Tendril stroke
      ctx.beginPath();
      ctx.moveTo(tX0, tY0);
      ctx.bezierCurveTo(
        tX0 + tCurl * 0.35, tY0 + tLen * 0.28,
        tX0 + tCurl * 0.85, tY0 + tLen * 0.65,
        tX0 + tCurl * 0.55 + (Math.random()-0.5)*4, tY0 + tLen
      );
      ctx.strokeStyle = `rgba(255,${tG},${tB},${tAlpha})`;
      ctx.lineWidth = 0.4 + Math.random() * 1.1;
      ctx.stroke();
      // Glowing tip dot
      if (Math.random() > 0.5) {
        const tipX = tX0 + tCurl * 0.55;
        const tipY = tY0 + tLen;
        const tipG = ctx.createRadialGradient(tipX, tipY, 0, tipX, tipY, 2.5);
        tipG.addColorStop(0,   `rgba(255,255,200,${tAlpha * 1.8})`);
        tipG.addColorStop(1,   'rgba(255,120,0,0)');
        ctx.beginPath();
        ctx.arc(tipX, tipY, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = tipG; ctx.fill();
      }
    }

    // ── 20. Supersonic core barrel shock outline ──────────────
    // The innermost core has a faint barrel-shaped boundary
    const barrelH = coreH * 0.75;
    const barrelW = 3.8 * pulse;
    ctx.beginPath();
    ctx.moveTo(-barrelW * 0.6, NOZZLE + 1);
    ctx.bezierCurveTo(-barrelW, NOZZLE + barrelH*0.3, -barrelW, NOZZLE + barrelH*0.7, -barrelW*0.4, NOZZLE + barrelH);
    ctx.bezierCurveTo( barrelW*0.4, NOZZLE + barrelH,  barrelW, NOZZLE + barrelH*0.7,  barrelW, NOZZLE + barrelH*0.3);
    ctx.bezierCurveTo( barrelW * 0.6, NOZZLE + 1, -barrelW*0.6, NOZZLE + 1, -barrelW*0.6, NOZZLE + 1);
    const barrelAlpha = 0.18 + f4 * 0.12;
    ctx.strokeStyle = `rgba(180,225,255,${barrelAlpha})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  // ── LANDING LEGS ────────────────────────────────────────────
  // Left leg strut
  ctx.strokeStyle = '#7a8fa8';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-9, NOZZLE - 2); ctx.lineTo(-20, NOZZLE + 12);
  ctx.stroke();
  // Right leg strut
  ctx.beginPath();
  ctx.moveTo(9, NOZZLE - 2); ctx.lineTo(20, NOZZLE + 12);
  ctx.stroke();
  // Left brace
  ctx.strokeStyle = '#5a6f88';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-5, NOZZLE + 4); ctx.lineTo(-20, NOZZLE + 12);
  ctx.stroke();
  // Right brace
  ctx.beginPath();
  ctx.moveTo(5, NOZZLE + 4); ctx.lineTo(20, NOZZLE + 12);
  ctx.stroke();
  // Left footpad
  ctx.strokeStyle = '#7a8fa8';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-24, NOZZLE + 12); ctx.lineTo(-16, NOZZLE + 12);
  ctx.stroke();
  // Right footpad
  ctx.beginPath();
  ctx.moveTo(16, NOZZLE + 12); ctx.lineTo(24, NOZZLE + 12);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // ── ENGINE BELL ─────────────────────────────────────────────
  const bellGrad = ctx.createLinearGradient(-8, NOZZLE - 6, 8, NOZZLE);
  bellGrad.addColorStop(0, '#4a5a6a');
  bellGrad.addColorStop(0.5, '#8a9db0');
  bellGrad.addColorStop(1, '#3a4a5a');
  ctx.fillStyle = bellGrad;
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-5, NOZZLE - 7);
  ctx.lineTo(-8, NOZZLE);
  ctx.lineTo(8, NOZZLE);
  ctx.lineTo(5, NOZZLE - 7);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Nozzle ring
  ctx.beginPath();
  ctx.moveTo(-8, NOZZLE); ctx.lineTo(8, NOZZLE);
  ctx.strokeStyle = '#aabbcc';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── MAIN BODY ───────────────────────────────────────────────
  drawShipBody(selectedShip, TOP, NOZZLE);

  // Right highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.moveTo(2, TOP + 1);
  ctx.lineTo(9, TOP + 10);
  ctx.lineTo(7, TOP + 22);
  ctx.lineTo(2, TOP + 22);
  ctx.closePath();
  ctx.fill();

  // ── NOSE CAP ────────────────────────────────────────────────
  const noseGrad = ctx.createRadialGradient(-2, TOP + 3, 1, 0, TOP + 6, 8);
  noseGrad.addColorStop(0, '#f0f4f8');
  noseGrad.addColorStop(1, '#8898a8');
  ctx.fillStyle = noseGrad;
  ctx.strokeStyle = '#5a6a7a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, TOP);
  ctx.lineTo(7, TOP + 10);
  ctx.lineTo(-7, TOP + 10);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // ── COCKPIT WINDOW ──────────────────────────────────────────
  // Outer frame
  ctx.fillStyle = '#2a3a4a';
  ctx.strokeStyle = '#4a6a8a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(0, TOP + 14, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // Glass
  const winGrad = ctx.createRadialGradient(-1.5, TOP + 12, 0.5, 0, TOP + 14, 5.5);
  winGrad.addColorStop(0,   'rgba(180,230,255,0.95)');
  winGrad.addColorStop(0.5, 'rgba(80,160,220,0.8)');
  winGrad.addColorStop(1,   'rgba(20,60,120,0.9)');
  ctx.fillStyle = winGrad;
  ctx.beginPath();
  ctx.ellipse(0, TOP + 14, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Glare
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(-1.5, TOP + 12, 2, 1.2, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // ── SIDE ANTENNA ────────────────────────────────────────────
  ctx.strokeStyle = '#aabbcc';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(10, TOP + 10); ctx.lineTo(16, TOP + 4);
  ctx.stroke();
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(16, TOP + 4, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // ── RCS THRUSTERS (small side nozzles) ──────────────────────
  ctx.fillStyle = '#4a5a6a';
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 0.8;
  // Left RCS
  ctx.beginPath();
  ctx.rect(-15, TOP + 19, -3, 4);
  ctx.fill(); ctx.stroke();
  // Right RCS
  ctx.beginPath();
  ctx.rect(15, TOP + 19, 3, 4);
  ctx.fill(); ctx.stroke();

  // RCS puffs when rotating
  if (lander.leftThrust && lander.fuel > 0) {
    ctx.fillStyle = `rgba(180,220,255,${0.3 + flicker * 0.3})`;
    ctx.beginPath();
    ctx.arc(-20, TOP + 21, 3 + flicker * 2, 0, Math.PI * 2);
    ctx.fill();
  }
  if (lander.rightThrust && lander.fuel > 0) {
    ctx.fillStyle = `rgba(180,220,255,${0.3 + flicker * 0.3})`;
    ctx.beginPath();
    ctx.arc(20, TOP + 21, 3 + flicker * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── HULL MARKINGS ────────────────────────────────────────────
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 4px Arial';
  ctx.strokeStyle = '#1a4d1a';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.strokeText("NATTY'S", 0, TOP + 23);
  ctx.fillStyle = '#6efa9a';
  ctx.fillText("NATTY'S", 0, TOP + 23);
  ctx.restore();

  ctx.restore();
}

function drawParticles() {
  // ── Ambient dust ─────────────────────────────────────────────
  const W = canvas.width, H = canvas.height;
  ambientDust.forEach(p => {
    p.wobble += p.wobbleSpeed;
    p.x += p.vx + Math.sin(p.wobble) * 0.3;
    p.y += p.vy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `${p.color}${p.alpha})`;
    ctx.fill();
  });
  // ── Screen flash ─────────────────────────────────────────────
  if (Math.abs(screenFlash) > 0.01) {
    const fi = Math.abs(screenFlash);
    if (screenFlash > 0) {
      // Crash — orange/white flash
      ctx.fillStyle = `rgba(255,180,60,${fi * 0.55})`;
    } else if (fi > 0.6) {
      // Perfect landing — gold flash
      ctx.fillStyle = `rgba(255,215,0,${(fi - 0.6) * 0.6})`;
    } else {
      // Normal landing — soft green flash
      ctx.fillStyle = `rgba(0,255,120,${fi * 0.28})`;
    }
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ── Shockwave rings ──────────────────────────────────────────
  shockwaves.forEach(sw => {
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${sw.color},${sw.alpha * (1 - sw.r / sw.maxR)})`;
    ctx.lineWidth = 2.5 * (1 - sw.r / sw.maxR) + 0.5;
    ctx.stroke();
  });

  // ── Ship exhaust trail (comet tail) ──────────────────────────
  trailParts.forEach(p => {
    const a = p.life * 0.35;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,255,136,${a})`;
    ctx.fill();
  });

  // ── Thrust exhaust particles ──────────────────────────────────
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace(')', `,${p.life})`).replace('hsl', 'hsla');
    ctx.fill();
  });

  // ── Explosion particles ───────────────────────────────────────
  explosionParts.forEach(p => {
    const a = Math.min(p.life, 1);
    if (p.type === 'smoke') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (1.5 - p.life * 0.5), 0, Math.PI * 2);
      ctx.fillStyle = p.color.replace('hsl', 'hsla').replace(')', `,${a * 0.35})`);
      ctx.fill();
    } else if (p.type === 'spark') {
      // Sparks as short lines
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 2.5, p.y - p.vy * 2.5);
      ctx.strokeStyle = p.color.replace('hsl','hsla').replace(')',`,${a})`);
      ctx.lineWidth = p.size;
      ctx.stroke();
    } else if (p.type === 'debris') {
      // Debris as small rectangles
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot || 0);
      ctx.fillStyle = p.color.replace('hsl','hsla').replace(')',`,${a})`);
      ctx.fillRect(-p.size, -p.size * 0.5, p.size * 2, p.size);
      ctx.restore();
    } else {
      // Fire
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
      ctx.fillStyle = p.color.replace('hsl','hsla').replace(')',`,${a})`);
      ctx.fill();
    }
  });

  // ── Landing dust ─────────────────────────────────────────────
  landDustParts.forEach(p => {
    if (p.pebble) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.gold
        ? `rgba(255,215,0,${p.alpha * p.life})`
        : `rgba(200,140,60,${p.alpha * p.life})`;
      ctx.fill();
    } else {
      // Soft dust puff
      const rg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * (1.4 - p.life * 0.3));
      rg.addColorStop(0,   `rgba(220,170,90,${p.alpha * p.life * 0.7})`);
      rg.addColorStop(0.5, `rgba(190,130,60,${p.alpha * p.life * 0.35})`);
      rg.addColorStop(1,   'rgba(160,100,40,0)');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (1.4 - p.life * 0.3), 0, Math.PI * 2);
      ctx.fillStyle = rg;
      ctx.fill();
    }
  });
}

// Game loop
let lastTime = 0;
let gameTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  gameTime += dt * 0.05;
  if (levelTimerActive && gameState === 'playing') levelTimer += dt * (1/60);

  pollGamepad(); // ── Controller input ──

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Screen shake
  if (screenShake > 0.5) {
    const sx = (Math.random() - 0.5) * screenShake;
    const sy = (Math.random() - 0.5) * screenShake;
    ctx.save();
    ctx.translate(sx, sy);
  }

  // Background — tier-based sky color
  const skyColors = getSkyColors();
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.7);
  skyGrad.addColorStop(0,   skyColors[0]);
  skyGrad.addColorStop(0.6, skyColors[1]);
  skyGrad.addColorStop(1,   skyColors[2]);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawStars();
  drawPlanets();
  drawTerrain();
  if (gameState === 'playing') drawFuelPickups(gameTime);
  drawParticles();
  if (gameState === 'menu') {
    drawRocketInterior();
    drawKavaShell();
  }
  drawLander();
  if (gameState === 'playing') { updateFuelPickups(); drawFloatingTexts(); }
  drawAchievementToast();

  if (gameState === 'playing' && !lander.landed && !lander.crashed) {
    updateSounds();
    // Gravity & wind
    const shipMult = lander.shipStats || SHIPS.starter;
    const gravity = levelGravity() * shipMult.gravityMult;
    const windForce = levelWind();
    lander.vy += gravity * dt;

    // Wind shifts gradually every few seconds
    if (windForce > 0) {
      windTimer -= dt;
      if (windTimer <= 0) {
        windTarget = (Math.random() - 0.5) * 2 * windForce;
        windTimer = 120 + Math.random() * 180;
      }
      wind += (windTarget - wind) * 0.005 * dt;
      lander.vx += wind * dt;
    }

    lander.thrusting = keys.thrust && lander.fuel > 0;
    lander.leftThrust = keys.left && lander.fuel > 0;
    lander.rightThrust = keys.right && lander.fuel > 0;

    if (keys.left) {
      lander.angle -= ROTATE_SPEED * dt * shipMult.controlMult;
      lander.fuel -= FUEL_COST_SIDE * dt * 0.5;
    }
    if (keys.right) {
      lander.angle += ROTATE_SPEED * dt * shipMult.controlMult;
      lander.fuel -= FUEL_COST_SIDE * dt * 0.5;
    }
