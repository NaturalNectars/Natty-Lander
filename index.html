<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script>
window.onerror = function(msg, src, line, col, err) {
  document.body = document.body || document.createElement('body');
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff2200;color:#fff;padding:12px;font:14px monospace;z-index:99999;white-space:pre-wrap;word-break:break-all;';
  d.textContent = 'ERROR: ' + msg + '\nLine: ' + line + ':' + col + '\nFile: ' + src + (err ? '\n' + err.stack : '');
  document.body.insertBefore(d, document.body.firstChild);
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  window.onerror(String(e.reason), 'promise', 0, 0, e.reason);
});
</script>
<title>NATTY LANDER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  html, body {
    width: 100%;
    height: 100%;
  }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
      radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.2) 100%),
      radial-gradient(ellipse at center, rgba(0, 255, 136, 0.01) 0%, transparent 80%);
    pointer-events: none;
    z-index: 1;
  }

  #scanlines {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 100;
    background: 
      repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
    box-shadow: 
      inset 0 0 80px rgba(0, 0, 0, 0.4),
      inset 0 0 150px rgba(0, 0, 0, 0.3),
      inset 0 0 200px rgba(0, 0, 0, 0.25);
    animation: crtFlicker 0.15s infinite;
    backdrop-filter: brightness(0.98);
  }

  /* CRT glow effect */
  #scanlines::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
      radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.15) 100%);
    pointer-events: none;
  }

  /* Green phosphor glow */
  #scanlines::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 255, 100, 0.02);
    pointer-events: none;
    mix-blend-mode: screen;
  }

  #hud {
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 6px 12px;
    color: #00ff88;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(0,255,136,0.05);
    border-bottom: 1px solid rgba(0,255,136,0.2);
    flex-shrink: 0;
  }

  .hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hud-label { color: rgba(0,255,136,0.5); font-size: 9px; }
  .hud-val { font-size: 13px; font-weight: bold; }
  .hud-val.warn { color: #ff4444; animation: blink .4s infinite; }

  .mute-btn {
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.3);
    color: #00ff88;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .mute-btn:hover {
    background: rgba(0,255,136,0.2);
    border-color: rgba(0,255,136,0.6);
    box-shadow: 0 0 8px rgba(0,255,136,0.2);
  }

  .mute-btn:active {
    transform: scale(0.95);
  }

  .mute-btn.muted {
    color: #ff6666;
    border-color: rgba(255,100,100,0.3);
    background: rgba(255,100,100,0.1);
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  @keyframes shootingStar {
    0% {
      transform: translateX(-100vw) translateY(var(--start-y)) scaleX(1);
      opacity: 1;
    }
    100% {
      transform: translateX(120vw) translateY(calc(var(--start-y) + var(--offset))) scaleX(0.2);
      opacity: 0;
    }
  }

  .star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
  }

  .star.twinkle {
    animation: twinkle var(--duration) ease-in-out infinite;
  }

  .shooting-star {
    position: fixed;
    width: 80px;
    height: 2px;
    background: linear-gradient(to right, #fff, transparent);
    pointer-events: none;
    z-index: 1;
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.6));
    animation: shootingStar var(--duration) ease-in cubic-bezier(0.25, 0.46, 0.45, 0.94);
    animation-delay: var(--delay);
  }

  @keyframes titleGlow {
    0%, 100% {
      text-shadow: 
        -2px -2px 4px rgba(0,255,136,0.3),
        2px -2px 4px rgba(0,255,136,0.3),
        -2px 2px 4px rgba(0,255,136,0.3),
        2px 2px 4px rgba(0,255,136,0.3),
        0 0 16px rgba(0,255,136,0.2),
        /* Crater details - scattered impact marks */
        -8px -6px 2px rgba(0,0,0,0.6),
        12px -8px 2px rgba(0,0,0,0.5),
        -14px 4px 1.5px rgba(0,0,0,0.5),
        6px 8px 2px rgba(0,0,0,0.55),
        -6px 12px 1px rgba(0,0,0,0.4),
        14px 6px 2px rgba(0,0,0,0.5),
        -10px -14px 1.5px rgba(0,0,0,0.45),
        10px 14px 2px rgba(0,0,0,0.5),
        2px -12px 1px rgba(0,0,0,0.4);
    }
    50% {
      text-shadow: 
        -2px -2px 6px rgba(0,255,136,0.5),
        2px -2px 6px rgba(0,255,136,0.5),
        -2px 2px 6px rgba(0,255,136,0.5),
        2px 2px 6px rgba(0,255,136,0.5),
        0 0 24px rgba(0,255,136,0.35),
        inset -8px -8px 12px rgba(0,255,136,0.15),
        /* Craters glow slightly at peak */
        -8px -6px 3px rgba(0,0,0,0.7),
        12px -8px 3px rgba(0,0,0,0.65),
        -14px 4px 2px rgba(0,0,0,0.6),
        6px 8px 3px rgba(0,0,0,0.65),
        -6px 12px 1.5px rgba(0,0,0,0.5),
        14px 6px 3px rgba(0,0,0,0.65),
        -10px -14px 2px rgba(0,0,0,0.55),
        10px 14px 3px rgba(0,0,0,0.65),
        2px -12px 1.5px rgba(0,0,0,0.5);
    }
  }

  @keyframes crtFlicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 0.99; }
    93% { opacity: 0.98; }
    96% { opacity: 1; }
    97% { opacity: 0.99; }
  }

  @keyframes screenGlitch {
    0% { transform: translate(0); }
    20% { transform: translate(2px, -1px); }
    40% { transform: translate(-2px, 1px); }
    60% { transform: translate(1px, -2px); }
    80% { transform: translate(-1px, 2px); }
    100% { transform: translate(0); }
  }

  @keyframes screenBreathe {
    0%, 100% { filter: brightness(1) contrast(1); }
    50% { filter: brightness(1.01) contrast(1.02); }
  }

  @keyframes shipUnlockGlow {
    0%, 100% {
      text-shadow: 0 0 10px #ffd700, 0 0 20px #ffaa00;
    }
  }

  .ship-unlock-text {
    font-size: 36px;
    font-weight: bold;
    letter-spacing: 1px;
    color: #ffed4e;
    text-shadow: 0 0 10px #ffd700, 0 0 20px #ffaa00;
  }

  canvas {
    display: block;
    width: 100%;
    flex: 1;
    min-height: 0;
    cursor: none;
    background: #000;
    filter: drop-shadow(0 0 2px rgba(0,255,136,0.1));
    animation: screenBreathe 3s ease-in-out infinite;
  }

  #controls {
    position: fixed;
    bottom: 24px;
    left: 0;
    right: 0;
    display: none;
    justify-content: space-between;
    align-items: flex-end;
    padding: 16px 24px env(safe-area-inset-bottom, 20px);
    pointer-events: none;
    z-index: 5;
    background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
  }

  #rotate-btns {
    display: flex;
    gap: 12px;
    pointer-events: all;
    padding: 8px 12px;
    background: rgba(0,0,0,0.3);
    border-radius: 16px;
    border: 1px solid rgba(0,255,136,0.15);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  .ctrl-btn {
    background: linear-gradient(135deg, rgba(0,255,136,0.12) 0%, rgba(0,255,136,0.04) 100%);
    border: 2px solid rgba(0,255,136,0.5);
    border-radius: 14px;
    color: #00ff88;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 16px 0;
    width: 88px;
    text-align: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: all .15s ease;
    cursor: pointer;
    animation: buttonGlow 2.2s ease-in-out infinite;
    position: relative;
    font-weight: bold;
    text-transform: uppercase;
    box-shadow: 
      0 0 8px rgba(0,255,136,0.3),
      inset 0 0 8px rgba(0,255,136,0.1),
      0 4px 12px rgba(0,0,0,0.4);
  }

  .ctrl-btn::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 14px;
    border: 1px solid rgba(0,255,136,0.2);
    pointer-events: none;
  }

  .ctrl-btn:active, .ctrl-btn.pressed {
    background: linear-gradient(135deg, rgba(0,255,136,0.3) 0%, rgba(0,255,136,0.15) 100%);
    border-color: #00ff88;
    box-shadow: 
      0 0 20px rgba(0,255,136,0.6),
      inset 0 0 16px rgba(0,255,136,0.3),
      0 2px 8px rgba(0,0,0,0.6);
    transform: scale(0.96);
    animation: buttonPress .2s ease;
  }

  #thrustBtn {
    font-size: 24px;
    border-radius: 50%;
    width: 88px;
    height: 88px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2.5px solid rgba(0,255,136,0.7);
    pointer-events: all;
    background: radial-gradient(circle at 35% 35%, rgba(0,255,136,0.18) 0%, rgba(0,255,136,0.05) 100%);
    animation: thrustPulse 1.8s ease-in-out infinite;
    position: relative;
    transition: all .1s ease;
    box-shadow: 
      0 0 12px rgba(0,255,136,0.4),
      inset 0 0 16px rgba(0,255,136,0.15),
      0 6px 16px rgba(0,0,0,0.5);
    cursor: pointer;
  }

  #thrustBtn::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid rgba(0,255,136,0.25);
    pointer-events: none;
  }

  #thrustBtn::after {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 1px dashed rgba(0,255,136,0.2);
    pointer-events: none;
  }

  #thrustBtn:active, #thrustBtn.pressed {
    background: radial-gradient(circle at 35% 35%, rgba(0,255,136,0.35) 0%, rgba(0,255,136,0.1) 100%);
    border-color: #00ff88;
    box-shadow: 
      0 0 32px rgba(0,255,136,0.8),
      inset 0 0 24px rgba(0,255,136,0.4),
      0 2px 12px rgba(0,0,0,0.7),
      0 0 48px rgba(0,255,136,0.3);
    transform: scale(0.94);
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    z-index: 10;
    gap: 16px;
    padding: 24px 24px 60px;
    touch-action: pan-y;
  }

  #overlay.hidden { display: none; }

  #ship-select {
    display: flex !important;
    flex-direction: column;
    align-items: center;
    width: 100%;
    overflow-y: visible;
    padding-bottom: 40px;
    position: absolute;
    left: -9999px;
    visibility: hidden;
  }
  
  #ship-select.visible {
    position: static;
    left: auto;
    visibility: visible;
  }

  #game-menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 80vh;
    gap: 16px;
  }

  .ship-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 20px;
    width: 90%;
    max-width: 100%;
  }

  @media (min-width: 600px) {
    #overlay {
      justify-content: center;
    }

    #ship-select {
      max-width: 700px;
    }

    .ship-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      max-width: 680px;
    }

    .ship-card {
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 16px 12px;
      gap: 8px;
    }

    .ship-preview {
      width: 90px;
      height: 90px;
    }

    .ship-stats {
      text-align: center;
    }

    .ship-name {
      text-align: center;
    }

    #custom-editor {
      max-width: 500px;
    }
  }

  .ship-card {
    background: linear-gradient(135deg, rgba(0,255,136,0.1) 0%, rgba(0,0,0,0.4) 100%);
    border: 2px solid rgba(0,255,136,0.4);
    border-radius: 12px;
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    transition: all .2s ease;
    position: relative;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 16px;
    width: 100%;
  }

  .ship-card:hover:not(.locked) {
    border-color: #00ff88;
    background: linear-gradient(135deg, rgba(0,255,136,0.2) 0%, rgba(0,0,0,0.5) 100%);
    box-shadow: 0 0 16px rgba(0,255,136,0.4);

  }

  .ship-card.selected {
    border-color: #ffff00;

  }

  .ship-card.locked {

    border-color: rgba(0,255,136,0.15);
  }

  .ship-icon {
    font-size: 48px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ship-preview {
    width: 100px;
    height: 100px;
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 6px;
    background: rgba(0,0,0,0.5);
    flex-shrink: 0;
  }

  .ship-name {
    font-family: 'Orbitron', monospace;
    color: #00ff88;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .ship-card.selected .ship-name {
    color: #ffff00;
  }

  .ship-stats {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(0,255,136,0.7);
    text-align: left;
    line-height: 1.5;
    display: flex;
    gap: 20px;
    flex: 1;
  }
  }

  .ship-lock {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(255,68,68,0.2);
    border: 1px solid rgba(255,68,68,0.5);
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #ff4444;
  }

  .ship-unlock-text {
    font-size: 9px;
    color: rgba(255,68,68,0.7);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #game-menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    gap: 16px;
  }

  #shipSelectBtn {
    font-size: 12px !important;
    padding: 10px 24px !important;
  }

  .overlay-title {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 52px;
    text-align: center;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin: 0;
    line-height: 1.3;
    padding: 18px 36px;
    background: radial-gradient(circle at 35% 35%, rgba(0,255,136,0.12) 0%, rgba(0,255,136,0.02) 100%);
    border: 2px solid rgba(0,255,136,0.25);
    border-radius: 50%;
    position: relative;
    box-shadow: inset 0 -12px 24px rgba(0,0,0,0.4);
    filter: contrast(1.1);
    animation: titleGlow 2.4s ease-in-out infinite, colorRainbow 4s ease-in-out infinite, borderGlow 4s ease-in-out infinite;
    text-shadow: 
      0 0 10px currentColor,
      0 0 20px currentColor,
      0 0 30px rgba(0,100,50,0.6);
  }

  .overlay-title.result-title {
    animation: none;
  }

  @keyframes colorRainbow {
    0% {
      color: #888888;
    }
    33% {
      color: #00ff88;
    }
    66% {
      color: #00cc66;
    }
    100% {
      color: #888888;
    }
  }

  @keyframes borderGlow {
    0% {
      border-color: rgba(136, 136, 136, 0.4);
      box-shadow: 
        inset 0 -12px 24px rgba(0,0,0,0.4),
        0 0 10px rgba(136, 136, 136, 0.3);
    }
    33% {
      border-color: rgba(0, 255, 136, 0.8);
      box-shadow: 
        inset 0 -12px 24px rgba(0,0,0,0.4),
        0 0 20px rgba(0, 255, 136, 0.6),
        0 0 40px rgba(0, 255, 136, 0.4);
    }
    66% {
      border-color: rgba(0, 204, 102, 0.7);
      box-shadow: 
        inset 0 -12px 24px rgba(0,0,0,0.4),
        0 0 20px rgba(0, 204, 102, 0.5),
        0 0 40px rgba(0, 204, 102, 0.3);
    }
    100% {
      border-color: rgba(136, 136, 136, 0.4);
      box-shadow: 
        inset 0 -12px 24px rgba(0,0,0,0.4),
        0 0 10px rgba(136, 136, 136, 0.3);

  }

  @keyframes float {

  }

  @keyframes buttonGlow {

  .lb-row {
    display: flex;

<script>
const canvas = document.getElementById('c');
let ctx = canvas.getContext('2d');

// Sizing
function resize() {
  const hud = document.getElementById('hud');
  const hudH = hud ? hud.offsetHeight : 36;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - hudH;
}
resize();
window.addEventListener('resize', () => { resize(); if(gameState === 'playing') generateTerrain(); });

// Game state
let gameState = 'menu'; // menu, playing, over
let score = 0;
let levelTimer = 0;   // seconds elapsed this level
let levelTimerActive = false;
let comboCount = 0;    // consecutive perfect landings
let comboMultiplier = 1; // score multiplier
let isGameOver = false; // true after crash, false after level clear
let isMuted = false; // sound mute state

// ── SHIP SYSTEM ───────────────────────────────────────────────
const SHIPS = {
  starter: {
    name: 'STARTER',
    icon: '🛸',
    unlockedAtLevel: 0,
    thrustMult: 1.0,
    fuelMult: 1.0,
    gravityMult: 1.0,
    controlMult: 1.0,
    description: 'Balanced'
  },
  speedster: {
    name: 'SPEED RACER',
    icon: '⚡',
    unlockedAtLevel: 4,
    thrustMult: 1.3,
    fuelMult: 0.75,
    gravityMult: 1.0,
    controlMult: 0.85,
    description: 'Fast, fuel-hungry'
  },
  workhorse: {
    name: 'WORKHORSE',
    icon: '⚙',
    unlockedAtLevel: 9,
    thrustMult: 0.85,
    fuelMult: 1.4,
    gravityMult: 1.0,
    controlMult: 1.1,
    description: 'Efficient, stable'
  },
  precision: {
    name: 'PRECISION',
    icon: '🎯',
    unlockedAtLevel: 13,
    thrustMult: 1.05,
    fuelMult: 1.0,
    gravityMult: 0.95,
    controlMult: 1.25,
    description: 'Responsive, delicate'
  },
  legend: {
    name: 'LEGEND',
    icon: '👑',
    unlockedAtLevel: 16,
    thrustMult: 1.25,
    fuelMult: 1.15,
    gravityMult: 0.95,
    controlMult: 1.15,
    description: 'Master craft'
  },
  custom: {
    name: 'CUSTOM',
    icon: '✏️',
    unlockedAtLevel: 0,
    thrustMult: 1.0,
    fuelMult: 1.0,
    gravityMult: 1.0,
    controlMult: 1.0,
    description: 'Your build'
  }
};

let selectedShip = 'starter';
let currentShipStats = SHIPS.starter;

// Lander base constants
const THRUST_POWER = 0.055;
const ROTATE_SPEED = 0.04;
const FUEL_COST_MAIN = 0.22;
const FUEL_COST_SIDE = 0.10;

// Level-scaling helpers
function levelGravity()   { return 0.006 + (level - 1) * 0.0018; }          // gentler gravity increase
function levelWind()      { return 0; }  // wind disabled
function levelPadScale()  { return Math.max(0.5, 1 - (level - 1) * 0.07); } // pads shrink more gradually

function getTerrainTier() {
  if (level <= 4) return 'early';      // 1-4: Smooth greens/blues
  if (level <= 10) return 'mid';       // 5-10: Rocky browns/oranges
  if (level <= 15) return 'late';      // 11-15: Volcanic reds
  return 'extreme';                    // 16+: Dark crimson/black
}

function getTerrainRoughness() {
  // Control jaggedness based on tier
  const tier = getTerrainTier();
  if (tier === 'early') return 0.12;
  if (tier === 'mid') return 0.16;
  if (tier === 'late') return 0.22;
  return 0.30; // extreme - very jagged
}

function getTerrainColors() {
  const tier = getTerrainTier();
  
  if (tier === 'early') {
    return {
      deepBase: ['#0a3d3d', '#051f2e', '#020f1a'],
      sunlit: ['rgba(100,180,150,0.2)', 'rgba(150,220,180,0.35)'],
      shadow: ['rgba(20,50,50,0.5)', 'rgba(10,25,30,0.65)']
    };
  } else if (tier === 'mid') {
    return {
      deepBase: ['#3d2a1a', '#2a1f10', '#1a1005'],
      sunlit: ['rgba(180,130,80,0.2)', 'rgba(220,170,90,0.35)'],
      shadow: ['rgba(60,40,20,0.5)', 'rgba(30,20,10,0.65)']
    };
  } else if (tier === 'late') {
    return {
      deepBase: ['#4a1a0a', '#3a0f05', '#2a0500'],
      sunlit: ['rgba(220,100,50,0.2)', 'rgba(255,140,60,0.35)'],
      shadow: ['rgba(80,20,10,0.5)', 'rgba(40,10,5,0.65)']
    };
  } else {
    return {
      deepBase: ['#3a0a0a', '#2a0505', '#1a0000'],
      sunlit: ['rgba(180,30,30,0.2)', 'rgba(220,50,50,0.35)'],
      shadow: ['rgba(40,5,5,0.5)', 'rgba(20,2,2,0.65)']
    };
  }
}

function getDustConfig() {
  const tier = getTerrainTier();
  if (tier === 'early') return { count: 18, colors: ['rgba(180,220,255,', 'rgba(200,230,255,', 'rgba(150,200,240,'], size: [0.8, 1.5], speed: 0.12 };
  if (tier === 'mid')   return { count: 30, colors: ['rgba(200,160,100,', 'rgba(220,180,120,', 'rgba(180,140,80,'],  size: [1.0, 2.0], speed: 0.18 };
  if (tier === 'late')  return { count: 45, colors: ['rgba(220,100,50,',  'rgba(200,80,40,',  'rgba(180,60,30,'],   size: [1.2, 2.5], speed: 0.25 };
  return                       { count: 60, colors: ['rgba(180,30,30,',   'rgba(150,20,20,',  'rgba(120,15,15,'],   size: [1.5, 3.0], speed: 0.35 };
}

function initAmbientDust() {
  ambientDust = [];
  const cfg = getDustConfig();
  const W = canvas.width, H = canvas.height;
  for (let i = 0; i < cfg.count; i++) {
    const color = cfg.colors[Math.floor(Math.random() * cfg.colors.length)];
    const size = cfg.size[0] + Math.random() * (cfg.size[1] - cfg.size[0]);
    ambientDust.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size,
      color,
      alpha: 0.1 + Math.random() * 0.3,
      vx: (Math.random() - 0.5) * cfg.speed,
      vy: -Math.random() * cfg.speed * 0.5, // drift upward slightly
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.005 + Math.random() * 0.01
    });
  }
}

function getSkyColors() {
  const tier = getTerrainTier();
  if (tier === 'early') {
    // Dark blue — calm, welcoming space
    return ['#04080e', '#080f1e', '#0a1428'];
  } else if (tier === 'mid') {
    // Blue fading to dusty orange — atmosphere thickening
    return ['#08060e', '#120a10', '#2a1408'];
  } else if (tier === 'late') {
    // Deep red — volcanic atmosphere
    return ['#0e0404', '#1e0808', '#3a0f05'];
  } else {
    // Near-black crimson — nightmare void
    return ['#080202', '#150404', '#2a0303'];
  }
}

function getPadColors(isBonus) {
  const tier = getTerrainTier();
  if (tier === 'early') return isBonus
    ? { surface: '#00aa55', main: '#00ff88', rgba: 'rgba(0,255,136,' }
    : { surface: '#0077aa', main: '#00ccff', rgba: 'rgba(0,204,255,' };
  if (tier === 'mid') return isBonus
    ? { surface: '#aa7700', main: '#ffcc00', rgba: 'rgba(255,204,0,' }
    : { surface: '#aa5500', main: '#ff8800', rgba: 'rgba(255,136,0,' };
  if (tier === 'late') return isBonus
    ? { surface: '#aa2200', main: '#ff4400', rgba: 'rgba(255,68,0,' }
    : { surface: '#880000', main: '#cc2200', rgba: 'rgba(204,34,0,' };
  // extreme
  return isBonus
    ? { surface: '#880000', main: '#cc0000', rgba: 'rgba(204,0,0,' }
    : { surface: '#550000', main: '#880000', rgba: 'rgba(136,0,0,' };
}

function getDevicePadScale() {
  const screenWidth = window.innerWidth;
  if (screenWidth > 1024) return 0.7;
  if (screenWidth > 768) return 0.85;
  return 1.0;
}

function levelFuel()      { return Math.max(70, 100 - (level - 1) * 4); }   // fuel drops slower

let wind = 0;        // current wind force (changes slowly)
let windTarget = 0;  // target wind we're easing toward
let windTimer = 0;   // time until next wind shift

let lander = {};
let particles = [];
let terrain = [];
let pads = [];
let rockDetails = [];
let fuelPickups = [];
let floatingTexts = []; // seeded per-level rock surface detail
let explosionParts = [];
let landDustParts = [];
let trailParts = [];  // comet tail ghost dots
let ambientDust = []; // floating ambient dust per tier
let shockwaves = [];      // [{x,y,r,maxR,alpha}]
let screenFlash = 0;      // 0..1 flash intensity, decays each frame
let screenShake = 0;      // shake magnitude, decays each frame
let level = 1;
let highestLevelReached = 1;

// ── Title screen demo ship ────────────────────────────────────
const demoShip = {
  x: 0, y: 0, vx: 0, vy: 0, angle: 0,
  thrustTimer: 0, coastTimer: 0, thrusting: false,
  phase: 'drift', phaseTimer: 0,
};

function initLander() {
  wind = 0; windTarget = 0; windTimer = 180;
  const baseFuel = levelFuel();
  const shipStats = currentShipStats || SHIPS.starter;
  lander = {
    x: canvas.width / 2,

    vy: 0.3,
    angle: 0,
    fuel: baseFuel * shipStats.fuelMult,

    leftThrust: false,
    rightThrust: false,
    landed: false,

    ship: selectedShip,
    shipStats: shipStats,
  };
}

function generateTerrain() {
  const W = canvas.width, H = canvas.height;
  terrain = [];
  pads = [];

  // Generate random terrain points
  const segments = 18;
  const segW = W / segments;
  let pts = [];
  const roughness = getTerrainRoughness();

  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const base = H * 0.65 + Math.sin(t * Math.PI * 3) * H * 0.08;
    pts.push({ x: i * segW, y: base + (Math.random() - 0.5) * H * roughness });
  }

  // Place landing pads (2 pads)
  const numPads = 2;
  const padPositions = [];
  while (padPositions.length < numPads) {
    const idx = 2 + Math.floor(Math.random() * (segments - 4));
    if (!padPositions.find(p => Math.abs(p - idx) < 3)) padPositions.push(idx);
  }
  padPositions.sort((a,b) => a-b);

  padPositions.forEach((idx, i) => {
    const baseSegs = i === 0 ? 2 : 1;
    const padWidth = Math.max(30, baseSegs * segW * levelPadScale() * getDevicePadScale());
    const flatY = pts[idx].y;
    const flatSegs = Math.ceil(padWidth / segW);
    for (let j = idx; j <= idx + flatSegs && j < pts.length; j++) {
      pts[j].y = flatY;
    }
    pads.push({
      x: pts[idx].x,
      y: flatY,
      width: padWidth,
      bonus: i === 0 ? 1 : 2,
    });
  });

  // Build terrain segments
  for (let i = 0; i < pts.length - 1; i++) {
    terrain.push({ x1: pts[i].x, y1: pts[i].y, x2: pts[i+1].x, y2: pts[i+1].y });
  }
  // Add walls
  terrain.push({ x1: 0, y1: 0, x2: 0, y2: H });
  terrain.push({ x1: W, y1: 0, x2: W, y2: H });
  terrain.push({ x1: 0, y1: H, x2: W, y2: H });

  // Spawn floating leaf fuel pickups
  fuelPickups = [];
  generatePlanets();
  const numLeaves = 1 + (level >= 3 ? 1 : 0) + (level >= 7 ? 1 : 0);
  for (let i = 0; i < numLeaves; i++) {
    fuelPickups.push({
      x: W * (0.15 + Math.random() * 0.70),
      y: H * (0.15 + Math.random() * 0.38),
      bobPhase: Math.random() * Math.PI * 2,
      bobSpeed: 0.7 + Math.random() * 0.5,
      collected: false,
      collectAnim: 0,
    });
  }

  // Seed rock surface details once per level
  rockDetails = [];
  for (let i = 0; i < pts.length - 1; i++) {
    const x1 = pts[i].x, y1 = pts[i].y;
    const x2 = pts[i+1].x, y2 = pts[i+1].y;
    const dx = x2 - x1, dy = y2 - y1;
    const rising = dy < 0;
    const rTint = 0.85 + Math.random() * 0.3;
    const gTint = 0.55 + Math.random() * 0.35;

    // Cracks with branching sub-cracks
    const numCracks = Math.floor(3 + Math.random() * 5);
    const cracks = [];
    for (let c = 0; c < numCracks; c++) {
      const t = 0.04 + Math.random() * 0.92;
      const ox = x1 + dx * t, oy = y1 + dy * t;
      const len = 10 + Math.random() * 28;
      const angle = Math.PI * 0.5 + (Math.random() - 0.5) * 1.1;
      const steps = 4 + Math.floor(Math.random() * 5);
      const jags = [];
      for (let s = 0; s <= steps; s++) {
        const p = s / steps;
        jags.push({ x: ox + Math.sin(angle)*len*p + (Math.random()-0.5)*6,
                    y: oy + Math.cos(angle)*len*p + (Math.random()-0.5)*5 });
      }
      const alpha = 0.09 + Math.random() * 0.22;
      const bright = Math.random() > 0.45;
      const branches = [];
      if (Math.random() > 0.45 && jags.length > 2) {
        const bStart = jags[Math.floor(jags.length * 0.3 + Math.random() * jags.length * 0.4)];
        const bAngle = angle + (Math.random()-0.5)*1.4;
        const bLen   = len * (0.2 + Math.random() * 0.45);
        const bSteps = 2 + Math.floor(Math.random() * 3);
        const bjags  = [];
        for (let s = 0; s <= bSteps; s++) {
          const p = s / bSteps;
          bjags.push({ x: bStart.x + Math.sin(bAngle)*bLen*p + (Math.random()-0.5)*4,
                       y: bStart.y + Math.cos(bAngle)*bLen*p + (Math.random()-0.5)*3 });
        }
        branches.push({ jags: bjags, alpha: alpha * 0.6, bright });
      }
      cracks.push({ jags, alpha, bright, branches });
    }

    // Boulders - more varied, tilted
    const numBoulders = Math.floor(1 + Math.random() * 4);
    const boulders = [];
    for (let b = 0; b < numBoulders; b++) {
      const t = 0.05 + Math.random() * 0.9;
      boulders.push({
        x: x1 + dx*t + (Math.random()-0.5)*6,
        y: y1 + dy*t - 1 - Math.random()*4,
        rx: 1.5 + Math.random() * 7, ry: 1 + Math.random() * 4,
        tilt: (Math.random()-0.5)*0.6,
        alpha: 0.22 + Math.random() * 0.38, rTint, gTint
      });
    }

    // Pebble clusters
    const pebbles = [];
    const numPC = Math.floor(1 + Math.random() * 3);
    for (let pc = 0; pc < numPC; pc++) {
      const ct = 0.1 + Math.random() * 0.8;
      const cx = x1 + dx*ct, cy = y1 + dy*ct;
      const count = 3 + Math.floor(Math.random() * 6);
      for (let p = 0; p < count; p++) {
        pebbles.push({ x: cx+(Math.random()-0.5)*12, y: cy+(Math.random()-0.5)*6,
                       r: 0.5+Math.random()*2, alpha: 0.15+Math.random()*0.3 });
      }
    }

    // Surface pits / erosion holes
    const numPits = Math.floor(Math.random() * 4);
    const pits = [];
    for (let p = 0; p < numPits; p++) {
      const t = 0.05 + Math.random() * 0.9;
      pits.push({ x: x1+dx*t+(Math.random()-0.5)*8, y: y1+dy*t+(Math.random()-0.5)*5,
                  rx: 1.5+Math.random()*5, ry: 0.8+Math.random()*2.5,
                  alpha: 0.12+Math.random()*0.22 });
    }

    // Erosion channels
    const numChannels = Math.floor(Math.random() * 3);
    const channels = [];
    for (let ch = 0; ch < numChannels; ch++) {
      const t0 = 0.05 + Math.random() * 0.5;
      const t1 = Math.min(t0 + 0.2 + Math.random() * 0.4, 0.98);
      const ox = x1+dx*t0+(Math.random()-0.5)*5, oy = y1+dy*t0;
      const ex = x1+dx*t1+(Math.random()-0.5)*5, ey = y1+dy*t1 + H*(0.04+Math.random()*0.08);
      channels.push({ ox, oy, ex, ey,
        cx: (ox+ex)/2+(Math.random()-0.5)*8, cy: (oy+ey)/2+H*0.02,
        alpha: 0.06+Math.random()*0.12, width: 0.5+Math.random()*1.5 });
    }

    // Strata bands - more bands, varied thickness
    const numStrata = Math.floor(2 + Math.random() * 5);
    const strata = [];
    for (let s = 0; s < numStrata; s++) {
      const frac = 0.08 + (s / numStrata) * 0.82 + Math.random() * 0.06;
      strata.push({
        x1: x1 + dx * (Math.random()*0.15),
        y1: y1 + (H-y1) * frac,
        x2: x2 - dx * (Math.random()*0.15),
        y2: y2 + (H-y2) * frac,
        alpha: 0.04 + Math.random()*0.14,
        warm: Math.random() > 0.4,
        width: 0.4 + Math.random()*2.5,
      });
    }

    // Dark crevice shadow at base of face
    const crevice = Math.random() > 0.35 ? {
      depth: 8 + Math.random() * 20, alpha: 0.18 + Math.random() * 0.28
    } : null;

    rockDetails.push({ x1, y1, x2, y2, rising, rTint, gTint,
      cracks, boulders, pebbles, pits, channels, strata, crevice });
  }

  initAmbientDust();
}

// Particle system
function getTrailColor() {
  const fuelPct = Math.max(0, Math.min(lander.fuel / 100, 1));
  const trail = (selectedShip === 'custom') ? (customShipConfig.trail || 'fuel') : 'fuel';
  const r = Math.random;
  switch (trail) {
    case 'fire':   return `hsl(${10  + r()*40},100%,${50+r()*30}%)`;
    case 'ice':    return `hsl(${190 + r()*30},${80+r()*20}%,${65+r()*25}%)`;
    case 'plasma': return `hsl(${270 + r()*60},100%,${55+r()*30}%)`;
    case 'gold':   return `hsl(${38  + r()*20},100%,${55+r()*25}%)`;
    case 'ghost':  return `hsl(0,0%,${70+r()*30}%)`;
    default: { // fuel-based (green→yellow→red)
      const hue = fuelPct * 120;
      const sat = fuelPct < 0.25 ? 100 : 90;
      return `hsl(${hue + (r()*16 - 8)},${sat}%,${50+r()*30}%)`;
    }
  }
}

function lineIntersects(p1x, p1y, p2x, p2y, p3x, p3y, p4x, p4y) {
  const d = (p2x-p1x)*(p4y-p3y) - (p2y-p1y)*(p4x-p3x);
  if (d === 0) return false;
  const t = ((p3x-p1x)*(p4y-p3y) - (p3y-p1y)*(p4x-p3x)) / d;
  const u = -((p1x-p3x)*(p2y-p1y) - (p1y-p3y)*(p2x-p1x)) / d;
  return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}

function checkCollision() {
  const hw = lander.width / 2;
  const hh = lander.height / 2;
  // Lander corners (simplified as bottom-left, bottom-right, center)
  const pts = [
    [lander.x - hw, lander.y + hh],
    [lander.x + hw, lander.y + hh],
    [lander.x, lander.y + hh + 3],
  ];

  for (const seg of terrain) {
    for (const [px, py] of pts) {
      if (lineIntersects(px - 1, py - 4, px + 1, py + 1, seg.x1, seg.y1, seg.x2, seg.y2)) {
        // Check if on a pad
        let onPad = null;
        for (const pad of pads) {
          if (px >= pad.x && px <= pad.x + pad.width && Math.abs(py - pad.y) < 6) {
            onPad = pad;
            break;
          }
        }
        return { hit: true, onPad };
      }
    }
  }
  return { hit: false };
}

// Input state
const keys = { left: false, right: false, thrust: false };

// Touch buttons
function bindBtn(id, key) {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; btn.classList.add('pressed'); }, { passive: false });
  btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; btn.classList.remove('pressed'); }, { passive: false });
  btn.addEventListener('mousedown', () => { keys[key] = true; btn.classList.add('pressed'); });
  btn.addEventListener('mouseup', () => { keys[key] = false; btn.classList.remove('pressed'); });
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  if (e.key === 'ArrowUp' || e.key === ' ') keys.thrust = true;
});
document.addEventListener('keyup', (e) => {

  if (e.key === 'ArrowUp' || e.key === ' ') keys.thrust = false;
});

// ── GAMEPAD SUPPORT ───────────────────────────────────────────
let gamepadIndex = null;
let gpStartWasPressed = false;
let gpActionWasPressed = false;

window.addEventListener('gamepadconnected', (e) => {
  gamepadIndex = e.gamepad.index;
  console.log(`🎮 Controller connected: ${e.gamepad.id}`);
});
window.addEventListener('gamepaddisconnected', (e) => {
  if (e.gamepad.index === gamepadIndex) gamepadIndex = null;
});

function pollGamepad() {
  if (gamepadIndex === null) return;
  if (!navigator.getGamepads) return;
  const gp = navigator.getGamepads()[gamepadIndex];
  if (!gp || !gp.buttons || !gp.axes) return;

  // ── Buttons ──────────────────────────────────────────────────
  const btnA      = gp.buttons[0]?.pressed  || false;
  const btnLB     = gp.buttons[4]?.pressed  || false;
  const btnRB     = gp.buttons[5]?.pressed  || false;
  const btnStart  = gp.buttons[9]?.pressed  || false;
  const dpadUp    = gp.buttons[12]?.pressed || false;
  const dpadLeft  = gp.buttons[14]?.pressed || false;
  const dpadRight = gp.buttons[15]?.pressed || false;

  // ── Analog sticks ────────────────────────────────────────────
  const deadzone = 0.25;
  const stickX   = gp.axes[0] || 0;
  const stickY   = gp.axes[1] || 0;

  // ── Map to keys ──────────────────────────────────────────────
  keys.thrust = btnA || dpadUp || stickY < -deadzone;
  keys.left   = btnLB || dpadLeft  || stickX < -deadzone;
  keys.right  = btnRB || dpadRight || stickX >  deadzone;

  // ── Start button → mute toggle ───────────────────────────────
  if (btnStart && !gpStartWasPressed) {
    try { document.getElementById('muteBtn')?.click(); } catch(e) {}
  }
  gpStartWasPressed = btnStart;

  // ── A button on menu → start game ────────────────────────────
  try {
    const overlay = document.getElementById('overlay');
    const isMenuVisible = overlay && !overlay.classList.contains('hidden');
    if (btnA && !gpActionWasPressed && isMenuVisible) {
      document.getElementById('startBtn')?.click();
    }
  } catch(e) {}
  gpActionWasPressed = btnA;
}

  const alt = Math.max(0, Math.floor(canvas.height - lander.y - canvas.height * 0.35));
  document.getElementById('levelVal').textContent = level;
  document.getElementById('altVal').textContent = alt;
  const vs = Math.abs(lander.vy).toFixed(1);
  const hs = Math.abs(lander.vx).toFixed(1);
  const vsEl = document.getElementById('vspdVal');
  const hsEl = document.getElementById('hspdVal');
  vsEl.textContent = vs;
  hsEl.textContent = hs;
  vsEl.className = 'hud-val' + (lander.vy > 20 ? ' warn' : '');
  hsEl.className = 'hud-val' + (Math.abs(lander.vx) > 15 ? ' warn' : '');
  document.getElementById('fuelVal').textContent = Math.max(0, Math.floor(lander.fuel));
  document.getElementById('scoreVal').textContent = score;
  const timeEl = document.getElementById('timeVal');
  if (timeEl) {
    timeEl.textContent = levelTimer.toFixed(1) + 's';
    // Turn red when time bonus starts dropping off
    timeEl.style.color = levelTimer > 20 ? '#ff6644' : levelTimer > 12 ? '#ffaa44' : '#ffed4e';
  }
  const rankEl = document.getElementById('rankVal');
  const curRank = getRankForXP(getRankXP());
  rankEl.textContent = curRank.icon + ' ' + curRank.title;
  rankEl.style.color = curRank.color;
  const comboHud = document.getElementById('comboHud');
  const comboValEl = document.getElementById('comboVal');
  if (comboCount >= 1) {
    comboHud.style.display = 'flex';
    comboValEl.textContent = `x${comboMultiplier}`;
    comboValEl.style.color = comboMultiplier >= 4 ? '#ff4444' : comboMultiplier >= 3 ? '#ff8800' : comboMultiplier >= 2 ? '#ffcc00' : '#ffed4e';
  } else {
    comboHud.style.display = 'none';
  }
}

function initDemoShip() {
  const W = canvas.width, H = canvas.height;
  demoShip.x = W * 0.15;
  demoShip.y = H * 0.35;
  demoShip.vx = 0.4 + Math.random() * 0.3;
  demoShip.vy = 0.1 + Math.random() * 0.2;
  demoShip.angle = 0.15;
  demoShip.thrusting = false;
  demoShip.phaseTimer = 120 + Math.random() * 80;
  demoShip.phase = 'drift';
}

function updateDemoShip(dt) {
  const W = canvas.width, H = canvas.height;
  demoShip.phaseTimer -= dt;

  if (demoShip.phase === 'drift') {
    // Gently coast, maybe rotate a little
    demoShip.angle += Math.sin(Date.now() * 0.0008) * 0.003 * dt;
    demoShip.thrusting = false;
    if (demoShip.phaseTimer <= 0) {
      demoShip.phase = 'thrust';
      demoShip.phaseTimer = 40 + Math.random() * 60;
      demoShip.thrusting = true;
    }
  } else if (demoShip.phase === 'thrust') {
    // Fire thruster — accelerate in nose direction
    const thrust = 0.012;
    demoShip.vx += Math.sin(demoShip.angle) * thrust * dt;
    demoShip.vy -= Math.cos(demoShip.angle) * thrust * dt;
    demoShip.thrusting = true;
    if (demoShip.phaseTimer <= 0) {
      demoShip.phase = 'turn';
      demoShip.phaseTimer = 30 + Math.random() * 40;
      demoShip.thrusting = false;
      demoShip.turnDir = Math.random() > 0.5 ? 1 : -1;
    }
  } else if (demoShip.phase === 'turn') {
    demoShip.angle += demoShip.turnDir * 0.025 * dt;
    demoShip.thrusting = false;
    if (demoShip.phaseTimer <= 0) {
      demoShip.phase = 'drift';
      demoShip.phaseTimer = 80 + Math.random() * 100;
    }
  }

  // Very light gravity
  demoShip.vy += 0.002 * dt;
  // Drag
  demoShip.vx *= Math.pow(0.998, dt);
  demoShip.vy *= Math.pow(0.998, dt);

  demoShip.x += demoShip.vx * dt;
  demoShip.y += demoShip.vy * dt;

  // Wrap around edges
  if (demoShip.x > W + 40) demoShip.x = -40;
  if (demoShip.x < -40)    demoShip.x = W + 40;
  if (demoShip.y > H * 0.75) { demoShip.vy = -Math.abs(demoShip.vy) - 0.5; }
  if (demoShip.y < H * 0.05) { demoShip.vy = Math.abs(demoShip.vy) + 0.3; }
}

function drawRocketInterior() {
  const W = canvas.width, H = canvas.height;
  const t = Date.now() * 0.001;
  const floorY = H * 0.84;

  // ── CEILING ───────────────────────────────────────────────────
  const ceilG = ctx.createLinearGradient(0, 0, 0, H*0.14);
  ceilG.addColorStop(0, 'rgba(8,14,28,0.98)');
  ceilG.addColorStop(1, 'rgba(8,14,28,0)');
  ctx.fillStyle = ceilG;
  ctx.fillRect(0, 0, W, H*0.14);

  // Ceiling panels with rivets
  for (let i = 0; i < 4; i++) {
    const px = W*(0.05 + i*0.24), pw = W*0.2, ph = H*0.055;
    ctx.fillStyle = 'rgba(12,22,40,0.7)';
    ctx.beginPath(); ctx.roundRect(px, H*0.008, pw, ph, 3); ctx.fill();
    ctx.strokeStyle = 'rgba(40,80,130,0.5)'; ctx.lineWidth = 0.8; ctx.stroke();
    // Panel rivets
    [[2,2],[pw-2,2],[2,ph-2],[pw-2,ph-2]].forEach(([rx,ry]) => {
      ctx.beginPath(); ctx.arc(px+rx, H*0.008+ry, 1.2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(60,100,160,0.7)'; ctx.fill();
    });
  }

  // Ceiling structural ribs (stronger)
  for (let i = 0; i < 6; i++) {
    const rx = W*(0.06 + i*0.18);
    ctx.beginPath();
    ctx.moveTo(rx - W*0.05, 0);
    ctx.bezierCurveTo(rx - W*0.02, H*0.05, rx + W*0.02, H*0.05, rx + W*0.05, 0);
    ctx.strokeStyle = 'rgba(50,90,150,0.5)'; ctx.lineWidth = 4; ctx.stroke();
    ctx.strokeStyle = 'rgba(80,140,220,0.2)'; ctx.lineWidth = 1.5; ctx.stroke();
    // Rib highlight
    ctx.beginPath();
    ctx.moveTo(rx - W*0.03, 0);
    ctx.bezierCurveTo(rx - W*0.01, H*0.03, rx + W*0.01, H*0.03, rx + W*0.03, 0);
    ctx.strokeStyle = 'rgba(120,180,255,0.12)'; ctx.lineWidth = 0.8; ctx.stroke();
  }

  // Ceiling LED strip light
  const ledG = ctx.createLinearGradient(W*0.1, H*0.065, W*0.9, H*0.065);
  ledG.addColorStop(0,   'rgba(0,150,255,0)');
  ledG.addColorStop(0.1, `rgba(0,180,255,${0.25 + Math.sin(t*0.8)*0.05})`);
  ledG.addColorStop(0.5, `rgba(0,200,255,${0.3 + Math.sin(t*0.6)*0.05})`);
  ledG.addColorStop(0.9, `rgba(0,180,255,${0.25 + Math.sin(t*0.8)*0.05})`);
  ledG.addColorStop(1,   'rgba(0,150,255,0)');
  ctx.fillStyle = ledG;
  ctx.fillRect(W*0.1, H*0.062, W*0.8, 2);
  // LED glow
  const ledGlow = ctx.createLinearGradient(0, H*0.04, 0, H*0.14);
  ledGlow.addColorStop(0, `rgba(0,160,255,${0.08 + Math.sin(t*0.7)*0.02})`);
  ledGlow.addColorStop(1, 'rgba(0,100,200,0)');
  ctx.fillStyle = ledGlow;
  ctx.fillRect(W*0.1, H*0.04, W*0.8, H*0.1);

  // ── CURVED HULL WALLS ─────────────────────────────────────────
  // Left wall with paneling
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(W*0.04, H*0.25, W*0.1, H*0.55, W*0.17, floorY);
  ctx.lineTo(0, floorY); ctx.closePath();
  ctx.clip();
  const wallGL = ctx.createLinearGradient(0, 0, W*0.2, 0);
  wallGL.addColorStop(0,   'rgba(10,18,32,0.98)');
  wallGL.addColorStop(0.5, 'rgba(18,30,50,0.9)');
  wallGL.addColorStop(1,   'rgba(20,35,55,0)');
  ctx.fillStyle = wallGL; ctx.fillRect(0, 0, W*0.2, H);
  // Wall panel lines
  for (let i = 0; i < 5; i++) {
    const py = H*(0.12 + i*0.15);
    ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W*0.16, py);
    ctx.strokeStyle = 'rgba(40,70,120,0.25)'; ctx.lineWidth = 1; ctx.stroke();
  }
  // Wall rivet strip
  for (let i = 0; i < 7; i++) {
    const ry = H*(0.1 + i*0.12);
    ctx.beginPath(); ctx.arc(W*0.03, ry, 1.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(60,100,160,0.5)'; ctx.fill();
  }
  ctx.restore();

  // Right wall
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(W, 0);
  ctx.bezierCurveTo(W*0.96, H*0.25, W*0.9, H*0.55, W*0.83, floorY);
  ctx.lineTo(W, floorY); ctx.closePath();
  ctx.clip();
  const wallGR = ctx.createLinearGradient(W, 0, W*0.8, 0);
  wallGR.addColorStop(0,   'rgba(10,18,32,0.98)');
  wallGR.addColorStop(0.5, 'rgba(18,30,50,0.9)');
  wallGR.addColorStop(1,   'rgba(20,35,55,0)');
  ctx.fillStyle = wallGR; ctx.fillRect(W*0.8, 0, W*0.2, H);
  for (let i = 0; i < 5; i++) {
    const py = H*(0.12 + i*0.15);
    ctx.beginPath(); ctx.moveTo(W, py); ctx.lineTo(W*0.84, py);
    ctx.strokeStyle = 'rgba(40,70,120,0.25)'; ctx.lineWidth = 1; ctx.stroke();
  }
  for (let i = 0; i < 7; i++) {
    const ry = H*(0.1 + i*0.12);
    ctx.beginPath(); ctx.arc(W*0.97, ry, 1.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(60,100,160,0.5)'; ctx.fill();
  }
  ctx.restore();

  // Vertical structural column lines along walls
  ctx.strokeStyle = 'rgba(40,80,140,0.35)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W*0.16, H*0.06); ctx.lineTo(W*0.17, floorY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.84, H*0.06); ctx.lineTo(W*0.83, floorY); ctx.stroke();
  ctx.strokeStyle = 'rgba(80,140,220,0.15)'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(W*0.16, H*0.06); ctx.lineTo(W*0.17, floorY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.84, H*0.06); ctx.lineTo(W*0.83, floorY); ctx.stroke();

  // ── LARGE PORTHOLES ───────────────────────────────────────────
  const ports = [[W*0.09, H*0.35, 32], [W*0.91, H*0.35, 32]];
  ports.forEach(([px, py, pr]) => {
    // Outer thick frame
    ctx.beginPath(); ctx.arc(px, py, pr+8, 0, Math.PI*2);
    ctx.fillStyle = '#0a1422'; ctx.fill();
    ctx.strokeStyle = '#1a2a44'; ctx.lineWidth = 2; ctx.stroke();
    // Frame bolts (8 around)
    for (let b = 0; b < 8; b++) {
      const ba = b * Math.PI/4;
      const bx = px + Math.cos(ba)*(pr+5);
      const by = py + Math.sin(ba)*(pr+5);
      ctx.beginPath(); ctx.arc(bx, by, 2, 0, Math.PI*2);
      ctx.fillStyle = '#2a4a7a'; ctx.fill();
      ctx.strokeStyle = '#4a7aaa'; ctx.lineWidth = 0.5; ctx.stroke();
    }
    // Middle ring
    ctx.beginPath(); ctx.arc(px, py, pr+2, 0, Math.PI*2);
    ctx.strokeStyle = '#3a5a8a'; ctx.lineWidth = 3; ctx.stroke();
    ctx.strokeStyle = '#6a9acc'; ctx.lineWidth = 0.8; ctx.stroke();
    // Glass clip
    ctx.save();
    ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI*2); ctx.clip();
    // Deep space background
    const spaceG = ctx.createRadialGradient(px, py-pr*0.2, 0, px, py, pr);
    spaceG.addColorStop(0,   '#060d1a');
    spaceG.addColorStop(0.6, '#040810');
    spaceG.addColorStop(1,   '#02050c');
    ctx.fillStyle = spaceG; ctx.fill();
    // Nebula cloud
    const nebG = ctx.createRadialGradient(
      px + pr*0.3*Math.sin(t*0.08), py - pr*0.2 + pr*0.1*Math.cos(t*0.06), 0,
      px, py, pr*1.2);
    nebG.addColorStop(0,   `rgba(60,20,100,${0.25 + Math.sin(t*0.2)*0.08})`);
    nebG.addColorStop(0.4, `rgba(20,10,60,${0.15 + Math.sin(t*0.15)*0.05})`);
    nebG.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = nebG; ctx.fillRect(px-pr, py-pr, pr*2, pr*2);
    // Second nebula layer different color
    const nebG2 = ctx.createRadialGradient(
      px - pr*0.2*Math.cos(t*0.07), py + pr*0.15*Math.sin(t*0.09), 0,
      px, py, pr);
    nebG2.addColorStop(0,   `rgba(0,60,100,${0.2 + Math.sin(t*0.25)*0.06})`);
    nebG2.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = nebG2; ctx.fillRect(px-pr, py-pr, pr*2, pr*2);
    // Stars (stable positions)
    for (let s = 0; s < 16; s++) {
      const sx  = px - pr + (s * 43 % (pr*2));
      const sy  = py - pr + (s * 67 % (pr*2));
      const sr  = 0.4 + (s%4) * 0.3;
      const sa  = 0.4 + Math.sin(t*1.5 + s*0.8) * 0.25;
      if ((sx-px)**2+(sy-py)**2 < pr*pr) {
        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${sa})`; ctx.fill();
      }
    }
    // Distant planet
    const pAngle = t * 0.04;
    const planetX = px + pr*0.45*Math.cos(pAngle);
    const planetY = py + pr*0.3*Math.sin(pAngle) - pr*0.1;
    const planetG = ctx.createRadialGradient(planetX-3, planetY-3, 0, planetX, planetY, 9);
    planetG.addColorStop(0,   'rgba(180,120,60,0.8)');
    planetG.addColorStop(0.6, 'rgba(120,70,30,0.7)');
    planetG.addColorStop(1,   'rgba(60,30,10,0)');
    ctx.beginPath(); ctx.arc(planetX, planetY, 9, 0, Math.PI*2);
    ctx.fillStyle = planetG; ctx.fill();
    // Planet ring
    ctx.beginPath(); ctx.ellipse(planetX, planetY, 14, 4, -0.3, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(180,130,60,0.3)'; ctx.lineWidth = 1.5; ctx.stroke();
    // Glass scratch
    ctx.beginPath();
    ctx.moveTo(px-pr*0.3, py-pr*0.5);
    ctx.lineTo(px+pr*0.1, py-pr*0.1);
    ctx.strokeStyle = 'rgba(180,220,255,0.06)'; ctx.lineWidth = 0.6; ctx.stroke();
    // Thick glass glare
    ctx.beginPath(); ctx.ellipse(px-pr*0.3, py-pr*0.35, pr*0.28, pr*0.12, -0.6, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(160,210,255,0.07)'; ctx.fill();
    ctx.restore();
  });

  // ── LEFT CONTROL CONSOLE ──────────────────────────────────────
  const lpx = W*0.02, lpy = H*0.5, lpw = W*0.18, lph = H*0.3;
  ctx.fillStyle = 'rgba(8,16,28,0.92)';
  ctx.strokeStyle = '#1e3a5a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(lpx, lpy, lpw, lph, 5); ctx.fill(); ctx.stroke();
  // Console inner border
  ctx.strokeStyle = 'rgba(40,80,140,0.3)'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.roundRect(lpx+3, lpy+3, lpw-6, lph-6, 3); ctx.stroke();

  // Main screen
  const lscW = lpw-10, lscH = lph*0.38;
  ctx.fillStyle = '#04080e';
  ctx.beginPath(); ctx.roundRect(lpx+5, lpy+5, lscW, lscH, 3); ctx.fill();
  // Screen scanlines
  for (let sl = 0; sl < lscH; sl += 3) {
    ctx.fillStyle = `rgba(0,180,255,${0.03 + (sl%6===0?0.04:0)})`;
    ctx.fillRect(lpx+5, lpy+5+sl, lscW, 1);
  }
  // Scrolling data on screen
  ctx.save(); ctx.beginPath(); ctx.roundRect(lpx+5, lpy+5, lscW, lscH, 3); ctx.clip();
  const scrollOffset = (t * 12) % 60;
  ctx.font = '5px monospace'; ctx.fillStyle = 'rgba(0,220,180,0.6)';
  const dataLines = ['ALTITUDE: 4280m','FUEL: 94%','THRUST: NOMINAL','GYRO: STABLE','NAV: LOCKED','ORBIT: 320km','TEMP: 22°C','SIGNAL: ▮▮▮▯'];
  dataLines.forEach((line, i) => {
    const ly = lpy + 5 + lscH - scrollOffset + i * 9;
    if (ly > lpy+5 && ly < lpy+5+lscH)
      ctx.fillText(line, lpx+8, ly);
  });
  // Scan line sweep
  const slSweep = lpy+5 + ((t*25) % lscH);
  ctx.fillStyle = 'rgba(0,255,200,0.08)';
  ctx.fillRect(lpx+5, slSweep, lscW, 2);
  ctx.restore();

  // LED indicator row
  const ledColors = ['#ff3333','#ff3333','#ffaa00','#44ff88','#44ff88','#4488ff'];
  ledColors.forEach((c, i) => {
    const lx = lpx + 7 + i * (lpw-8)/ledColors.length;
    const ly = lpy + lscH + 12;
    const on = Math.sin(t * (1+i*0.3) + i) > (i < 2 ? 0.7 : -0.5);
    ctx.beginPath(); ctx.arc(lx, ly, 3, 0, Math.PI*2);
    ctx.fillStyle = on ? c : 'rgba(20,30,40,0.8)'; ctx.fill();
    if (on) {
      ctx.beginPath(); ctx.arc(lx, ly, 5, 0, Math.PI*2);
      ctx.fillStyle = c.replace('#','rgba(').replace('ff3333','255,51,51,0.2)').replace('ffaa00','255,170,0,0.2)').replace('44ff88','68,255,136,0.2)').replace('4488ff','68,136,255,0.2)');
      ctx.fill();
    }
  });

  // Buttons grid
  const btnColors2 = ['#ff4444','#44ff88','#ffaa00','#4488ff','#aa44ff','#ff8844'];
  for (let b = 0; b < 6; b++) {
    const bx = lpx + 8 + (b%3) * 16;
    const by = lpy + lscH + 22 + Math.floor(b/3) * 16;
    const bpulse = 0.5 + Math.sin(t*1.5 + b*1.1) * 0.4;
    ctx.beginPath(); ctx.roundRect(bx-5, by-4, 12, 8, 2);
    ctx.fillStyle = btnColors2[b]; ctx.fill();
    ctx.fillStyle = `rgba(255,255,255,${bpulse*0.25})`;
    ctx.fillRect(bx-4, by-3, 10, 3);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.roundRect(bx-5, by-4, 12, 8, 2); ctx.stroke();
  }

  // Dial knobs
  for (let d = 0; d < 2; d++) {
    const dx = lpx + 14 + d * 22;
    const dy = lpy + lph*0.82;
    const angle = t * 0.3 + d * 1.2;
    ctx.beginPath(); ctx.arc(dx, dy, 8, 0, Math.PI*2);
    ctx.fillStyle = '#0e1e30'; ctx.fill();
    ctx.strokeStyle = '#2a4a7a'; ctx.lineWidth = 1.5; ctx.stroke();
    // Tick marks
    for (let tk = 0; tk < 8; tk++) {
      const ta = tk * Math.PI/4;
      ctx.beginPath();
      ctx.moveTo(dx + Math.cos(ta)*6, dy + Math.sin(ta)*6);
      ctx.lineTo(dx + Math.cos(ta)*8, dy + Math.sin(ta)*8);
      ctx.strokeStyle = 'rgba(80,130,200,0.4)'; ctx.lineWidth = 0.8; ctx.stroke();
    }
    // Indicator line
    ctx.beginPath(); ctx.moveTo(dx, dy);
    ctx.lineTo(dx + Math.cos(angle)*6, dy + Math.sin(angle)*6);
    ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 1.2; ctx.stroke();
  }

  // ── RIGHT CONTROL CONSOLE ─────────────────────────────────────
  const rpx = W*0.8, rpy = H*0.5, rpw = W*0.18, rph = H*0.3;
  ctx.fillStyle = 'rgba(8,16,28,0.92)';
  ctx.strokeStyle = '#1e3a5a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(rpx, rpy, rpw, rph, 5); ctx.fill(); ctx.stroke();
  ctx.strokeStyle = 'rgba(40,80,140,0.3)'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.roundRect(rpx+3, rpy+3, rpw-6, rph-6, 3); ctx.stroke();

  // Waveform display
  const rwW = rpw-10, rwH = rph*0.28;
  ctx.fillStyle = '#04080e';
  ctx.beginPath(); ctx.roundRect(rpx+5, rpy+5, rwW, rwH, 3); ctx.fill();
  ctx.save(); ctx.beginPath(); ctx.roundRect(rpx+5, rpy+5, rwW, rwH, 3); ctx.clip();
  ctx.beginPath();
  ctx.moveTo(rpx+5, rpy+5+rwH*0.5);
  for (let wx = 0; wx < rwW; wx += 2) {
    const wy = rwH*0.5 + Math.sin((wx + t*40)*0.18)*rwH*0.3 + Math.sin((wx + t*25)*0.08)*rwH*0.12;
    ctx.lineTo(rpx+5+wx, rpy+5+wy);
  }
  ctx.strokeStyle = `rgba(0,255,150,${0.7 + Math.sin(t*2)*0.15})`; ctx.lineWidth = 1; ctx.stroke();
  // Second wave
  ctx.beginPath();
  ctx.moveTo(rpx+5, rpy+5+rwH*0.5);
  for (let wx = 0; wx < rwW; wx += 2) {
    const wy = rwH*0.5 + Math.sin((wx + t*55)*0.22)*rwH*0.15 + Math.cos((wx)*0.12)*rwH*0.1;
    ctx.lineTo(rpx+5+wx, rpy+5+wy);
  }
  ctx.strokeStyle = 'rgba(0,160,255,0.35)'; ctx.lineWidth = 0.8; ctx.stroke();
  ctx.restore();

  // Vertical sliders (more detailed)
  for (let s = 0; s < 4; s++) {
    const sx = rpx + 9 + s * (rpw-8)/4;
    const slH = rph*0.38, slY = rpy + rph*0.36;
    // Track
    ctx.fillStyle = '#060e1a';
    ctx.beginPath(); ctx.roundRect(sx-2, slY, 4, slH, 2); ctx.fill();
    ctx.strokeStyle = '#1a2e4a'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.roundRect(sx-2, slY, 4, slH, 2); ctx.stroke();
    // Fill level
    const fillAmt = 0.3 + Math.sin(t*0.35 + s*1.3)*0.25;
    const fillColors = ['#ff4444','#44ff88','#ffaa00','#4488ff'];
    ctx.fillStyle = fillColors[s];
    ctx.globalAlpha = 0.4;
    ctx.fillRect(sx-1, slY + slH*(1-fillAmt), 2, slH*fillAmt);
    ctx.globalAlpha = 1;
    // Knob
    const knobY = slY + slH*(1-fillAmt) - 5;
    ctx.beginPath(); ctx.roundRect(sx-6, knobY, 12, 10, 2);
    ctx.fillStyle = '#2a4a7a'; ctx.fill();
    ctx.strokeStyle = '#5a8acc'; ctx.lineWidth = 0.8; ctx.stroke();
    ctx.fillStyle = 'rgba(150,200,255,0.25)';
    ctx.fillRect(sx-5, knobY+1, 10, 3);
    // Tick marks on track
    for (let tk = 0; tk <= 4; tk++) {
      ctx.beginPath(); ctx.moveTo(sx-4, slY + slH*tk/4); ctx.lineTo(sx-2, slY + slH*tk/4);
      ctx.strokeStyle = 'rgba(60,100,160,0.4)'; ctx.lineWidth = 0.5; ctx.stroke();
    }
  }

  // Toggle switches
  for (let sw = 0; sw < 3; sw++) {
    const swx = rpx + 8 + sw * 18;
    const swy = rpy + rph*0.8;
    const swOn = Math.sin(t*0.4 + sw*2) > 0;
    ctx.fillStyle = '#0a1828';
    ctx.beginPath(); ctx.roundRect(swx-6, swy-10, 12, 20, 6); ctx.fill();
    ctx.strokeStyle = '#2a4a7a'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = swOn ? '#44ff88' : '#ff4444';
    ctx.beginPath(); ctx.arc(swx, swOn ? swy-5 : swy+5, 4, 0, Math.PI*2); ctx.fill();
  }

  // ── CENTER CONSOLE (floor-mounted) ────────────────────────────
  const ccx = W*0.35, ccy = H*0.72, ccw = W*0.3, cch = H*0.1;
  ctx.fillStyle = 'rgba(8,16,28,0.88)';
  ctx.strokeStyle = '#1e3a5a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(ccx, ccy, ccw, cch, 6); ctx.fill(); ctx.stroke();
  // Center console large button
  ctx.beginPath(); ctx.arc(ccx + ccw*0.5, ccy + cch*0.5, cch*0.3, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,${100+Math.floor(Math.sin(t*2)*80)},0,${0.6+Math.sin(t*2)*0.3})`; ctx.fill();
  ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(ccx + ccw*0.5, ccy + cch*0.5, cch*0.38, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(255,100,0,${0.2+Math.sin(t*2)*0.1})`; ctx.lineWidth = 3; ctx.stroke();
  // Small indicators either side
  for (let ci = 0; ci < 4; ci++) {
    const side = ci < 2 ? -1 : 1;
    const cix = ccx + ccw*0.5 + side*(ccw*0.22 + (ci%2)*12);
    const ciy = ccy + cch*0.5;
    ctx.beginPath(); ctx.arc(cix, ciy, 3, 0, Math.PI*2);
    ctx.fillStyle = ['#44ff88','#ffaa00','#4488ff','#ff4444'][ci]; ctx.fill();
  }

  // ── TOP INSTRUMENT PANEL ──────────────────────────────────────
  const ipx = W*0.2, ipy = H*0.005, ipw = W*0.6, iph = H*0.1;
  ctx.fillStyle = 'rgba(6,12,22,0.92)';
  ctx.strokeStyle = '#1a3050'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(ipx, ipy, ipw, iph, 6); ctx.fill(); ctx.stroke();
  // Inner glow
  const ipGlow = ctx.createLinearGradient(ipx, ipy, ipx, ipy+iph);
  ipGlow.addColorStop(0, 'rgba(0,100,200,0.06)');
  ipGlow.addColorStop(1, 'rgba(0,50,150,0.02)');
  ctx.fillStyle = ipGlow;
  ctx.beginPath(); ctx.roundRect(ipx+2, ipy+2, ipw-4, iph-4, 4); ctx.fill();

  // Arc gauges (5 of them)
  for (let g = 0; g < 5; g++) {
    const gx = ipx + ipw*(0.1 + g*0.2);
    const gy = ipy + iph*0.65;
    const gr = iph*0.33;
    // Track
    ctx.beginPath(); ctx.arc(gx, gy, gr, Math.PI*0.75, Math.PI*0.25);
    ctx.strokeStyle = '#0e1e2e'; ctx.lineWidth = gr*0.45; ctx.stroke();
    // Value
    const gv = 0.2 + Math.abs(Math.sin(t*0.4 + g*1.3)) * 0.75;
    const gColors = ['#ff5544','#ffaa00','#44ff88','#44aaff','#aa44ff'];
    const gEnd = Math.PI*0.75 + gv * Math.PI*1.5;
    ctx.beginPath(); ctx.arc(gx, gy, gr, Math.PI*0.75, gEnd);
    ctx.strokeStyle = gColors[g]; ctx.lineWidth = gr*0.4; ctx.stroke();
    // Glow on fill
    ctx.beginPath(); ctx.arc(gx, gy, gr, Math.PI*0.75, gEnd);
    ctx.strokeStyle = gColors[g].replace('#','rgba(')
      .replace('ff5544','255,85,68,0.3)').replace('ffaa00','255,170,0,0.3)')
      .replace('44ff88','68,255,136,0.3)').replace('44aaff','68,170,255,0.3)')
      .replace('aa44ff','170,68,255,0.3)');
    ctx.lineWidth = gr*0.65; ctx.stroke();
    // Needle
    const na = Math.PI*0.75 + gv * Math.PI*1.5;
    ctx.beginPath(); ctx.moveTo(gx, gy);
    ctx.lineTo(gx + Math.cos(na)*gr*0.85, gy + Math.sin(na)*gr*0.85);
    ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 0.9; ctx.stroke();
    // Center dot
    ctx.beginPath(); ctx.arc(gx, gy, 1.8, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    // Label
    ctx.textAlign = 'center'; ctx.font = '5px monospace';
    ctx.fillStyle = 'rgba(120,180,240,0.55)';
    const labels = ['ALT','VEL','FUL','GYR','PWR'];
    ctx.fillText(labels[g], gx, gy + gr*0.5);
  }

  // ── FLOOR ─────────────────────────────────────────────────────
  const floorG = ctx.createLinearGradient(0, floorY, 0, H);
  floorG.addColorStop(0, 'rgba(14,22,38,0.95)');
  floorG.addColorStop(0.4, 'rgba(10,16,28,0.98)');
  floorG.addColorStop(1, 'rgba(6,10,18,1)');
  ctx.fillStyle = floorG; ctx.fillRect(0, floorY, W, H-floorY);
  // Floor plates
  const plateW = W/5;
  for (let fp = 0; fp < 5; fp++) {
    ctx.strokeStyle = 'rgba(30,55,100,0.4)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(fp*plateW+2, floorY+2, plateW-4, H-floorY-4, 2); ctx.stroke();
    // Plate rivets
    [[4,4],[plateW-8,4],[4,H-floorY-8],[plateW-8,H-floorY-8]].forEach(([rx,ry]) => {
      ctx.beginPath(); ctx.arc(fp*plateW+rx, floorY+ry, 1.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(50,90,150,0.4)'; ctx.fill();
    });
  }
  // Floor grid
  ctx.strokeStyle = 'rgba(0,180,255,0.05)'; ctx.lineWidth = 0.6;
  for (let fx = 0; fx <= W; fx += W/10) {
    ctx.beginPath(); ctx.moveTo(fx, floorY); ctx.lineTo(fx, H); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(0, floorY+(H-floorY)*0.5); ctx.lineTo(W, floorY+(H-floorY)*0.5); ctx.stroke();
  // Floor ambient glow from consoles
  const flGlow = ctx.createLinearGradient(0, floorY, 0, floorY+30);
  flGlow.addColorStop(0, 'rgba(0,100,200,0.08)');
  flGlow.addColorStop(1, 'rgba(0,50,150,0)');
  ctx.fillStyle = flGlow; ctx.fillRect(0, floorY, W, 30);

  // ── AMBIENT LIGHTING ──────────────────────────────────────────
  // Left blue strip
  const lsG = ctx.createLinearGradient(0, H*0.08, 0, floorY);
  lsG.addColorStop(0,   'rgba(0,120,255,0)');
  lsG.addColorStop(0.2, `rgba(0,150,255,${0.06 + Math.sin(t*0.6)*0.02})`);
  lsG.addColorStop(0.8, `rgba(0,100,200,${0.04 + Math.sin(t*0.5)*0.01})`);
  lsG.addColorStop(1,   'rgba(0,80,180,0)');
  ctx.fillStyle = lsG; ctx.fillRect(0, H*0.08, W*0.04, floorY-H*0.08);
  ctx.fillRect(W*0.96, H*0.08, W*0.04, floorY-H*0.08);

  // Ceiling warning light
  for (let wl = 0; wl < 2; wl++) {
    const wlx = W*(0.38 + wl*0.24);
    const wAlpha = Math.max(0, Math.sin(t*2.8 + wl*Math.PI)) * 0.6;
    if (wAlpha > 0.05) {
      ctx.beginPath(); ctx.arc(wlx, H*0.072, 4, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,60,0,${wAlpha})`; ctx.fill();
      ctx.beginPath(); ctx.arc(wlx, H*0.072, 10, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,60,0,${wAlpha*0.2})`; ctx.fill();
    }
  }

  // Ceiling vent grilles
  for (let v = 0; v < 3; v++) {
    const vx = W*(0.25 + v*0.25), vy = H*0.075, vw = W*0.06, vh = H*0.018;
    ctx.fillStyle = 'rgba(8,16,28,0.7)';
    ctx.beginPath(); ctx.roundRect(vx-vw/2, vy, vw, vh, 2); ctx.fill();
    ctx.strokeStyle = 'rgba(40,70,120,0.4)'; ctx.lineWidth = 0.7; ctx.stroke();
    for (let vl = 0; vl < 5; vl++) {
      ctx.beginPath(); ctx.moveTo(vx-vw/2+3+vl*(vw-4)/5, vy+2); ctx.lineTo(vx-vw/2+3+vl*(vw-4)/5, vy+vh-2);
      ctx.strokeStyle = 'rgba(40,70,120,0.35)'; ctx.lineWidth = 0.8; ctx.stroke();
    }
  }
}

function drawDemoShip() {
  const s = demoShip;
  const f = Math.random();
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.angle);
  ctx.scale(0.85, 0.85); // slightly smaller than play ship
  ctx.globalAlpha = 0.72;

  const TOP = -22, NOZZLE = 16;

  // Thruster flame
  if (s.thrusting) {
    const fH = 14 + f * 16;
    const wb = (Math.random() - 0.5) * 3;
    // Outer
    ctx.beginPath();
    ctx.moveTo(-8, NOZZLE);
    ctx.bezierCurveTo(-11, NOZZLE+fH*0.28, -4+wb, NOZZLE+fH*0.78, wb*0.4, NOZZLE+fH);
    ctx.bezierCurveTo(5+wb, NOZZLE+fH*0.78, 11, NOZZLE+fH*0.28, 8, NOZZLE);
    ctx.closePath();
    const og = ctx.createLinearGradient(0, NOZZLE, 0, NOZZLE+fH);
    og.addColorStop(0, `rgba(255,240,180,0.9)`);
    og.addColorStop(0.3, `rgba(255,140,20,0.7)`);
    og.addColorStop(1, 'rgba(255,40,0,0)');
    ctx.fillStyle = og; ctx.fill();
    // Core
    ctx.beginPath();
    ctx.moveTo(-2.5, NOZZLE);
    ctx.bezierCurveTo(-3.5, NOZZLE+fH*0.35, -1.5, NOZZLE+fH*0.75, 0, NOZZLE+fH*0.9);
    ctx.bezierCurveTo(1.5, NOZZLE+fH*0.75, 3.5, NOZZLE+fH*0.35, 2.5, NOZZLE);
    ctx.closePath();
    const cg = ctx.createLinearGradient(0, NOZZLE, 0, NOZZLE+fH*0.9);
    cg.addColorStop(0, 'rgba(255,255,255,1)');
    cg.addColorStop(0.3, 'rgba(200,240,255,1)');
    cg.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = cg; ctx.fill();
  }

  // Ship body (simplified version of main ship)
  // Legs
  [[-1, 1]].forEach(([s1]) => {
    ctx.strokeStyle = '#4a5a6a'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(s1 * 7, 8); ctx.lineTo(s1 * 13, 14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s1 * 5, 4); ctx.lineTo(s1 * 13, 14); ctx.stroke();
    ctx.fillStyle = '#3a4a5a';
    ctx.beginPath(); ctx.ellipse(s1 * 13, 15, 3, 1.5, 0, 0, Math.PI*2); ctx.fill();
  });
  // Engine bell
  ctx.beginPath();
  ctx.moveTo(-5, 8); ctx.lineTo(5, 8); ctx.lineTo(7, 14); ctx.lineTo(-7, 14); ctx.closePath();
  const eng = ctx.createLinearGradient(0, 8, 0, 14);
  eng.addColorStop(0, '#3a4a5a'); eng.addColorStop(1, '#1a2a3a');
  ctx.fillStyle = eng; ctx.fill();
  // Hull body
  ctx.beginPath();
  ctx.moveTo(0, TOP);
  ctx.bezierCurveTo(10, TOP+5, 12, TOP+20, 10, TOP+32);
  ctx.lineTo(-10, TOP+32);
  ctx.bezierCurveTo(-12, TOP+20, -10, TOP+5, 0, TOP);
  ctx.closePath();
  const hg = ctx.createLinearGradient(-10, TOP, 10, TOP+32);
  hg.addColorStop(0, '#4a6a8a'); hg.addColorStop(0.5, '#2a4a6a'); hg.addColorStop(1, '#1a3a5a');
  ctx.fillStyle = hg; ctx.fill();
  ctx.strokeStyle = '#3a5a7a'; ctx.lineWidth = 0.8; ctx.stroke();
  // Window
  ctx.beginPath(); ctx.ellipse(0, TOP+12, 4, 3, 0, 0, Math.PI*2);
  ctx.fillStyle = '#1a3a6a'; ctx.fill();
  ctx.strokeStyle = '#4a8acc'; ctx.lineWidth = 0.8; ctx.stroke();
  // Natty's text
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 3.5px Arial';
  ctx.strokeStyle = '#1a4d1a'; ctx.lineWidth = 1.2;
  ctx.strokeText("NATTY'S", 0, TOP+23);
  ctx.fillStyle = '#6efa9a';
  ctx.fillText("NATTY'S", 0, TOP+23);

  ctx.restore();

  // Exhaust particles
  if (s.thrusting && Math.random() > 0.4) {
    const cosA = Math.cos(s.angle), sinA = Math.sin(s.angle);
    const nx = s.x + sinA * 14 * 0.85;
    const ny = s.y - cosA * 14 * 0.85;
    particles.push({
      x: nx, y: ny,
      vx: sinA * (1 + Math.random()) * 0.85 * 0.6 + s.vx * 0.3,
      vy: -cosA * (1 + Math.random()) * 0.85 * 0.6 + s.vy * 0.3,
      life: 0.6 + Math.random() * 0.4,
      decay: 0.018 + Math.random() * 0.015,
      size: 1.5 + Math.random() * 2,
      color: `hsl(${20+Math.random()*30},100%,${50+Math.random()*30}%)`,
    });
  }
}

function drawKavaShell() {
  const W = canvas.width, H = canvas.height;
  // Position: lower-center of canvas, just above terrain
  const cx = W * 0.5;
  const cy = H * 0.78;
  const t  = Date.now() * 0.001;

  ctx.save();

  // ── Ambient glow underneath ───────────────────────────────────
  const glow = ctx.createRadialGradient(cx, cy + 4, 0, cx, cy + 4, 55);
  glow.addColorStop(0,   'rgba(180,120,40,0.18)');
  glow.addColorStop(0.5, 'rgba(140,80,20,0.08)');
  glow.addColorStop(1,   'rgba(100,50,10,0)');
  ctx.beginPath();
  ctx.ellipse(cx, cy + 4, 55, 22, 0, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // ── Shell exterior (half-coconut) ─────────────────────────────
  ctx.beginPath();
  ctx.arc(cx, cy, 28, Math.PI, 0);        // top arc
  ctx.lineTo(cx + 28, cy + 2);
  ctx.arc(cx, cy + 2, 28, 0, Math.PI);   // slight flat bottom
  ctx.closePath();
  const shellGrad = ctx.createRadialGradient(cx - 8, cy - 8, 2, cx, cy, 30);
  shellGrad.addColorStop(0,   '#5a3a1a');
  shellGrad.addColorStop(0.5, '#3a2210');
  shellGrad.addColorStop(1,   '#1e1008');
  ctx.fillStyle = shellGrad;
  ctx.fill();
  // Shell rim highlight
  ctx.beginPath();
  ctx.arc(cx, cy, 28, Math.PI, 0);
  ctx.strokeStyle = 'rgba(120,70,30,0.9)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Inner shell shading
  ctx.beginPath();
  ctx.arc(cx, cy, 24, Math.PI, 0);
  ctx.lineTo(cx + 24, cy + 2);
  ctx.arc(cx, cy + 2, 24, 0, Math.PI);
  ctx.closePath();
  const innerShell = ctx.createRadialGradient(cx - 4, cy - 4, 1, cx, cy, 26);
  innerShell.addColorStop(0,   '#3a2510');
  innerShell.addColorStop(1,   '#1a0e06');
  ctx.fillStyle = innerShell;
  ctx.fill();

  // ── Kava liquid (muddy brown, animated ripple) ────────────────
  const liquidY = cy - 6;
  const ripple  = Math.sin(t * 1.8) * 1.2;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, 24, Math.PI, 0);
  ctx.lineTo(cx + 24, liquidY);
  ctx.arc(cx, liquidY, 24, 0, Math.PI);
  ctx.closePath();
  ctx.clip();

  // Liquid fill
  ctx.beginPath();
  ctx.ellipse(cx, liquidY + ripple, 24, 5 + Math.abs(ripple), 0, 0, Math.PI * 2);
  const liqGrad = ctx.createLinearGradient(cx - 24, liquidY - 6, cx + 24, liquidY + 6);
  liqGrad.addColorStop(0,   '#6b4a1e');
  liqGrad.addColorStop(0.4, '#8b5e28');
  liqGrad.addColorStop(0.7, '#5a3a12');
  liqGrad.addColorStop(1,   '#3a2208');
  ctx.fillStyle = liqGrad;
  ctx.fillRect(cx - 25, liquidY - 8, 50, 20);

  // Liquid surface sheen
  ctx.beginPath();
  ctx.ellipse(cx + ripple * 0.5, liquidY + ripple, 20, 3, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(180,130,60,${0.18 + Math.sin(t * 2.2) * 0.06})`;
  ctx.fill();

  // Surface highlight glint
  ctx.beginPath();
  ctx.ellipse(cx - 6 + ripple, liquidY - 1 + ripple * 0.4, 7, 1.5, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(220,180,100,${0.35 + Math.sin(t * 3) * 0.1})`;
  ctx.fill();

  ctx.restore();

  // ── Shell texture lines ───────────────────────────────────────
  ctx.strokeStyle = 'rgba(80,45,15,0.5)';
  ctx.lineWidth = 0.7;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.arc(cx + i * 8, cy + 4, 22, Math.PI * 0.85, Math.PI * 0.15);
    ctx.stroke();
  }

  // ── Shell rim top edge highlight ──────────────────────────────
  ctx.beginPath();
  ctx.arc(cx, cy, 28, Math.PI + 0.15, -0.15);
  ctx.strokeStyle = 'rgba(160,100,45,0.6)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // ── Small steam wisps rising from liquid ──────────────────────
  for (let i = 0; i < 3; i++) {
    const sx   = cx - 12 + i * 12;
    const sOff = Math.sin(t * 1.4 + i * 2.1) * 4;
    const sAlpha = 0.08 + Math.sin(t * 1.8 + i) * 0.04;
    ctx.beginPath();
    ctx.moveTo(sx, liquidY - 2);
    ctx.bezierCurveTo(
      sx + sOff,     liquidY - 10,
      sx - sOff * 2, liquidY - 18,
      sx + sOff,     liquidY - 26
    );
    ctx.strokeStyle = `rgba(200,170,120,${Math.max(0, sAlpha)})`;
    ctx.lineWidth = 1.5 + i * 0.3;
    ctx.stroke();
  }

  // ── "KAVA" label under shell ──────────────────────────────────
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 9px Orbitron, monospace';
  ctx.fillStyle = 'rgba(180,120,50,0.55)';
  ctx.fillText('KAVA', cx, cy + 38);

  ctx.restore();
}

// ── NATTY'S OUTPOST TOWER ────────────────────────────────────
function drawNattysOutpost() {
  const W = canvas.width, H = canvas.height;

  const tx    = W * 0.80;                // tower center x
  const base  = H;                       // ground level — canvas bottom
  const scale = Math.min(1, W / 420);   // scale for small screens

  const towerH  = H * 0.38;
  const towerW  = 26  * scale;
  const baseW   = 40  * scale;

  ctx.save();
  ctx.globalAlpha = 0.45;

  // ── Foundation / base slab ───────────────────────────────
  ctx.fillStyle = '#1a2e1a';
  ctx.beginPath();
  ctx.roundRect(tx - baseW / 2, base - 6 * scale, baseW, 8 * scale, 2);
  ctx.fill();

  // ── Tower legs (two angled supports) ─────────────────────
  ctx.strokeStyle = '#223322';
  ctx.lineWidth = 3 * scale;
  ctx.beginPath();
  ctx.moveTo(tx - baseW * 0.4, base - 2 * scale);
  ctx.lineTo(tx - towerW * 0.4, base - towerH * 0.55);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(tx + baseW * 0.4, base - 2 * scale);
  ctx.lineTo(tx + towerW * 0.4, base - towerH * 0.55);
  ctx.stroke();

  // ── Cross braces ─────────────────────────────────────────
  ctx.strokeStyle = '#1a2a1a';
  ctx.lineWidth = 1.5 * scale;
  [[0.15, 0.35], [0.35, 0.55]].forEach(([a, b]) => {
    ctx.beginPath();
    ctx.moveTo(tx - towerW * 0.5, base - towerH * a);
    ctx.lineTo(tx + towerW * 0.5, base - towerH * b);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(tx + towerW * 0.5, base - towerH * a);
    ctx.lineTo(tx - towerW * 0.5, base - towerH * b);
    ctx.stroke();
  });

  // ── Main tower shaft ─────────────────────────────────────
  const shaftGrad = ctx.createLinearGradient(tx - towerW / 2, 0, tx + towerW / 2, 0);
  shaftGrad.addColorStop(0, '#1e381e');
  shaftGrad.addColorStop(0.5, '#2a4a2a');
  shaftGrad.addColorStop(1, '#152815');
  ctx.fillStyle = shaftGrad;
  ctx.fillRect(tx - towerW / 2, base - towerH, towerW, towerH);
  ctx.strokeStyle = 'rgba(0,80,0,0.5)';
  ctx.lineWidth = 0.8;
  ctx.strokeRect(tx - towerW / 2, base - towerH, towerW, towerH);

  // ── Platform at top ──────────────────────────────────────
  const platW = 70 * scale, platH = 10 * scale;
  ctx.fillStyle = '#152815';
  ctx.strokeStyle = 'rgba(0,120,0,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(tx - platW / 2, base - towerH - platH, platW, platH, 2);
  ctx.fill(); ctx.stroke();

  // Platform railing
  ctx.strokeStyle = 'rgba(0,100,0,0.6)';
  ctx.lineWidth = 1.5 * scale;
  ctx.strokeRect(tx - platW / 2 + 2, base - towerH - platH - 5 * scale, platW - 4, 5 * scale);

  // ── Sign board on platform ────────────────────────────────
  const signW = 62 * scale, signH = 22 * scale;
  const signX = tx - signW / 2;
  const signY = base - towerH - platH - signH - 6 * scale;

  const signFlicker = 0.88 + Math.sin(gameTime * 9.1) * 0.07 + Math.sin(gameTime * 14.3) * 0.05;
  ctx.globalAlpha = signFlicker;

  // Sign backing
  ctx.fillStyle = 'rgba(0,15,0,0.95)';
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.roundRect(signX, signY, signW, signH, 3);
  ctx.fill(); ctx.stroke();

  // Sign text — NATTY'S
  ctx.fillStyle = '#00ff88';
  ctx.shadowBlur = 16;
  ctx.font = `bold ${Math.max(7, 10 * scale)}px 'Orbitron', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText("NATTY'S", tx, signY + signH * 0.36);

  // Sub-label
  ctx.shadowBlur = 6;
  ctx.font = `${Math.max(5, 7 * scale)}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = 'rgba(0,255,136,0.7)';
  ctx.fillText('🌿 KAVA BAR 🌿', tx, signY + signH * 0.75);

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // ── Antenna spike ─────────────────────────────────────────
  ctx.strokeStyle = '#335533';
  ctx.lineWidth = 2 * scale;
  ctx.beginPath();
  ctx.moveTo(tx, signY);
  ctx.lineTo(tx, signY - 18 * scale);
  ctx.stroke();

  // Blinking red warning light at antenna tip
  const blink = Math.sin(gameTime * 4.5) > 0.2;
  ctx.globalAlpha = blink ? 0.9 : 0.2;
  ctx.fillStyle = '#ff3333';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = blink ? 10 : 3;
  ctx.beginPath();
  ctx.arc(tx, signY - 18 * scale, 2.5 * scale, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // ── Amber window on tower shaft ───────────────────────────
  const winY = base - towerH * 0.35;
  const winGlow = ctx.createRadialGradient(tx, winY, 0, tx, winY, 10 * scale);
  winGlow.addColorStop(0, 'rgba(255,190,60,0.5)');
  winGlow.addColorStop(1, 'rgba(255,140,20,0)');
  ctx.fillStyle = winGlow;
  ctx.beginPath();
  ctx.arc(tx, winY, 10 * scale, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,200,70,0.85)';
  ctx.fillRect(tx - 3 * scale, winY - 4 * scale, 6 * scale, 7 * scale);

  // ── Ground light spill ────────────────────────────────────
  const spill = ctx.createRadialGradient(tx, base, 0, tx, base, 30 * scale);
  spill.addColorStop(0, 'rgba(0,255,100,0.08)');
  spill.addColorStop(1, 'rgba(0,255,100,0)');
  ctx.fillStyle = spill;
  ctx.beginPath();
  ctx.ellipse(tx, base, 30 * scale, 6 * scale, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ── PLANET SYSTEM ────────────────────────────────────────────
let planets = [];

const PLANET_PALETTES = {
  early: [
    { c1: '#c87941', c2: '#8a4a20', glow: 'rgba(255,160,80,0.18)',  band: 'rgba(200,120,60,0.3)',  ring: false },
    { c1: '#4a7a9b', c2: '#2a4a6a', glow: 'rgba(80,160,255,0.14)',  band: 'rgba(80,140,200,0.25)', ring: false },
    { c1: '#7a9b4a', c2: '#4a6a2a', glow: 'rgba(120,200,80,0.12)',  band: null,                    ring: false },
  ],
  mid: [
    { c1: '#2a6b8a', c2: '#1a3a5a', glow: 'rgba(60,160,220,0.18)',  band: 'rgba(60,120,180,0.3)',  ring: false },
    { c1: '#8a6b2a', c2: '#5a3a0a', glow: 'rgba(200,160,60,0.15)',  band: 'rgba(180,130,50,0.25)', ring: false },
    { c1: '#6a2a8a', c2: '#3a0a5a', glow: 'rgba(160,80,220,0.14)',  band: null,                    ring: false },
  ],
  late: [
    { c1: '#8a2222', c2: '#4a0a0a', glow: 'rgba(220,60,60,0.20)',   band: 'rgba(180,40,40,0.35)',  ring: false },
    { c1: '#6a3a2a', c2: '#3a1a0a', glow: 'rgba(180,100,60,0.16)',  band: null,                    ring: false },
    { c1: '#2a2a6a', c2: '#0a0a3a', glow: 'rgba(80,80,220,0.14)',   band: 'rgba(60,60,180,0.25)',  ring: false },
  ],
  extreme: [
    { c1: '#4a3a3a', c2: '#1a0a0a', glow: 'rgba(140,80,180,0.20)',  band: 'rgba(100,60,120,0.3)',  ring: true  },
    { c1: '#2a2a2a', c2: '#0a0a0a', glow: 'rgba(100,100,140,0.14)', band: null,                    ring: false },
    { c1: '#5a2a4a', c2: '#2a0a1a', glow: 'rgba(180,60,120,0.16)',  band: 'rgba(140,40,80,0.25)',  ring: false },
  ],
};

function seededRand(seed) {
  const x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}

function generatePlanets() {
  const W = canvas.width, H = canvas.height;
  const tier = getTerrainTier();
  const palette = PLANET_PALETTES[tier];
  planets = [];

  // 2–3 planets per level, seeded by level so they're consistent
  const count = 2 + (level % 3 === 0 ? 1 : 0);

  for (let i = 0; i < count; i++) {
    const seed = level * 100 + i * 37;
    const pal  = palette[i % palette.length];

    // Sizes: one large, rest smaller
    const r = i === 0
      ? 55 + seededRand(seed)     * 50   // 55–105
      : 18 + seededRand(seed + 1) * 28;  // 18–46

    const x = W * (0.05 + seededRand(seed + 2) * 0.88);
    const y = H * (0.04 + seededRand(seed + 3) * 0.42); // upper 46% of screen

    // Craters (smaller planets only)
    const craters = [];
    if (r < 55) {
      const nc = 2 + Math.floor(seededRand(seed + 4) * 4);
      for (let c = 0; c < nc; c++) {
        const angle = seededRand(seed + 10 + c) * Math.PI * 2;
        const dist  = seededRand(seed + 20 + c) * r * 0.65;
        craters.push({
          dx: Math.cos(angle) * dist,
          dy: Math.sin(angle) * dist,
          r:  2 + seededRand(seed + 30 + c) * (r * 0.18),
        });
      }
    }

    // Cloud bands (larger planets only)
    const bands = [];
    if (pal.band && r > 40) {
      const nb = 2 + Math.floor(seededRand(seed + 5) * 3);
      for (let b = 0; b < nb; b++) {
        bands.push({
          yOff:  (seededRand(seed + 40 + b) - 0.5) * r * 1.2,
          width: r * (0.08 + seededRand(seed + 50 + b) * 0.12),
          color: pal.band,
        });
      }
    }

    planets.push({
      x, y, r,
      pal,
      craters,
      bands,
      driftSpeed: 0.0015 + seededRand(seed + 6) * 0.003,
      driftPhase: seededRand(seed + 7) * Math.PI * 2,
    });
  }
}

function drawPlanets() {
  planets.forEach((p, i) => {
    const px = p.x + Math.sin(gameTime * p.driftSpeed + p.driftPhase) * 4;
    const py = p.y + Math.cos(gameTime * p.driftSpeed * 0.7 + p.driftPhase) * 2;

    ctx.save();

    // ── Atmospheric glow halo ───────────────────────────────
    const halo = ctx.createRadialGradient(px, py, p.r * 0.7, px, py, p.r * 1.9);
    halo.addColorStop(0, p.pal.glow);
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(px, py, p.r * 1.9, 0, Math.PI * 2);
    ctx.fill();

    // ── Planet body ─────────────────────────────────────────
    const bodyGrad = ctx.createRadialGradient(px - p.r * 0.3, py - p.r * 0.3, p.r * 0.1, px, py, p.r);
    bodyGrad.addColorStop(0,   p.pal.c1);
    bodyGrad.addColorStop(0.6, p.pal.c1);
    bodyGrad.addColorStop(1,   p.pal.c2);
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(px, py, p.r, 0, Math.PI * 2);
    ctx.fill();

    // ── Cloud bands ─────────────────────────────────────────
    ctx.save();
    ctx.beginPath();
    ctx.arc(px, py, p.r, 0, Math.PI * 2);
    ctx.clip();
    p.bands.forEach(b => {
      ctx.fillStyle = b.color;
      ctx.fillRect(px - p.r, py + b.yOff - b.width / 2, p.r * 2, b.width);
    });
    ctx.restore();

    // ── Craters ─────────────────────────────────────────────
    ctx.save();
    ctx.beginPath();
    ctx.arc(px, py, p.r, 0, Math.PI * 2);
    ctx.clip();
    p.craters.forEach(c => {
      const cg = ctx.createRadialGradient(px + c.dx - c.r * 0.2, py + c.dy - c.r * 0.2, 0, px + c.dx, py + c.dy, c.r);
      cg.addColorStop(0, 'rgba(0,0,0,0.5)');
      cg.addColorStop(0.6, 'rgba(0,0,0,0.25)');
      cg.addColorStop(1, 'rgba(255,255,255,0.06)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.arc(px + c.dx, py + c.dy, c.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.restore();

    // ── Shadow (terminator) ─────────────────────────────────
    const shadow = ctx.createRadialGradient(px + p.r * 0.45, py + p.r * 0.1, 0, px + p.r * 0.45, py, p.r * 1.1);
