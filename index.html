    ctx.fillStyle = throatGlow; ctx.fill();

    // ── 11. Nozzle rim glow ───────────────────────────────────
    const nozzleGlow = ctx.createRadialGradient(0, NOZZLE, 0, 0, NOZZLE, 15);
    nozzleGlow.addColorStop(0,   `rgba(255,232,165,${0.58 * pulse})`);
    nozzleGlow.addColorStop(0.4, 'rgba(255,125,22,0.24)');
    nozzleGlow.addColorStop(1,   'rgba(255,60,0,0)');
    ctx.beginPath();
    ctx.ellipse(0, NOZZLE, 15, 7, 0, 0, Math.PI*2);
    ctx.fillStyle = nozzleGlow; ctx.fill();

    // ── 12. Plasma tendrils (curling filaments at plume edge) ──
    for (let t = 0; t < 8; t++) {
      const tSide = t % 2 === 0 ? 1 : -1;
      const tY0   = NOZZLE + flameH * (0.12 + (t/8) * 0.7);
      const tX0   = tSide * (4 + Math.random() * 4);
      const tLen  = 6 + Math.random() * 14;
      const tCurl = tSide * (2 + Math.random() * 6);
      ctx.beginPath();
      ctx.moveTo(tX0, tY0);
      ctx.bezierCurveTo(
        tX0 + tCurl * 0.4, tY0 + tLen * 0.3,
        tX0 + tCurl,       tY0 + tLen * 0.7,
        tX0 + tCurl * 0.6 + (Math.random()-0.5)*3, tY0 + tLen
      );
      const tAlpha = 0.07 + Math.random() * 0.13;
      const tR = 255, tG = Math.floor(100 + Math.random()*120), tB = Math.floor(Math.random()*40);
      ctx.strokeStyle = `rgba(${tR},${tG},${tB},${tAlpha})`;
      ctx.lineWidth = 0.4 + Math.random() * 1.0;
      ctx.stroke();
    }

    // ── 13. Turbulence edge wisps ─────────────────────────────
    for (let w = 0; w < 8; w++) {
      const wSide  = w % 2 === 0 ? 1 : -1;
      const wT     = 0.1 + (w/8) * 0.82;
      const wx     = wSide * (3.5 + Math.random() * 5.5);
      const wy     = NOZZLE + flameH * wT;
      const wLen   = 5 + Math.random() * 12;
      const wAngle = Math.PI * 0.5 + wSide * (0.25 + Math.random() * 0.6);
      ctx.beginPath();
      ctx.moveTo(wx, wy);
      ctx.quadraticCurveTo(
        wx + Math.cos(wAngle)*wLen*0.5 + (Math.random()-0.5)*3,
        wy + Math.sin(wAngle)*wLen*0.5,
        wx + Math.cos(wAngle)*wLen,
        wy + Math.sin(wAngle)*wLen
      );
      ctx.strokeStyle = `rgba(255,${135+Math.random()*90},${18+Math.random()*45},${0.05+Math.random()*0.12})`;
      ctx.lineWidth = 0.5 + Math.random() * 1.3;
      ctx.stroke();
    }

    // ── 14. Heat shimmer streaks ──────────────────────────────
    for (let s = 0; s < 10; s++) {
      const sx = (Math.random()-0.5) * 10;
      const sy = NOZZLE + 2 + Math.random() * flameH * 0.7;
      const sl = 5 + Math.random() * 14;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + (Math.random()-0.5)*3, sy + sl);
      ctx.strokeStyle = `rgba(255,${198+Math.random()*57},${75+Math.random()*85},${0.04+Math.random()*0.11})`;
      ctx.lineWidth = 0.35 + Math.random() * 0.85;
      ctx.stroke();
    }

    // ── 15. Nozzle bell interior glow ────────────────────────
    // The inside of the bell is super-heated; paint a warm cone
    ctx.beginPath();
    ctx.moveTo(-7, NOZZLE - 6);
    ctx.lineTo(7,  NOZZLE - 6);
    ctx.lineTo(10, NOZZLE);
    ctx.lineTo(-10, NOZZLE);
    ctx.closePath();
    const bellG = ctx.createLinearGradient(0, NOZZLE - 6, 0, NOZZLE);
    bellG.addColorStop(0,   `rgba(255,240,180,${0.08 + f1*0.06})`);
    bellG.addColorStop(0.6, `rgba(255,160,40,${0.18 + f2*0.1})`);
    bellG.addColorStop(1,   `rgba(255,255,255,${0.35 + f4*0.25})`);
    ctx.fillStyle = bellG; ctx.fill();

    // ── 16. Expansion fan lines at nozzle lip ─────────────────
    // Supersonic gas fans outward in straight rays from the nozzle corners
    for (let side = -1; side <= 1; side += 2) {
      const fanX = side * 9.5;
      const numRays = 5;
      for (let r = 0; r < numRays; r++) {
        const angleFrac = r / (numRays - 1);
        const rayAngle  = side > 0
          ? Math.PI * (0.52 + angleFrac * 0.28)   // right: 94°–144°
          : Math.PI * (0.2  + angleFrac * 0.28);   // left:  36°– 86°
        const rayLen = (8 + r * 5) * (0.7 + f3 * 0.6);
        const alpha  = (0.18 - r * 0.03) * pulse;
        ctx.beginPath();
        ctx.moveTo(fanX, NOZZLE);
        ctx.lineTo(
          fanX + Math.cos(rayAngle) * rayLen,
          NOZZLE + Math.sin(rayAngle) * rayLen
        );
        ctx.strokeStyle = `rgba(255,210,120,${Math.max(0, alpha)})`;
        ctx.lineWidth = 0.6 + (numRays - r) * 0.15;
        ctx.stroke();
      }
    }

    // ── 17. Plume skirt / flare (over-expanded bell flare) ────
    // Gas pressure expands outward just below the nozzle exit
    const skirtW = 16 + f1 * 6;
    const skirtH = 8  + f2 * 5;
    ctx.beginPath();
    ctx.moveTo(-10, NOZZLE);
    ctx.bezierCurveTo(-skirtW, NOZZLE + skirtH*0.5, -skirtW*0.7, NOZZLE + skirtH, -4, NOZZLE + skirtH*1.4);
    ctx.bezierCurveTo( 4, NOZZLE + skirtH*1.4,  skirtW*0.7, NOZZLE + skirtH,  skirtW, NOZZLE + skirtH*0.5);
    ctx.lineTo(10, NOZZLE);
    ctx.closePath();
    const skirtG = ctx.createRadialGradient(0, NOZZLE + skirtH*0.5, 0, 0, NOZZLE + skirtH*0.5, skirtW);
    skirtG.addColorStop(0,   `rgba(255,180,60,${0.22 * pulse})`);
    skirtG.addColorStop(0.5, `rgba(255,100,15,0.1)`);
    skirtG.addColorStop(1,   'rgba(200,40,0,0)');
    ctx.fillStyle = skirtG; ctx.fill();

    // ── 18. Oblique shock lines in mid-plume ──────────────────
    // Crossing V-shaped shock structures
    for (let o = 0; o < 4; o++) {
      const oY    = NOZZLE + flameH * (0.15 + o * 0.17);
      const oW    = (5.5 - o * 0.9) * pulse;
      const oAlpha= (0.1 - o * 0.018) * (0.6 + f1 * 0.4);
      if (oAlpha <= 0) continue;
      // Left arm
      ctx.beginPath();
      ctx.moveTo(0, oY);
      ctx.lineTo(-oW, oY + flameH * 0.06);
      ctx.strokeStyle = `rgba(200,235,255,${oAlpha})`;
      ctx.lineWidth = 0.7;
      ctx.stroke();
      // Right arm
      ctx.beginPath();
      ctx.moveTo(0, oY);
      ctx.lineTo( oW, oY + flameH * 0.06);
      ctx.strokeStyle = `rgba(200,235,255,${oAlpha})`;
      ctx.lineWidth = 0.7;
      ctx.stroke();
    }

    // ── 19. Dense plasma tendrils with glowing tips ───────────
    for (let t = 0; t < 14; t++) {
      const tSide  = t % 2 === 0 ? 1 : -1;
      const tY0    = NOZZLE + flameH * (0.08 + (t / 14) * 0.82);
      const tX0    = tSide * (3.5 + Math.random() * 5.5);
      const tLen   = 7 + Math.random() * 18;
      const tCurl  = tSide * (2.5 + Math.random() * 7);
      const tAlpha = 0.06 + Math.random() * 0.15;
      const tG     = Math.floor(90 + Math.random() * 130);
      const tB     = Math.floor(Math.random() * 35);
      // Tendril stroke
      ctx.beginPath();
      ctx.moveTo(tX0, tY0);
      ctx.bezierCurveTo(
        tX0 + tCurl * 0.35, tY0 + tLen * 0.28,
        tX0 + tCurl * 0.85, tY0 + tLen * 0.65,
        tX0 + tCurl * 0.55 + (Math.random()-0.5)*4, tY0 + tLen
      );
      ctx.strokeStyle = `rgba(255,${tG},${tB},${tAlpha})`;
      ctx.lineWidth = 0.4 + Math.random() * 1.1;
      ctx.stroke();
      // Glowing tip dot
      if (Math.random() > 0.5) {
        const tipX = tX0 + tCurl * 0.55;
        const tipY = tY0 + tLen;
        const tipG = ctx.createRadialGradient(tipX, tipY, 0, tipX, tipY, 2.5);
        tipG.addColorStop(0,   `rgba(255,255,200,${tAlpha * 1.8})`);
        tipG.addColorStop(1,   'rgba(255,120,0,0)');
        ctx.beginPath();
        ctx.arc(tipX, tipY, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = tipG; ctx.fill();
      }
    }

    // ── 20. Supersonic core barrel shock outline ──────────────
    // The innermost core has a faint barrel-shaped boundary
    const barrelH = coreH * 0.75;
    const barrelW = 3.8 * pulse;
    ctx.beginPath();
    ctx.moveTo(-barrelW * 0.6, NOZZLE + 1);
    ctx.bezierCurveTo(-barrelW, NOZZLE + barrelH*0.3, -barrelW, NOZZLE + barrelH*0.7, -barrelW*0.4, NOZZLE + barrelH);
    ctx.bezierCurveTo( barrelW*0.4, NOZZLE + barrelH,  barrelW, NOZZLE + barrelH*0.7,  barrelW, NOZZLE + barrelH*0.3);
    ctx.bezierCurveTo( barrelW * 0.6, NOZZLE + 1, -barrelW*0.6, NOZZLE + 1, -barrelW*0.6, NOZZLE + 1);
    const barrelAlpha = 0.18 + f4 * 0.12;
    ctx.strokeStyle = `rgba(180,225,255,${barrelAlpha})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  // ── LANDING LEGS ────────────────────────────────────────────
  // Left leg strut
  ctx.strokeStyle = '#7a8fa8';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-9, NOZZLE - 2); ctx.lineTo(-20, NOZZLE + 12);
  ctx.stroke();
  // Right leg strut
  ctx.beginPath();
  ctx.moveTo(9, NOZZLE - 2); ctx.lineTo(20, NOZZLE + 12);
  ctx.stroke();
  // Left brace
  ctx.strokeStyle = '#5a6f88';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-5, NOZZLE + 4); ctx.lineTo(-20, NOZZLE + 12);
  ctx.stroke();
  // Right brace
  ctx.beginPath();
  ctx.moveTo(5, NOZZLE + 4); ctx.lineTo(20, NOZZLE + 12);
  ctx.stroke();
  // Left footpad
  ctx.strokeStyle = '#7a8fa8';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-24, NOZZLE + 12); ctx.lineTo(-16, NOZZLE + 12);
  ctx.stroke();
  // Right footpad
  ctx.beginPath();
  ctx.moveTo(16, NOZZLE + 12); ctx.lineTo(24, NOZZLE + 12);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // ── ENGINE BELL ─────────────────────────────────────────────
  const bellGrad = ctx.createLinearGradient(-8, NOZZLE - 6, 8, NOZZLE);
  bellGrad.addColorStop(0, '#4a5a6a');
  bellGrad.addColorStop(0.5, '#8a9db0');
  bellGrad.addColorStop(1, '#3a4a5a');
  ctx.fillStyle = bellGrad;
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-5, NOZZLE - 7);
  ctx.lineTo(-8, NOZZLE);
  ctx.lineTo(8, NOZZLE);
  ctx.lineTo(5, NOZZLE - 7);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Nozzle ring
  ctx.beginPath();
  ctx.moveTo(-8, NOZZLE); ctx.lineTo(8, NOZZLE);
  ctx.strokeStyle = '#aabbcc';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── MAIN BODY ───────────────────────────────────────────────
  drawShipBody(selectedShip, TOP, NOZZLE);

  // Right highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.moveTo(2, TOP + 1);
  ctx.lineTo(9, TOP + 10);
  ctx.lineTo(7, TOP + 22);
  ctx.lineTo(2, TOP + 22);
  ctx.closePath();
  ctx.fill();

  // ── NOSE CAP ────────────────────────────────────────────────
  const noseGrad = ctx.createRadialGradient(-2, TOP + 3, 1, 0, TOP + 6, 8);
  noseGrad.addColorStop(0, '#f0f4f8');
  noseGrad.addColorStop(1, '#8898a8');
  ctx.fillStyle = noseGrad;
  ctx.strokeStyle = '#5a6a7a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, TOP);
  ctx.lineTo(7, TOP + 10);
  ctx.lineTo(-7, TOP + 10);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // ── COCKPIT WINDOW ──────────────────────────────────────────
  // Outer frame
  ctx.fillStyle = '#2a3a4a';
  ctx.strokeStyle = '#4a6a8a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(0, TOP + 14, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // Glass
  const winGrad = ctx.createRadialGradient(-1.5, TOP + 12, 0.5, 0, TOP + 14, 5.5);
  winGrad.addColorStop(0,   'rgba(180,230,255,0.95)');
  winGrad.addColorStop(0.5, 'rgba(80,160,220,0.8)');
  winGrad.addColorStop(1,   'rgba(20,60,120,0.9)');
  ctx.fillStyle = winGrad;
  ctx.beginPath();
  ctx.ellipse(0, TOP + 14, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Glare
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(-1.5, TOP + 12, 2, 1.2, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // ── SIDE ANTENNA ────────────────────────────────────────────
  ctx.strokeStyle = '#aabbcc';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(10, TOP + 10); ctx.lineTo(16, TOP + 4);
  ctx.stroke();
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(16, TOP + 4, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // ── RCS THRUSTERS (small side nozzles) ──────────────────────
  ctx.fillStyle = '#4a5a6a';
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 0.8;
  // Left RCS
  ctx.beginPath();
  ctx.rect(-15, TOP + 19, -3, 4);
  ctx.fill(); ctx.stroke();
  // Right RCS
  ctx.beginPath();
  ctx.rect(15, TOP + 19, 3, 4);
  ctx.fill(); ctx.stroke();

  // RCS puffs when rotating
  if (lander.leftThrust && lander.fuel > 0) {
    ctx.fillStyle = `rgba(180,220,255,${0.3 + flicker * 0.3})`;
    ctx.beginPath();
    ctx.arc(-20, TOP + 21, 3 + flicker * 2, 0, Math.PI * 2);
    ctx.fill();
  }
  if (lander.rightThrust && lander.fuel > 0) {
    ctx.fillStyle = `rgba(180,220,255,${0.3 + flicker * 0.3})`;
    ctx.beginPath();
    ctx.arc(20, TOP + 21, 3 + flicker * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── HULL MARKINGS ────────────────────────────────────────────
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 4px Arial';
  ctx.strokeStyle = '#1a4d1a';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.strokeText("NATTY'S", 0, TOP + 23);
  ctx.fillStyle = '#6efa9a';
  ctx.fillText("NATTY'S", 0, TOP + 23);
  ctx.restore();

  ctx.restore();
}

function drawParticles() {
  // ── Ambient dust ─────────────────────────────────────────────
  const W = canvas.width, H = canvas.height;
  ambientDust.forEach(p => {
    p.wobble += p.wobbleSpeed;
    p.x += p.vx + Math.sin(p.wobble) * 0.3;
    p.y += p.vy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `${p.color}${p.alpha})`;
    ctx.fill();
  });
  // ── Screen flash ─────────────────────────────────────────────
  if (Math.abs(screenFlash) > 0.01) {
    const fi = Math.abs(screenFlash);
    if (screenFlash > 0) {
      // Crash — orange/white flash
      ctx.fillStyle = `rgba(255,180,60,${fi * 0.55})`;
    } else if (fi > 0.6) {
      // Perfect landing — gold flash
      ctx.fillStyle = `rgba(255,215,0,${(fi - 0.6) * 0.6})`;
    } else {
      // Normal landing — soft green flash
      ctx.fillStyle = `rgba(0,255,120,${fi * 0.28})`;
    }
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ── Shockwave rings ──────────────────────────────────────────
  shockwaves.forEach(sw => {
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${sw.color},${sw.alpha * (1 - sw.r / sw.maxR)})`;
    ctx.lineWidth = 2.5 * (1 - sw.r / sw.maxR) + 0.5;
    ctx.stroke();
  });

  // ── Ship exhaust trail (comet tail) ──────────────────────────
  trailParts.forEach(p => {
    const a = p.life * 0.35;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,255,136,${a})`;
    ctx.fill();
  });

  // ── Thrust exhaust particles ──────────────────────────────────
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace(')', `,${p.life})`).replace('hsl', 'hsla');
    ctx.fill();
  });

  // ── Explosion particles ───────────────────────────────────────
  explosionParts.forEach(p => {
    const a = Math.min(p.life, 1);
    if (p.type === 'smoke') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (1.5 - p.life * 0.5), 0, Math.PI * 2);
      ctx.fillStyle = p.color.replace('hsl', 'hsla').replace(')', `,${a * 0.35})`);
      ctx.fill();
    } else if (p.type === 'spark') {
      // Sparks as short lines
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 2.5, p.y - p.vy * 2.5);
      ctx.strokeStyle = p.color.replace('hsl','hsla').replace(')',`,${a})`);
      ctx.lineWidth = p.size;
      ctx.stroke();
    } else if (p.type === 'debris') {
      // Debris as small rectangles
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot || 0);
      ctx.fillStyle = p.color.replace('hsl','hsla').replace(')',`,${a})`);
      ctx.fillRect(-p.size, -p.size * 0.5, p.size * 2, p.size);
      ctx.restore();
    } else {
      // Fire
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
      ctx.fillStyle = p.color.replace('hsl','hsla').replace(')',`,${a})`);
      ctx.fill();
    }
  });

  // ── Landing dust ─────────────────────────────────────────────
  landDustParts.forEach(p => {
    if (p.pebble) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.gold
        ? `rgba(255,215,0,${p.alpha * p.life})`
        : `rgba(200,140,60,${p.alpha * p.life})`;
      ctx.fill();
    } else {
      // Soft dust puff
      const rg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * (1.4 - p.life * 0.3));
      rg.addColorStop(0,   `rgba(220,170,90,${p.alpha * p.life * 0.7})`);
      rg.addColorStop(0.5, `rgba(190,130,60,${p.alpha * p.life * 0.35})`);
      rg.addColorStop(1,   'rgba(160,100,40,0)');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (1.4 - p.life * 0.3), 0, Math.PI * 2);
      ctx.fillStyle = rg;
      ctx.fill();
    }
  });
}

// Game loop
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Screen shake
  if (screenShake > 0.5) {
    const sx = (Math.random() - 0.5) * screenShake;
    const sy = (Math.random() - 0.5) * screenShake;
    ctx.save();
    ctx.translate(sx, sy);
  }

  // Background — tier-based sky color
  const skyColors = getSkyColors();
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.7);
  skyGrad.addColorStop(0,   skyColors[0]);
  skyGrad.addColorStop(0.6, skyColors[1]);
  skyGrad.addColorStop(1,   skyColors[2]);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawStars();
  drawTerrain();
  drawParticles();
  if (gameState === 'menu') {
    drawRocketInterior();
    drawKavaShell();
  }
  drawLander();

  if (gameState === 'playing' && !lander.landed && !lander.crashed) {
    updateSounds();
    // Gravity & wind
    const shipMult = lander.shipStats || SHIPS.starter;
    const gravity = levelGravity() * shipMult.gravityMult;
    const windForce = levelWind();
    lander.vy += gravity * dt;

    // Wind shifts gradually every few seconds
    if (windForce > 0) {
      windTimer -= dt;
      if (windTimer <= 0) {
        windTarget = (Math.random() - 0.5) * 2 * windForce;
        windTimer = 120 + Math.random() * 180;
      }
      wind += (windTarget - wind) * 0.005 * dt;
      lander.vx += wind * dt;
    }

    lander.thrusting = keys.thrust && lander.fuel > 0;
    lander.leftThrust = keys.left && lander.fuel > 0;
    lander.rightThrust = keys.right && lander.fuel > 0;

    if (keys.left) {
      lander.angle -= ROTATE_SPEED * dt * shipMult.controlMult;
      lander.fuel -= FUEL_COST_SIDE * dt * 0.5;
    }
    if (keys.right) {
      lander.angle += ROTATE_SPEED * dt * shipMult.controlMult;
      lander.fuel -= FUEL_COST_SIDE * dt * 0.5;
    }

    if (lander.thrusting) {
      const thrustPower = THRUST_POWER * shipMult.thrustMult;
      lander.vx += Math.sin(lander.angle) * thrustPower * dt;
      lander.vy -= Math.cos(lander.angle) * thrustPower * dt;
      lander.fuel -= FUEL_COST_MAIN * dt;
      spawnThrustParticles();
    }

    // ── Exhaust trail — spawn every frame regardless of thrust ──
    if (Math.random() < 0.6) {
      trailParts.push({
        x: lander.x,
        y: lander.y,
        life: 1,
        decay: 0.025 + Math.random() * 0.015,
        size: 1.5 + Math.random() * 2,
      });
    }
    if (lander.fuel < 0) lander.fuel = 0;
    lander.x += lander.vx * dt;
    lander.y += lander.vy * dt;

    // Wrap horizontal (allow slight off-screen)
    if (lander.x < -20) lander.x = canvas.width + 20;
    if (lander.x > canvas.width + 20) lander.x = -20;

    // Lost in space — flew too high
    if (lander.y < -100 && !lander.crashed && !lander.landed) {
      lander.crashed = true;
      stopThrust();
      playCrash();
      spawnExplosion(lander.x, lander.y);
      screenShake = 18;
        setTimeout(() => { comboCount = 0; comboMultiplier = 1; isGameOver = true; showResult(false, 0, 1, 'LOST IN SPACE'); }, 2200);
    }

    // Collision
    const col = checkCollision();
    if (col.hit) {
      // Normalize angle to -PI..PI range
      const tilt = ((lander.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const normalizedTilt = tilt > Math.PI ? tilt - Math.PI * 2 : tilt;
      const maxTilt = Math.PI / 9; // ~20 degrees
      const tooTilted = Math.abs(normalizedTilt) > maxTilt;

      if (col.onPad && Math.abs(lander.vy) < 20 && Math.abs(lander.vx) < 15 && !tooTilted) {
        // ── Check for PERFECT landing ──────────────────────────
        const padCenterX = col.onPad.x + col.onPad.width / 2;
        const centerOffset = Math.abs(lander.x - padCenterX);
        const isPerfect = centerOffset < col.onPad.width * 0.2
          && Math.abs(lander.vy) < 5
          && Math.abs(lander.vx) < 3
          && Math.abs(normalizedTilt) < Math.PI / 36; // < 5 degrees

        // Successful landing
        lander.landed = true;
        stopThrust();
        isGameOver = false;
        playLand();
        spawnLandingDust(lander.x, lander.y, col.onPad.width);
        if (isPerfect) spawnPerfectBurst(lander.x, lander.y);
        const speedBonus = Math.floor((20 - Math.abs(lander.vy)) * 5);
        const fuelBonus = Math.floor(lander.fuel * 2);
        const padBonus = col.onPad.bonus;
        const perfectBonus = isPerfect ? 250 : 0;
        const baseLandScore = (100 + speedBonus + fuelBonus) * padBonus + perfectBonus;

        // Combo multiplier — only perfect landings chain the combo
        if (isPerfect) {
          comboCount++;
          comboMultiplier = Math.min(comboCount + 1, 8); // cap at 8x
        } else {
          comboCount = 0;
          comboMultiplier = 1;
        }

        const landScore = Math.round(baseLandScore * comboMultiplier);
        score += landScore;
        showResult(true, landScore, col.onPad.bonus, null, isPerfect);
      } else {
        // Crash
        lander.crashed = true;
        stopThrust();
        playCrash();
        spawnExplosion(lander.x, lander.y);
        screenShake = 18; // kick the shake
        const reason = tooTilted ? 'TILTED TOO FAR!' : 'TOO FAST OR OFF-PAD';
        // Delay game over overlay so explosion can play out
        setTimeout(() => { comboCount = 0; comboMultiplier = 1; isGameOver = true; showResult(false, 0, 1, reason); }, 2200);
      }
    }

    updateHUD();
  }

  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= p.decay * dt;
    return p.life > 0;
  });
  explosionParts = explosionParts.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.12 * dt;
    p.vx *= 0.98;
    if (p.rot !== undefined) p.rot += p.rotV * dt;
    p.life -= p.decay * dt;
    return p.life > 0;
  });
  landDustParts = landDustParts.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy -= 0.02 * dt; // dust rises slightly
    p.vx *= 0.97;
    p.size += 0.15 * dt; // puffs expand
    p.life -= p.decay * dt;
    return p.life > 0;
  });
  trailParts = trailParts.filter(p => {
    p.life -= p.decay * dt;
    return p.life > 0;
  });
  shockwaves = shockwaves.filter(sw => {
    sw.r += 4.5 * dt;
    return sw.r < sw.maxR;
  });
  if (Math.abs(screenFlash) > 0.001) {
    screenFlash *= Math.pow(0.88, dt);
    if (Math.abs(screenFlash) < 0.01) screenFlash = 0;
  }
  if (screenShake > 0.5) {
    screenShake *= Math.pow(0.82, dt);
    ctx.restore(); // close the shake translate
    if (screenShake < 0.5) screenShake = 0;
  }

  requestAnimationFrame(loop);
}

// ── PILOT RANKS ───────────────────────────────────────────────
const RANK_KEY = 'natty-lander-rank-xp';

const RANKS = [
  { title: 'CADET',      minXP: 0,      color: '#aabbcc', icon: '🪐' },
  { title: 'PILOT',      minXP: 500,    color: '#00ccff', icon: '✈️' },
  { title: 'AVIATOR',    minXP: 2000,   color: '#00ff88', icon: '🚀' },
  { title: 'ACE',        minXP: 5000,   color: '#ffcc00', icon: '⭐' },
  { title: 'VETERAN',    minXP: 12000,  color: '#ff8800', icon: '🔥' },
  { title: 'ELITE',      minXP: 25000,  color: '#ff4400', icon: '💫' },
  { title: 'COMMANDER',  minXP: 50000,  color: '#cc00ff', icon: '🌟' },
  { title: 'LEGEND',     minXP: 100000, color: '#ffd700', icon: '👑' },
];

function getRankXP() {
  try { return parseInt(localStorage.getItem(RANK_KEY) || '0'); }
  catch(e) { return 0; }
}

function saveRankXP(xp) {
  try { localStorage.setItem(RANK_KEY, String(xp)); }
  catch(e) {}
}

function getRankForXP(xp) {
  let rank = RANKS[0];
  for (const r of RANKS) { if (xp >= r.minXP) rank = r; }
  return rank;
}

function getNextRank(xp) {
  for (const r of RANKS) { if (xp < r.minXP) return r; }
  return null; // already at max
}

function addRankXP(pts) {
  const prevXP = getRankXP();
  const newXP = prevXP + pts;
  saveRankXP(newXP);
  const prevRank = getRankForXP(prevXP);
  const newRank  = getRankForXP(newXP);
  return { newXP, prevRank, newRank, rankUp: prevRank.title !== newRank.title };
}

// ── LEADERBOARD ───────────────────────────────────────────────
const LB_KEY = 'natty-lander-scores';
const LB_MAX = 8;

async function loadScores() {
  try {
    const data = localStorage.getItem(LB_KEY);
    return data ? JSON.parse(data) : [];
  } catch(e) { return []; }
}

async function saveScores(scores) {
  try {
    localStorage.setItem(LB_KEY, JSON.stringify(scores));
  } catch(e) {}
}

async function addScore(initials, pts, lvl) {
  const scores = await loadScores();
  scores.push({ name: initials.toUpperCase().slice(0,3), score: pts, level: lvl, date: new Date().toLocaleDateString() });
  scores.sort((a,b) => b.score - a.score);
  const trimmed = scores.slice(0, LB_MAX);
  await saveScores(trimmed);
  return trimmed;
}

async function renderLeaderboard(highlightScore) {
  try {
    const lb = document.getElementById('leaderboard');
    const rows = document.getElementById('lb-rows');
    if (!lb || !rows) return;
    const scores = await loadScores();
    lb.style.display = 'block';
    if (scores.length === 0) {
      rows.innerHTML = '<div style="text-align:center;color:rgba(0,255,136,0.4);font-size:11px;padding:8px;">NO SCORES YET — BE THE FIRST!</div>';
      return;
    }
    rows.innerHTML = scores.map((s, i) => {
      const isNew = highlightScore && s.score === highlightScore && i === scores.findIndex(x => x.score === highlightScore);
      return `<div class="lb-row${isNew ? ' highlight' : ''}">
        <span class="lb-rank">#${i+1}</span>
        <span class="lb-name">${s.name}</span>
        <span class="lb-score">${s.score.toLocaleString()}</span>
        <span class="lb-level">LVL ${s.level}</span>
      </div>`;
    }).join('');
  } catch(e) { /* leaderboard render failed silently */ }
}

function showInitialsEntry(pts, lvl) {
  const entry = document.getElementById('initials-entry');
  entry.style.display = 'flex';
  const input = document.getElementById('initials-input');
  input.value = '';
  setTimeout(() => input.focus(), 100);

  const btn = document.getElementById('save-score-btn');
  const handler = async () => {
    try {
      const name = input.value.trim().toUpperCase().slice(0,3) || 'AAA';
      btn.removeEventListener('click', handler);
      entry.style.display = 'none';
      await addScore(name, pts, lvl);
      await renderLeaderboard(pts);
    } catch(e) {}
  };
  btn.addEventListener('click', handler);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });
}

async function checkHighScore(pts) {
  const scores = await loadScores();
  return scores.length < LB_MAX || pts > (scores[scores.length - 1]?.score || 0);
}

function checkShipUnlocks(newLevel) {
  const unlockedShips = [];
  Object.entries(SHIPS).forEach(([key, ship]) => {
    if (newLevel === ship.unlockedAtLevel) {
      unlockedShips.push({ key, name: ship.name });
    }
  });
  return unlockedShips;
}

function showResult(success, pts, padBonus, reason, isPerfect) {
  const overlay = document.getElementById('overlay');
  const gameMenu = document.getElementById('game-menu');
  const shipSelect = document.getElementById('ship-select');
  const controls = document.getElementById('controls');
  
  // Hide ship select, show game menu, hide controls
  shipSelect.classList.remove('visible');
  gameMenu.style.display = 'flex';
  controls.style.display = 'none';
  
  overlay.classList.remove('hidden');

  const title = gameMenu.querySelector('.overlay-title');
  const msg = document.getElementById('result-msg') || document.createElement('div');
  msg.id = 'result-msg';
  msg.className = '';
  
  // Use the title element to display the result
  if (success) {
    title.classList.add('result-title');
    title.textContent = isPerfect ? '⭐ PERFECT LANDING!' : `LEVEL ${level} CLEAR!`;
    title.style.color = isPerfect ? '#ffed4e' : '#00ff88';
    title.style.textShadow = isPerfect ? '0 0 15px #ffed4e, 0 0 30px #ffcc00, 0 0 45px #ffaa00, 0 0 60px rgba(255,200,0,0.5)' : '0 0 20px #00ff88';
    msg.className = 'success-msg';
    let txt = `+${pts} PTS`;
    if (comboMultiplier > 1) txt += ` · ${comboMultiplier}× COMBO!`;
    if (isPerfect) txt += ' · +250 PERFECT BONUS!';
    if (padBonus === 2) txt += ' · DOUBLE PAD!';
    msg.textContent = txt;
    if (!msg.parentNode) gameMenu.insertBefore(msg, gameMenu.querySelector('.overlay-sub'));

    // Award XP and check for rank up
    const xpGained = pts + (isPerfect ? 100 : 0);
    const rankResult = addRankXP(xpGained);
    
    level++;
    highestLevelReached = Math.max(highestLevelReached, level);
    
    // Check for ship unlocks
    const unlockedShips = checkShipUnlocks(level);
    
    let nextInfo = `LEVEL ${level} · GRAVITY ↑ · PADS NARROWER`;
    const sub = gameMenu.querySelector('.overlay-sub');

    if (rankResult.rankUp) {
      sub.innerHTML = `<span style="color:${rankResult.newRank.color};font-size:18px;font-weight:bold;text-shadow:0 0 12px ${rankResult.newRank.color};">${rankResult.newRank.icon} RANK UP: ${rankResult.newRank.title}!</span><br>SCORE: ${score}  |  ${nextInfo}`;
    } else if (unlockedShips.length > 0) {
      const shipNames = unlockedShips.map(s => s.name).join(', ');
      sub.innerHTML = `🚀 <span class="ship-unlock-text" style="color: #ffd700; font-weight: bold; letter-spacing: 1px;">NEW SHIP UNLOCKED: ${shipNames}!</span><br>SCORE: ${score}  |  ${nextInfo}`;
    } else {
      const nextRank = getNextRank(rankResult.newXP);
      const xpInfo = nextRank ? ` · ${nextRank.minXP - rankResult.newXP} XP to ${nextRank.title}` : ' · MAX RANK!';
      sub.textContent = `SCORE: ${score}  |  ${nextInfo}${xpInfo}`;
    }
    
    const btn = document.getElementById('startBtn');
    btn.textContent = `START LEVEL ${level}`;
    const lb = document.getElementById('leaderboard');
    lb.style.display = 'none';
  } else {
    title.textContent = 'GAME OVER';
    title.style.color = '#ff4444';
    title.style.textShadow = '0 0 20px #ff4444';
    msg.className = 'crash-msg';
    msg.textContent = reason || 'TOO FAST OR OFF-PAD';
    if (!msg.parentNode) gameMenu.insertBefore(msg, gameMenu.querySelector('.overlay-sub'));
    
    const sub = gameMenu.querySelector('.overlay-sub');
    sub.textContent = `FINAL SCORE: ${score}  |  LEVEL ${highestLevelReached} REACHED`;
    const btn = document.getElementById('startBtn');
    btn.textContent = 'PLAY AGAIN';
    const finalScore = score;
    const finalLevel = highestLevelReached;
    level = 1;
    // Show leaderboard and prompt initials if score qualifies
    checkHighScore(finalScore).then(isHigh => {
      renderLeaderboard(null).then(() => {
        if (isHigh && finalScore > 0) showInitialsEntry(finalScore, finalLevel);
      }).catch(()=>{});
    }).catch(()=>{});
  }

  gameState = 'over';
}

// ── SOUND ENGINE ──────────────────────────────────────────────
let ac = null; // AudioContext — created on first user tap
let thrustNodes = []; // all running thrust nodes
let thrustGainNode = null;
let wasThrusting = false, wasRotating = false, lastBeepTime = 0;

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, type, gainVal, duration, freqEnd) {
  if (!ac || isMuted) return;
  const g = ac.createGain();
  const osc = ac.createOscillator();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + duration);
  g.gain.setValueAtTime(gainVal, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + duration);
  osc.connect(g); g.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime + duration + 0.01);
}

function playNoise(filterType, filterFreq, gainVal, duration) {
  if (!ac || isMuted) return;
  const size = Math.floor(ac.sampleRate * Math.min(duration + 0.1, 1));
  const buf = ac.createBuffer(1, size, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < size; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const filt = ac.createBiquadFilter(); filt.type = filterType; filt.frequency.value = filterFreq;
  const g = ac.createGain();
  g.gain.setValueAtTime(gainVal, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + duration);
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(); src.stop(ac.currentTime + duration + 0.01);
}

function startThrust() {
  if (thrustGainNode || !ac || isMuted) return;

  thrustGainNode = ac.createGain();
  thrustGainNode.gain.setValueAtTime(0.0001, ac.currentTime);
  thrustGainNode.gain.linearRampToValueAtTime(0.30, ac.currentTime + 0.22);
  thrustGainNode.connect(ac.destination);
  thrustNodes = [];

  const t = ac.currentTime;
  const sr = ac.sampleRate;

  // ── Helper: make a looping noise buffer ──────────────────────
  function makeNoise(secs) {
    const buf = ac.createBuffer(1, Math.floor(sr * secs), sr);
    const d = buf.getChannelData(0);
    // Brownian (pink-ish) noise for richer texture
    let last = 0;
    for (let i = 0; i < d.length; i++) {
      last = (last + 0.02 * (Math.random() * 2 - 1)) / 1.02;
      d[i] = last * 18; // amplify
    }
    const src = ac.createBufferSource();
    src.buffer = buf; src.loop = true;
    return src;
  }

  // ── 1. Deep sub-bass roar — two detuned sawtooths ────────────
  for (const [freq, detune] of [[38, 0], [42, 7]]) {
    const osc = ac.createOscillator();
    osc.type = 'sawtooth'; osc.frequency.value = freq;
    osc.detune.value = detune;
    const lpf = ac.createBiquadFilter();
    lpf.type = 'lowpass'; lpf.frequency.value = 220; lpf.Q.value = 2.5;
    const g = ac.createGain(); g.gain.value = 0.20;
    osc.connect(lpf); lpf.connect(g); g.connect(thrustGainNode);
    osc.start(t); thrustNodes.push(osc);
  }

  // ── 2. LFO — slow combustion chug at 5 Hz ────────────────────
  const lfo1 = ac.createOscillator();
  lfo1.type = 'sine'; lfo1.frequency.value = 5;
  const lfo1g = ac.createGain(); lfo1g.gain.value = 14;
  lfo1.connect(lfo1g);
  lfo1g.connect(thrustNodes[0].frequency);
  lfo1g.connect(thrustNodes[1].frequency);
  lfo1.start(t); thrustNodes.push(lfo1);

  // ── 3. LFO2 — faster flutter at 18 Hz
  const lfo2 = ac.createOscillator();
  lfo2.type = 'sawtooth'; lfo2.frequency.value = 18;
  const lfo2g = ac.createGain(); lfo2g.gain.value = 0.05;
  lfo2.connect(lfo2g); lfo2g.connect(thrustGainNode.gain);
  lfo2.start(t); thrustNodes.push(lfo2);

  // ── 4. Broadband roar core — brown noise through resonant LPF ─
  const roarSrc = makeNoise(3.0);
  const roarLPF = ac.createBiquadFilter();
  roarLPF.type = 'lowpass'; roarLPF.frequency.value = 800; roarLPF.Q.value = 3.5;
  const roarPeak = ac.createBiquadFilter();
  roarPeak.type = 'peaking'; roarPeak.frequency.value = 160; roarPeak.Q.value = 1.8; roarPeak.gain.value = 14;
  const roarG = ac.createGain(); roarG.gain.value = 0.40;
  roarSrc.connect(roarLPF); roarLPF.connect(roarPeak); roarPeak.connect(roarG); roarG.connect(thrustGainNode);
  roarSrc.start(t); thrustNodes.push(roarSrc);

  // ── 5. Mid crackle — bandpass noise stack ────────────────────
  const crackSrc = makeNoise(2.5);
  const bp1 = ac.createBiquadFilter(); bp1.type='bandpass'; bp1.frequency.value=320; bp1.Q.value=1.2;
  const bp2 = ac.createBiquadFilter(); bp2.type='bandpass'; bp2.frequency.value=680; bp2.Q.value=1.8;
  const crackG = ac.createGain(); crackG.gain.value = 0.22;
  crackSrc.connect(bp1); bp1.connect(bp2); bp2.connect(crackG); crackG.connect(thrustGainNode);
  crackSrc.start(t); thrustNodes.push(crackSrc);

  // ── 6. High exhaust scream — highpass noise ───────────────────
  const hissSrc = makeNoise(2.0);
  const hp1 = ac.createBiquadFilter(); hp1.type='highpass'; hp1.frequency.value=2200; hp1.Q.value=0.7;
  const hp2 = ac.createBiquadFilter(); hp2.type='peaking'; hp2.frequency.value=3800; hp2.Q.value=2.0; hp2.gain.value=8;
  const hissG = ac.createGain(); hissG.gain.value = 0.14;
  hissSrc.connect(hp1); hp1.connect(hp2); hp2.connect(hissG); hissG.connect(thrustGainNode);
  hissSrc.start(t); thrustNodes.push(hissSrc);

  // ── 7. 110 Hz body tone — square through soft clip ───────────
  const bodyOsc = ac.createOscillator();
  bodyOsc.type = 'square'; bodyOsc.frequency.value = 110;
  const bodyLPF = ac.createBiquadFilter(); bodyLPF.type='lowpass'; bodyLPF.frequency.value=400; bodyLPF.Q.value=1.0;
  const bodyG = ac.createGain(); bodyG.gain.value = 0.16;
  bodyOsc.connect(bodyLPF); bodyLPF.connect(bodyG); bodyG.connect(thrustGainNode);
  bodyOsc.start(t); thrustNodes.push(bodyOsc);
}

function stopThrust() {
  if (!thrustGainNode || !ac) return;
  // Ramp master gain down with a short tail
  thrustGainNode.gain.setValueAtTime(thrustGainNode.gain.value, ac.currentTime);
  thrustGainNode.gain.linearRampToValueAtTime(0.0001, ac.currentTime + 0.22);
  const nodesToStop = thrustNodes.slice();
  const gainToDisconnect = thrustGainNode;
  setTimeout(() => {
    nodesToStop.forEach(n => { try { n.stop(); } catch(e){} });
    try { gainToDisconnect.disconnect(); } catch(e){}
  }, 350);
  thrustNodes = []; thrustGainNode = null;
}

function playRotate() {
  playNoise('highpass', 1200, 0.06, 0.08);
}

function playLand() {
  if (!ac || isMuted) return;
  [523, 659, 784, 1047].forEach((freq, i) => {
    const t = ac.currentTime + i * 0.13;
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.25, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
    osc.connect(g); g.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.5);
  });
}

function playCrash() {
  if (!ac || isMuted) return;
  playTone(100, 'sine', 0.7, 0.6, 18);
  playNoise('lowpass', 500, 0.5, 0.7);
}

function playLowFuelBeep() {
  const now = Date.now();
  if (now - lastBeepTime < 900) return;
  lastBeepTime = now;
  playTone(1100, 'square', 0.07, 0.09);
}

function playLevelIntro(lvl) {
  if (!ac || isMuted) return;
  const t = ac.currentTime;

  // ── 1. Deep cinematic BWOMP ───────────────────────────────────
  const bwompOsc = ac.createOscillator();
  const bwompGain = ac.createGain();
  const bwompLPF = ac.createBiquadFilter();
  bwompOsc.type = 'sawtooth';
  bwompOsc.frequency.setValueAtTime(180, t);
  bwompOsc.frequency.exponentialRampToValueAtTime(38, t + 0.55);
  bwompLPF.type = 'lowpass'; bwompLPF.frequency.value = 400; bwompLPF.Q.value = 2;
  bwompGain.gain.setValueAtTime(0.0001, t);
  bwompGain.gain.linearRampToValueAtTime(0.45, t + 0.04);
  bwompGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
  bwompOsc.connect(bwompLPF); bwompLPF.connect(bwompGain); bwompGain.connect(ac.destination);
  bwompOsc.start(t); bwompOsc.stop(t + 0.75);

  // ── 2. Rising power chord (pitch rises each level) ────────────
  const baseFreq = 80 + (lvl - 1) * 12;
  [[1, 0.18], [1.5, 0.12], [2, 0.08]].forEach(([mult, gain], i) => {
    const o = ac.createOscillator();
    const g = ac.createGain();
    const f = ac.createBiquadFilter();
    o.type = i === 0 ? 'sawtooth' : 'square';
    o.frequency.setValueAtTime(baseFreq * mult * 0.6, t + 0.12);
    o.frequency.exponentialRampToValueAtTime(baseFreq * mult * 1.8, t + 0.55);
    f.type = 'lowpass'; f.frequency.value = 1200;
    g.gain.setValueAtTime(0.0001, t + 0.1);
    g.gain.linearRampToValueAtTime(gain, t + 0.25);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.65);
    o.connect(f); f.connect(g); g.connect(ac.destination);
    o.start(t + 0.1); o.stop(t + 0.7);
  });

  // ── 3. Metallic ping at peak ──────────────────────────────────
  const pingOsc = ac.createOscillator();
  const pingGain = ac.createGain();
  pingOsc.type = 'sine';
  pingOsc.frequency.setValueAtTime(880 + lvl * 40, t + 0.45);
  pingOsc.frequency.exponentialRampToValueAtTime(440 + lvl * 20, t + 0.9);
  pingGain.gain.setValueAtTime(0.0001, t + 0.44);
  pingGain.gain.linearRampToValueAtTime(0.22, t + 0.46);
  pingGain.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);
  pingOsc.connect(pingGain); pingGain.connect(ac.destination);
  pingOsc.start(t + 0.44); pingOsc.stop(t + 1.05);

  // ── 4. Ignition hiss burst ────────────────────────────────────
  const hissLen = Math.floor(ac.sampleRate * 0.18);
  const hissBuf = ac.createBuffer(1, hissLen, ac.sampleRate);
  const hd = hissBuf.getChannelData(0);
  for (let i = 0; i < hissLen; i++) hd[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/hissLen, 1.5);
  const hissSrc = ac.createBufferSource(); hissSrc.buffer = hissBuf;
  const hissHP = ac.createBiquadFilter(); hissHP.type = 'highpass'; hissHP.frequency.value = 1800;
  const hissGain = ac.createGain(); hissGain.gain.value = 0.18;
  hissSrc.connect(hissHP); hissHP.connect(hissGain); hissGain.connect(ac.destination);
  hissSrc.start(t + 0.44);

  // ── 5. Level-count beeps (up to 5) ───────────────────────────
  const beepCount = Math.min(lvl, 5);
  for (let i = 0; i < beepCount; i++) {
    const beepT = t + 0.85 + i * 0.13;
    const bo = ac.createOscillator();
    const bg = ac.createGain();
    bo.type = 'sine';
    bo.frequency.value = 660 + i * 80;
    bg.gain.setValueAtTime(0.0001, beepT);
    bg.gain.linearRampToValueAtTime(0.14, beepT + 0.02);
    bg.gain.exponentialRampToValueAtTime(0.0001, beepT + 0.09);
    bo.connect(bg); bg.connect(ac.destination);
    bo.start(beepT); bo.stop(beepT + 0.12);
  }
}

function updateSounds() {
  if (!ac) return;
  const thrusting = keys.thrust && lander.fuel > 0;
  const rotating = (keys.left || keys.right) && lander.fuel > 0;
  if (thrusting && !wasThrusting) startThrust();
  if (!thrusting && wasThrusting) stopThrust();
  wasThrusting = thrusting;
  if (rotating && !wasRotating) playRotate();
  wasRotating = rotating;
  if (lander.fuel < 15 && lander.fuel > 0) playLowFuelBeep();
}

// ── SHIP SELECTION SYSTEM ─────────────────────────────────────
function drawShipPreview(shipType, canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  
  // Clear canvas
  ctx.fillStyle = 'rgba(10, 20, 40, 0.3)';
  ctx.fillRect(0, 0, w, h);
  
  // Save context
  ctx.save();
  ctx.translate(w / 2, h / 2 - 5);
  ctx.scale(1.8, 1.8);
  
  const TOP = -22;
  const NOZZLE = 16;
  const colors = getShipColors(shipType);
  
  // ── ENGINE BELL ──────────────────────────────────────────────
  const bellGrad = ctx.createLinearGradient(-8, NOZZLE - 6, 8, NOZZLE);
  bellGrad.addColorStop(0, '#4a5a6a');
  bellGrad.addColorStop(0.5, '#8a9db0');
  bellGrad.addColorStop(1, '#3a4a5a');
  ctx.fillStyle = bellGrad;
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-5, NOZZLE - 7);
  ctx.lineTo(-8, NOZZLE);
  ctx.lineTo(8, NOZZLE);
  ctx.lineTo(5, NOZZLE - 7);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-8, NOZZLE); ctx.lineTo(8, NOZZLE);
  ctx.strokeStyle = '#aabbcc';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  // ── NOSE CONE ────────────────────────────────────────────────
  const noseGrad = ctx.createLinearGradient(0, TOP - 5, 0, TOP + 5);
  noseGrad.addColorStop(0, 'rgba(255,255,255,0.4)');
  noseGrad.addColorStop(0.5, colors.primary);
  noseGrad.addColorStop(1, colors.primary);
  ctx.fillStyle = noseGrad;
  ctx.strokeStyle = colors.stripe;
  ctx.lineWidth = 1;
  
  ctx.beginPath();
  ctx.moveTo(0, TOP - 8);
  ctx.lineTo(6, TOP + 2);
  ctx.lineTo(-6, TOP + 2);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  // Nose shine
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, TOP - 2, 2, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // ── MAIN FUSELAGE ────────────────────────────────────────────
  const bodyGrad = ctx.createLinearGradient(-14, TOP + 2, 14, NOZZLE - 6);
  bodyGrad.addColorStop(0, colors.primary);
  bodyGrad.addColorStop(0.2, colors.accent);
  bodyGrad.addColorStop(0.8, colors.accent);
  bodyGrad.addColorStop(1, colors.secondary);
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = colors.stripe;
  ctx.lineWidth = 1.3;
  
  ctx.beginPath();
  ctx.moveTo(0, TOP + 2);
  ctx.lineTo(11, TOP + 8);
  ctx.lineTo(13, TOP + 16);
  ctx.lineTo(14, NOZZLE - 12);
  ctx.lineTo(9, NOZZLE - 6);
  ctx.lineTo(5, NOZZLE - 7);
  ctx.lineTo(-5, NOZZLE - 7);
  ctx.lineTo(-9, NOZZLE - 6);
  ctx.lineTo(-14, NOZZLE - 12);
  ctx.lineTo(-13, TOP + 16);
  ctx.lineTo(-11, TOP + 8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  // ── SIDE FINS ────────────────────────────────────────────────
  // Left fin
  ctx.fillStyle = colors.secondary;
  ctx.strokeStyle = colors.stripe;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-11, TOP + 12);
  ctx.lineTo(-17, TOP + 14);
  ctx.lineTo(-16, NOZZLE - 8);
  ctx.lineTo(-9, NOZZLE - 6);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  // Right fin
  ctx.beginPath();
  ctx.moveTo(11, TOP + 12);
  ctx.lineTo(17, TOP + 14);
  ctx.lineTo(16, NOZZLE - 8);
  ctx.lineTo(9, NOZZLE - 6);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  // ── WINDOW/VIEWPORT ──────────────────────────────────────────
  ctx.fillStyle = 'rgba(0, 150, 255, 0.3)';
  ctx.strokeStyle = colors.stripe;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.ellipse(0, TOP + 8, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  // ── FUSELAGE PANELS ──────────────────────────────────────────
  ctx.strokeStyle = colors.stripe;
  ctx.globalAlpha = 0.4;
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(-12, TOP + 12); ctx.lineTo(12, TOP + 12);
  ctx.moveTo(-13, TOP + 22); ctx.lineTo(13, TOP + 22);
  ctx.stroke();
  ctx.globalAlpha = 1;
  
  // ── LANDING LEGS ──────────────────────────────────────────────
  ctx.strokeStyle = '#7a8fa8';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-9, NOZZLE - 2); ctx.lineTo(-15, NOZZLE + 9);
  ctx.moveTo(9, NOZZLE - 2); ctx.lineTo(15, NOZZLE + 9);
  ctx.stroke();
  
  ctx.restore();
}

function renderShipSelect() {
  const shipGrid = document.getElementById('shipGrid');
  shipGrid.innerHTML = '';
  
  Object.entries(SHIPS).forEach(([key, ship]) => {
    const isUnlocked = level >= ship.unlockedAtLevel;
    const isSelected = key === selectedShip;
    
    const card = document.createElement('div');
    card.className = `ship-card ${isSelected ? 'selected' : ''} ${!isUnlocked ? 'locked' : ''}`;
    
    card.innerHTML = `
      <canvas class="ship-preview" width="100" height="100"></canvas>
      <div style="flex: 1;">
        <div class="ship-name">${ship.name}</div>
        <div class="ship-stats">
          <div>Thrust: <span style="color: #00ff88;">${(ship.thrustMult * 100).toFixed(0)}%</span></div>
          <div>Fuel: <span style="color: #00ff88;">${(ship.fuelMult * 100).toFixed(0)}%</span></div>
          <div>Control: <span style="color: #00ff88;">${(ship.controlMult * 100).toFixed(0)}%</span></div>
        </div>
      </div>
      ${!isUnlocked ? `<div class="ship-lock">🔒</div><div class="ship-unlock-text">Lvl ${ship.unlockedAtLevel}</div>` : ''}
    `;
    
    // Draw ship preview on canvas
    const canvas = card.querySelector('.ship-preview');
    drawShipPreview(key, canvas);
    
    if (isUnlocked) {
      card.addEventListener('click', () => {
        selectedShip = key;
        currentShipStats = SHIPS[key];
        hideShipSelect();
      });
    }
    
    shipGrid.appendChild(card);
  });
}

function showShipSelect() {
  document.getElementById('ship-select').classList.add('visible');
  document.getElementById('game-menu').style.display = 'none';
  renderShipSelect();
}

function hideShipSelect() {
  document.getElementById('ship-select').classList.remove('visible');
  document.getElementById('game-menu').style.display = 'flex';
}

document.getElementById('startBtn').addEventListener('click', handleStart);
document.getElementById('startBtn').addEventListener('touchend', (e) => { e.preventDefault(); handleStart(); });
document.getElementById('shipSelectBtn').addEventListener('click', showShipSelect);

// Mute button
document.getElementById('muteBtn').addEventListener('click', () => {
  isMuted = !isMuted;
  const muteBtn = document.getElementById('muteBtn');
  if (isMuted) {
    muteBtn.textContent = '🔇';
    muteBtn.classList.add('muted');
    stopThrust();
  } else {
    muteBtn.textContent = '🔊';
    muteBtn.classList.remove('muted');
  }
});

// Show leaderboard on initial load
renderLeaderboard(null).catch(()=>{});
initDemoShip();

// ── BACKGROUND STARS ──────────────────────────────────────────
function createStars() {
  // Create static twinkling stars
  const starCount = 40;
  for (let i = 0; i < starCount; i++) {
    const star = document.createElement('div');
    star.className = 'star twinkle';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 80 + '%';
    star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
    star.style.opacity = Math.random() * 0.7 + 0.3;
    document.body.insertBefore(star, document.querySelector('canvas'));
  }
}

function createShootingStars() {
  const shootingStarCount = 3;
  for (let i = 0; i < shootingStarCount; i++) {
    setTimeout(() => {
      const star = document.createElement('div');
      star.className = 'shooting-star';
      const startY = Math.random() * 60; // Appear in upper 60% of screen
      star.style.setProperty('--start-y', startY + '%');
      star.style.setProperty('--offset', (Math.random() * 100 - 50) + 'px');
      star.style.setProperty('--duration', (3 + Math.random() * 2) + 's');
      star.style.setProperty('--delay', (Math.random() * 2) + 's');
      document.body.insertBefore(star, document.querySelector('canvas'));
      
      // Remove after animation completes
      setTimeout(() => star.remove(), (5 + Math.random() * 2) * 1000);
    }, i * 4000 + Math.random() * 2000);
  }
  
  // Keep creating new shooting stars
  setInterval(() => {
    const star = document.createElement('div');
    star.className = 'shooting-star';
    const startY = Math.random() * 60;
    star.style.setProperty('--start-y', startY + '%');
    star.style.setProperty('--offset', (Math.random() * 100 - 50) + 'px');
    star.style.setProperty('--duration', (3 + Math.random() * 2) + 's');
    star.style.setProperty('--delay', '0s');
    document.body.insertBefore(star, document.querySelector('canvas'));
    
    setTimeout(() => star.remove(), (5 + Math.random() * 2) * 1000);
  }, 6000 + Math.random() * 4000);
}

createStars();
createShootingStars();
// ── END BACKGROUND STARS ──────────────────────────────────────────

// ── HIDE SPEEDS ON TITLE SCREEN ───────────────────────────────────
const hideSpeedOnMenu = () => {
  const overlay = document.getElementById('overlay');
  const vspd = document.getElementById('vspdVal');
  const hspd = document.getElementById('hspdVal');
  if (overlay.classList.contains('hidden')) {
    // Game is playing - show speeds
    vspd.style.display = '';
    hspd.style.display = '';
  } else {
    // On menu/title screen - hide speeds
    vspd.style.display = 'none';
    hspd.style.display = 'none';
  }
};

// Hide speeds initially
hideSpeedOnMenu();

// Watch for overlay visibility changes
const observer = new MutationObserver(() => hideSpeedOnMenu());
observer.observe(document.getElementById('overlay'), { attributes: true, attributeFilter: ['class'] });

requestAnimationFrame(loop);
</script>
